[homelab]
khale.net ansible_user=leo ansible_ssh_private_key_file=~/.ssh/id_ed25519

[homelab:vars]
app_user=leo
app_dir=/srv/homelab
db_user=homelab
# db_password moved to ansible/secrets.yml (gitignored). See docs/DEPLOYMENT.md.
db_name_core=homelab_core
db_name_ops=homelab_ops
caddy_domain=khale.net
docker_compose_dir=/home/leo/docker/dashboard
repo_url=git@github.com:LeoNitinKhale/homelab.git
allowed_hosts=khale.net
