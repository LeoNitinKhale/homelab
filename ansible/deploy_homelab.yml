---
# Homelab Deployment Playbook
# Usage: ansible-playbook -i ansible/inventory.ini ansible/deploy_homelab.yml

# =============================================================
# PLAY 1: Base server setup
# =============================================================
- name: Base server setup
  hosts: homelab
  become: true

  tasks:

    # -------------------------
    # Swap
    # -------------------------
    - name: Create swapfile
      command: fallocate -l 2G /swapfile
      args:
        creates: /swapfile

    - name: Set swapfile permissions
      file:
        path: /swapfile
        mode: '0600'

    - name: Format swapfile
      command: mkswap /swapfile
      args:
        creates: /proc/swaps

    - name: Enable swap
      command: swapon /swapfile
      ignore_errors: true

    - name: Add swap to fstab
      lineinfile:
        path: /etc/fstab
        line: '/swapfile none swap sw 0 0'
        state: present

    # -------------------------
    # System packages
    # -------------------------
    - name: Update apt cache
      apt:
        update_cache: true

    - name: Install base packages
      apt:
        name:
          - ufw
          - git
          - curl
          - python3
          - python3-pip
          - python3-venv
          - python3-psycopg2
        state: present

    # -------------------------
    # UFW firewall
    # -------------------------
    - name: Allow SSH
      ufw:
        rule: allow
        name: OpenSSH

    - name: Allow HTTP
      ufw:
        rule: allow
        port: '80'
        proto: tcp

    - name: Allow HTTPS
      ufw:
        rule: allow
        port: '443'
        proto: tcp

    - name: Enable UFW
      ufw:
        state: enabled
        policy: deny

    # -------------------------
    # SSH hardening
    # -------------------------
    - name: Disable password authentication
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication no'
      notify: Restart SSH

    - name: Disable root login
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin no'
      notify: Restart SSH

  handlers:
    - name: Restart SSH
      service:
        name: ssh
        state: restarted


# =============================================================
# PLAY 2: Install Docker
# =============================================================
- name: Install Docker
  hosts: homelab
  become: true

  tasks:

    - name: Install Docker dependencies
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present

    - name: Add Docker GPG key
      shell: >
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg |
        gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg
      args:
        creates: /usr/share/keyrings/docker-archive-keyring.gpg

    - name: Add Docker repository
      apt_repository:
        repo: >
          deb [arch=amd64 signed-by=/usr/share/keyrings/docker-archive-keyring.gpg]
          https://download.docker.com/linux/ubuntu
          {{ ansible_distribution_release }} stable
        state: present

    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Add user to docker group
      user:
        name: "{{ app_user }}"
        groups: docker
        append: true

    - name: Enable Docker
      service:
        name: docker
        state: started
        enabled: true


# =============================================================
# PLAY 3: Install Caddy
# =============================================================
- name: Install Caddy
  hosts: homelab
  become: true

  tasks:

    - name: Install Caddy dependencies
      apt:
        name:
          - debian-keyring
          - debian-archive-keyring
          - apt-transport-https
        state: present

    - name: Add Caddy GPG key
      shell: >
        curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/gpg.key' |
        gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg
      args:
        creates: /usr/share/keyrings/caddy-stable-archive-keyring.gpg

    - name: Add Caddy repository
      shell: >
        curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt' |
        tee /etc/apt/sources.list.d/caddy-stable.list
      args:
        creates: /etc/apt/sources.list.d/caddy-stable.list

    - name: Install Caddy
      apt:
        name: caddy
        state: present
        update_cache: true

    - name: Write Caddyfile
      copy:
        dest: /etc/caddy/Caddyfile
        content: |
          # khale.net is served by our own Django portal SPA (runserver on
          # 127.0.0.1:8000). NOTE: the app process itself is not yet provisioned
          # by this playbook — see the "Deploy Django app" TODO below.
          khale.net {
              reverse_proxy localhost:8000
          }

          tasks.khale.net {
              reverse_proxy localhost:3456
          }
      notify: Restart Caddy

    - name: Enable Caddy
      service:
        name: caddy
        state: started
        enabled: true

  handlers:
    - name: Restart Caddy
      service:
        name: caddy
        state: restarted


# =============================================================
# PLAY 4: PostgreSQL
# =============================================================
- name: Install PostgreSQL
  hosts: homelab
  become: true

  tasks:

    - name: Install PostgreSQL
      apt:
        name:
          - postgresql
          - postgresql-contrib
          - python3-psycopg2
        state: present
        update_cache: true

    - name: Ensure PostgreSQL is started
      service:
        name: postgresql
        state: started
        enabled: true

    - name: Create database user
      become_user: postgres
      postgresql_user:
        name: "{{ db_user }}"
        password: "{{ db_password }}"
        role_attr_flags: NOSUPERUSER,NOCREATEDB

    - name: Create core database
      become_user: postgres
      postgresql_db:
        name: "{{ db_name_core }}"
        owner: "{{ db_user }}"

    - name: Create ops database
      become_user: postgres
      postgresql_db:
        name: "{{ db_name_ops }}"
        owner: "{{ db_user }}"


# =============================================================
# PLAY 5: Redis
# =============================================================
- name: Install Redis
  hosts: homelab
  become: true

  tasks:

    - name: Install Redis
      apt:
        name: redis-server
        state: present

    - name: Enable Redis
      service:
        name: redis-server
        state: started
        enabled: true


# =============================================================
# PLAY 6: Deploy containers
# =============================================================
- name: Deploy Docker containers
  hosts: homelab
  become: true

  tasks:

    - name: Create docker compose directory
      file:
        path: "{{ docker_compose_dir }}"
        state: directory
        owner: "{{ app_user }}"
        mode: '0755'

    - name: Create vikunja subdirectories
      file:
        path: "{{ docker_compose_dir }}/{{ item }}"
        state: directory
        owner: "1000"
        group: "1000"
        mode: '0755'
      loop:
        - vikunja/files
        - vikunja/db

    - name: Write docker-compose.yml
      copy:
        dest: "{{ docker_compose_dir }}/docker-compose.yml"
        owner: "{{ app_user }}"
        content: |
          services:
            vikunja:
              image: vikunja/vikunja
              container_name: vikunja
              environment:
                VIKUNJA_DATABASE_TYPE: sqlite
                VIKUNJA_SERVICE_PUBLICURL: https://tasks.khale.net
              ports:
                - 127.0.0.1:3456:3456
              volumes:
                - ./vikunja/files:/app/vikunja/files
                - ./vikunja/db:/db
              restart: unless-stopped

    - name: Start containers
      community.docker.docker_compose_v2:
        project_src: "{{ docker_compose_dir }}"
        state: present


# =============================================================
# PLAY 7: Deploy Django app (the portal SPA + API)
# =============================================================
# Single-user site: served by `manage.py runserver` (no Gunicorn, per CLAUDE.md)
# behind Caddy, which terminates TLS and proxies khale.net -> 127.0.0.1:8000.
#   --insecure : let runserver serve /static with DEBUG=0 in prod
#   --noreload : one process, owned by systemd (no autoreload fork)
# Move to gunicorn + whitenoise later if this ever needs to scale.
- name: Deploy Django app
  hosts: homelab
  become: true
  vars_files:
    - secrets.yml            # django_secret_key — gitignored; copy secrets.yml.example
  vars:
    venv_dir: "{{ app_dir }}/.venv"

  tasks:

    - name: Ensure app directory exists (owned by the app user)
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0755'

    # The repo is private — the server needs a deploy key (read access) in
    # ~{{ app_user }}/.ssh for this checkout to succeed. See docs/DEPLOYMENT.md.
    - name: Check out the repository
      become_user: "{{ app_user }}"
      git:
        repo: "{{ repo_url }}"
        dest: "{{ app_dir }}"
        version: main
        accept_hostkey: true

    - name: Create virtualenv and install dependencies
      become_user: "{{ app_user }}"
      pip:
        requirements: "{{ app_dir }}/requirements.txt"
        virtualenv: "{{ venv_dir }}"
        virtualenv_command: python3 -m venv

    - name: Write .env (prod config + secrets)
      copy:
        dest: "{{ app_dir }}/.env"
        owner: "{{ app_user }}"
        mode: '0600'
        content: |
          SECRET_KEY={{ django_secret_key }}
          DEBUG=0
          ALLOWED_HOSTS={{ allowed_hosts }}
          CSRF_TRUSTED_ORIGINS=https://{{ allowed_hosts }}
          DATABASE_URL=postgres://{{ db_user }}:{{ db_password }}@localhost:5432/{{ db_name_core }}
          OPS_DATABASE_URL=postgres://{{ db_user }}:{{ db_password }}@localhost:5432/{{ db_name_ops }}
      notify: Restart homelab app

    - name: Migrate core database
      become_user: "{{ app_user }}"
      command: "{{ venv_dir }}/bin/python manage.py migrate --noinput"
      args:
        chdir: "{{ app_dir }}"

    - name: Migrate ops database
      become_user: "{{ app_user }}"
      command: "{{ venv_dir }}/bin/python manage.py migrate --database=ops --noinput"
      args:
        chdir: "{{ app_dir }}"

    - name: Install systemd unit for the app
      copy:
        dest: /etc/systemd/system/homelab.service
        content: |
          [Unit]
          Description=Homelab Django app (runserver behind Caddy)
          After=network.target postgresql.service

          [Service]
          User={{ app_user }}
          WorkingDirectory={{ app_dir }}
          ExecStart={{ venv_dir }}/bin/python manage.py runserver --insecure --noreload 127.0.0.1:8000
          Restart=always
          RestartSec=3

          [Install]
          WantedBy=multi-user.target
      notify: Restart homelab app

    - name: Enable and start the app
      systemd:
        name: homelab
        enabled: true
        state: started
        daemon_reload: true

  handlers:
    - name: Restart homelab app
      systemd:
        name: homelab
        state: restarted
        daemon_reload: true
