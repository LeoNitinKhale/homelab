    facts: "Archimedes of Syracuse is remembered for jumping from his bath and running naked through the streets shouting 'Eureka!' ('I have found it!') after realising that displaced water could measure the volume — and thus the purity — of the king's gold crown. Whether or not that tale is literally true, his real work on buoyancy, levers, pulleys and the ratio of a sphere to its cylinder was centuries ahead of its time.\n\nHe was also Syracuse's one-man war machine, devising cranes and burning-mirrors that terrorised the Roman fleet during the long siege of the city. When Syracuse finally fell in 212 BC, a Roman soldier came upon the old man absorbed in a geometry problem drawn in the sand. Archimedes reportedly snapped, 'Do not disturb my circles' — and was run through, against the express orders of the Roman general who had wanted him spared."
    notes: ["Killed at the Siege of Syracuse while drawing figures in the sand."]

