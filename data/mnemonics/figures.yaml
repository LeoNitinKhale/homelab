    facts: "Socrates left no writings of his own; almost everything we know comes through his devoted pupil Plato. A stonemason's son with a famously ugly face, he shuffled around the Athenian marketplace barefoot, buttonholing the powerful and dismantling their certainties with relentless questions — the 'Socratic method' still used in classrooms and courtrooms today.\n\nHe claimed only to know that he knew nothing, and made many enemies by exposing the ignorance of others. Charged with impiety and 'corrupting the youth' of Athens, he was condemned to death and calmly drank a cup of hemlock in 399 BC, choosing death over exile or silence — the founding martyr of Western philosophy."
    notes: []

