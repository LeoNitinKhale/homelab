    facts: "Captain James Cook was a farm labourer's son who rose through the Royal Navy on sheer skill as a navigator and cartographer to lead three great voyages of Pacific exploration. He charted New Zealand and the eastern coast of Australia, criss-crossed the ocean with astonishing accuracy, and pioneered the use of fresh food such as sauerkraut to defeat the scurvy that had killed so many sailors.\n\nHis expeditions transformed European knowledge of the globe — and opened the Pacific to colonisation, with lasting consequences for its peoples. On his third voyage, a dispute over a stolen boat turned violent, and Cook was killed in the surf at Kealakekua Bay in Hawaii in 1779."
