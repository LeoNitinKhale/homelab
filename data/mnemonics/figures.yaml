    facts: "Ashoka the Great ruled almost the entire Indian subcontinent as the third emperor of the Mauryan dynasty. Early in his reign he waged a savage war of conquest against the kingdom of Kalinga, but the sheer scale of the death and misery he caused — by some accounts a hundred thousand killed — filled him with such remorse that he underwent a profound change of heart, embracing Buddhism and renouncing violent conquest.\n\nHe spent the rest of his long reign promoting 'dhamma' — righteousness, tolerance and non-violence — carving edicts into rocks and polished stone pillars across his empire, building hospitals and roads, and sending Buddhist missionaries as far as Sri Lanka and beyond, helping turn a regional sect into a world religion. His famous Lion Capital of Sarnath, four lions standing back to back, is today the national emblem of India."
    notes: ["Converted to Buddhism in remorse after the Kalinga war; his lion capital is India's national emblem."]

