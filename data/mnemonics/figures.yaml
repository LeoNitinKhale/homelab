    facts: "Brunel was the showman-genius of Victorian engineering, a small man with a huge cigar and a bigger ambition, who packed more grand projects into one life than most industries manage in a century. For the Great Western Railway he drove a broad-gauge line from London to Bristol dead straight and near-level, boring the record-breaking Box Tunnel and throwing the elegant Maidenhead Bridge across the Thames.\n\nThen he turned to the sea, building a succession of ever-larger steamships — the Great Western, the Great Britain (the first iron-hulled, propeller-driven ocean liner), and the monstrous Great Eastern, so vast it nearly ruined him and could not be launched without months of struggle. The strain of it broke his health; he suffered a stroke days after the Great Eastern finally put to sea, and died at 53, having reshaped the transport of an age."
    notes: ["The famous 'chains' portrait was taken at the launch of the Great Eastern; he died of a stroke soon after."]

