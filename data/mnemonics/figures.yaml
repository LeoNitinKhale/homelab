    facts: "Geoffrey Chaucer is often called the 'father of English literature' — the first great poet to write in the everyday English of ordinary people rather than the French or Latin of the elite, helping to establish the London dialect as the basis of the standard language. A soldier, diplomat, customs official and courtier who moved through the turbulent world of medieval royal politics, he wrote his masterpiece, The Canterbury Tales, in his later years.\n\nIn it, a boisterous cross-section of medieval society — a knight, a miller, a bawdy wife, a corrupt pardoner and more — swap stories on a pilgrimage from London to Canterbury, in verse that is by turns pious, hilarious and startlingly earthy. He died in 1400 with the work unfinished, and was buried in Westminster Abbey — the first of the writers whose tombs gave the abbey's Poets' Corner its name."
    notes: ["'Father of English literature'; wrote The Canterbury Tales; the first person buried in Poets' Corner."]

