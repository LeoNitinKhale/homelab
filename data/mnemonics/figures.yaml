    facts: "Baruch Spinoza was a Dutch-Jewish philosopher of astonishing originality and integrity, one of the great rationalists of the age. At 23 he was expelled and cursed by his Amsterdam synagogue for his unorthodox views, and thereafter lived a frugal, independent life — turning down money, a professorship and an inheritance — grinding optical lenses to support himself while he wrote.\n\nHis masterpiece, the Ethics, laid out in the austere form of geometry, argued that everything that exists is one single infinite substance which can be called either 'God' or 'Nature' — a pantheism that horrified both Jews and Christians and had him branded a dangerous atheist for a century. He also pioneered the historical, critical reading of the Bible and defended freedom of thought. The glass dust from his lens-grinding is thought to have destroyed his lungs, and he died of a respiratory illness in 1677, aged just 44."
    notes: ["Rationalist author of the Ethics; 'God or Nature' (pantheism); excommunicated; a lens-grinder by trade."]

