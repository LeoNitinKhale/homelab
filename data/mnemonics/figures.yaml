    facts: "Publius Cornelius Scipio, called 'Africanus', was the Roman general who finally defeated Hannibal, the terror who had rampaged through Italy for over a decade. Rather than fight Hannibal in Italy, the young Scipio boldly carried the war to Carthage's own territory in North Africa, forcing Hannibal home to defend it — and there, at the Battle of Zama in 202 BC, he crushed him and ended the Second Punic War, winning his honorific 'Africanus'.\n\nDespite saving Rome, he was later hounded by political rivals who accused him and his brother of corruption. Disgusted by the ingratitude of the state he had served so brilliantly, he withdrew to his country estate in bitter self-imposed exile and, dying around 183 BC (the same year as Hannibal), reportedly ordered that his body be buried there rather than in Rome, with the epitaph 'Ungrateful fatherland, you shall not even have my bones.'"
    notes: ["Defeated Hannibal at Zama (202 BC), ending the Second Punic War; died bitter in self-imposed exile."]

