    facts: "Nikola Tesla was a Serbian-American inventor of dazzling, eccentric genius who pioneered the alternating-current (AC) system that powers the modern world, winning the 'War of the Currents' against Thomas Edison's direct current. He claimed to see his inventions fully formed in vivid flashes, and demonstrated wireless power, radio and remote control decades ahead of their time.\n\nBrilliant but hopeless at business, he was repeatedly out-manoeuvred and died alone and broke in a New York hotel in 1943, obsessed in his final years with pigeons and with schemes for transmitting free energy through the air. Long overshadowed by rivals, he has since become a cult hero, and the unit of magnetic flux density — the tesla — bears his name."
    notes: ["He died 7 Jan 1943, alone in the Hotel New Yorker — the hotel window is real."]

