    facts: "Andreas Vesalius was a Flemish physician who founded the modern science of anatomy. In an age when dissection was frowned upon and doctors simply repeated the 1,400-year-old teachings of the Roman physician Galen, Vesalius insisted on cutting up human corpses himself — sometimes taken from gallows and graves — and discovered that Galen, who had dissected only animals, was wrong on many counts.\n\nIn 1543 he published De humani corporis fabrica ('On the Fabric of the Human Body'), a magnificent, lavishly and accurately illustrated atlas of human anatomy that revolutionised medicine and made him famous across Europe. He became court physician to the Holy Roman Emperor, but his later life is murky: returning from a pilgrimage to Jerusalem in 1564, his ship was wrecked, and he died — apparently of illness and exhaustion — cast ashore on the Greek island of Zakynthos."
    notes: ["De humani corporis fabrica — the foundation of modern anatomy; dissected in person, correcting Galen; died in a shipwreck."]

