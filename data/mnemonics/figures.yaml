    facts: "Christopher Columbus was a Genoese weaver's son and self-taught mariner who spent years hawking a wildly optimistic — and geographically mistaken — plan to reach Asia by sailing west. When Spain's monarchs finally backed him, he crossed the Atlantic in 1492 and made landfall in the Caribbean, convinced to his dying day that he had reached the Indies.\n\nHis voyages opened the Americas to European colonisation and its catastrophic consequences for indigenous peoples, whom he enslaved and brutalised — even his own patrons once had him arrested for misrule. He died in 1506 in Valladolid, wealthy but embittered, still insisting he had found a new route to the East rather than an entire new world."
