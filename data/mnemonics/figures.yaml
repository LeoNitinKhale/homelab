    facts: "Benjamin Franklin was the great all-rounder of the American founding — printer, scientist, inventor, diplomat and wit — who ran away to Philadelphia as a teenager and built himself into a self-made celebrity. His famous (and dangerous) kite experiment helped prove that lightning is electrical, and led to the lightning rod; he also invented bifocals, a clean-burning stove and the glass armonica, and pointedly refused to patent any of them.\n\nAs a statesman he helped draft and signed both the Declaration of Independence and the Constitution, and his charm in Paris secured the crucial French alliance that won the Revolutionary War. Endlessly quotable through his 'Poor Richard's Almanack' ('early to bed and early to rise…'), he was mourned as a sage on both sides of the Atlantic when he died in 1790; some 20,000 people attended his funeral."
    notes: ["Lightning rod, bifocals, a founding father; helped draft and signed the Declaration of Independence."]

