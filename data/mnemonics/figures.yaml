    facts: "Giordano Bruno was an Italian Dominican friar, philosopher and mystic whose cosmic vision was so far ahead of his time that it helped get him killed. Building on Copernicus, he went much further, arguing that the universe is infinite, that the Sun is just one star among countless others, and that those stars have their own planets which might harbour their own life — ideas breathtakingly close to the modern picture of the cosmos.\n\nBut he wrapped them in a heretical, pantheistic mysticism and roamed Europe quarrelling with authorities everywhere. Arrested by the Roman Inquisition and tried for years, he refused to fully recant, and in 1600 was burned alive in Rome's Campo de' Fiori, reportedly with his tongue clamped to stop him speaking to the crowd. Later celebrated as a martyr for free thought and science, he has a statue on the very spot where he died."
    notes: ["Argued for an infinite universe and countless inhabited worlds; burned at the stake by the Inquisition in 1600."]

