    facts: "Arthur Conan Doyle was a struggling young Scottish doctor, waiting for patients who rarely came, when he began writing stories about a coldly logical 'consulting detective' modelled on one of his old medical professors. Sherlock Holmes, with his deerstalker, pipe and dazzling deductions, became a global phenomenon — so beloved that when Doyle killed him off to write 'serious' books, the public outcry forced him to bring Holmes back from the dead.\n\nDoyle himself was an adventurer, sportsman and campaigner who twice helped overturn real-life miscarriages of justice. Devastated by losses in the First World War, he poured his final years and fortune into spiritualism, earnestly defending séances and even the famously faked 'Cottingley Fairies' photographs. He died of a heart attack in 1930, insisting to the last that the dead could speak."
    notes: ["Created Sherlock Holmes; a trained doctor; devoted his later years to spiritualism."]

