    facts: "Ludwig van Beethoven bridged the Classical and Romantic eras and transformed what music could express. A volcanic, untidy, short-tempered genius, he arrived in Vienna as a brilliant young pianist — and then, in his late twenties, began to go deaf, the cruellest fate imaginable for a musician.\n\nRather than give up, he composed some of his greatest works in near-total silence, 'hearing' them only in his mind, and famously had to be turned around at the premiere of his Ninth Symphony to see an ovation he could not hear. He sawed the legs off his piano to feel its vibrations through the floor. He died in 1827, and some ten thousand people are said to have joined his funeral procession."
    notes: []

