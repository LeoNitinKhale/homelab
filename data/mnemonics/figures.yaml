    facts: "Franz Schubert was a short, round, spectacled schoolteacher's son in Vienna who lived almost his entire brief life in the shadow of Beethoven, whom he idolised and served as a torchbearer at his funeral. Painfully shy in public, he blossomed among a devoted circle of friends who threw evenings of music and poetry in his honour — the 'Schubertiades' — where his stream of songs first found an audience.\n\nHe wrote with almost supernatural fluency, producing around six hundred lieder (art-songs) that set German poetry to melodies of heartbreaking beauty, along with symphonies and chamber works. Yet he struggled for money and recognition throughout his life, and died at just thirty-one — most likely of typhoid fever, his health already broken — leaving behind the haunting, incomplete 'Unfinished' Symphony and a mountain of masterpieces the world only fully valued after his death."
    notes: ["Wrote ~600 songs and the 'Unfinished' Symphony; died at 31, probably of typhoid."]

