    facts: "John Locke was an English philosopher and physician often called the 'father of liberalism' and a founder of empiricism — the view that all our knowledge comes from experience, the mind starting as a 'blank slate' (tabula rasa). His political philosophy was even more consequential: he argued that legitimate government rests on the consent of the governed and exists to protect people's natural rights to 'life, liberty and property'.\n\nThose ideas ran straight into the American Declaration of Independence (which echoed his phrasing) and the wider Enlightenment. He also wrote influentially on religious toleration and education. A cautious, private man dogged by ill health, he spent time in political exile in Holland before returning after the Glorious Revolution, and died quietly in 1704 at a friend's house, having done as much as anyone to shape the modern liberal, democratic idea of the state."
    notes: ["Father of liberalism and empiricism; natural rights (life, liberty, property) shaped the US Declaration of Independence. (Death peg 04 is a thin slot — Sewer/Sari only.)"]

