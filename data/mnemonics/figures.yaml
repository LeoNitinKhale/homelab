    facts: "Friedrich Nietzsche was a dazzling young classical scholar — a professor at just twenty-four — before ill health drove him from academia into a wandering life of writing in Alpine boarding houses. In a torrent of aphoristic, explosive books (Thus Spoke Zarathustra, Beyond Good and Evil) he declared that 'God is dead', attacked conventional morality as a trap for the weak, and urged humanity to create its own values and rise toward the 'Übermensch', or Superman.\n\nAlmost unread in his own lifetime, he suffered a total mental collapse in Turin in 1889 — the popular story has him throwing his arms around a horse being flogged in the street — and spent his last eleven years insane, cared for by his family. His sister then edited and distorted his work to fit her own antisemitic, nationalist views, letting the Nazis later hijack his name — a grotesque betrayal of a thinker who had in fact despised both antisemitism and German nationalism."
    notes: ["'God is dead'; the Übermensch; collapsed into insanity in Turin in 1889, died in 1900."]

