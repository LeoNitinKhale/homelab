    facts: "Joseph Mallord William Turner was a barber's son from Covent Garden who became the greatest and strangest of British landscape painters — the 'painter of light'. Fiercely private and famously miserly, he exhibited at the Royal Academy from his teens and grew obsessed with capturing the sublime power of nature: storms, fire, fog and above all sunlight, dissolving solid objects into shimmering colour that anticipated Impressionism by decades.\n\nHe is said to have had himself lashed to a ship's mast in a snowstorm so he could paint it truthfully, and to have added the vivid red buoy to 'The Fighting Temeraire' at the last moment. He spent his final years living semi-secretly under a false name in Chelsea, and died there in 1851; his reported last words were 'The Sun is God.' He left his fortune and hundreds of works to the nation."
    notes: ["'The Sun is God' were reputedly among his last words; the supreme British painter of light and weather."]

