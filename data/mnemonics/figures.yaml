    facts: "Paul Gauguin was a French Post-Impressionist painter whose bold, flat areas of vivid, non-naturalistic colour and his search for a 'primitive' authenticity made him a crucial forerunner of modern art. A successful stockbroker who abandoned business (and eventually his wife and five children) to paint full time, he worked briefly and stormily alongside Vincent van Gogh — a collaboration that ended when van Gogh, in crisis, cut off part of his own ear.\n\nDisgusted with European civilisation, Gauguin sailed to Tahiti and later the remote Marquesas Islands in search of an unspoiled paradise, producing luminous, mysterious paintings of island life and Polynesian women that remain both celebrated and, for his colonial attitudes and relationships with young girls, deeply controversial. His life there was in fact marked by poverty, illness, debt and conflict with the authorities. Ravaged by syphilis, he died alone in the Marquesas in 1903, his reputation soaring only after his death."
    notes: ["Post-Impressionist pioneer; fled to Tahiti; bold flat colour and 'primitivism'; friend and rival of Van Gogh."]

