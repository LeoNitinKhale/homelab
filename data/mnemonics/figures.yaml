    facts: "Anne Frank was a German-born Jewish girl whose diary became one of the most powerful and widely read testaments of the Holocaust. When the Nazis occupied the Netherlands, her family went into hiding in a concealed set of rooms — the 'Secret Annexe' — behind her father's business in Amsterdam, where thirteen-year-old Anne began keeping a diary addressed to an imaginary friend, recording daily life, her fears, her budding adolescence and her remarkable hope for humanity.\n\nAfter more than two years in hiding, the group was betrayed and arrested in 1944 and deported to the concentration camps. Anne died of typhus at Bergen-Belsen in early 1945, aged just fifteen, only weeks before the camp was liberated. Her father Otto, the family's sole survivor, found her diary and had it published; The Diary of a Young Girl has since been translated into some seventy languages, giving an intimate human face to the six million murdered."
    notes: ["Kept a diary in hiding from the Nazis in Amsterdam; murdered in the Holocaust at Bergen-Belsen; her diary is read worldwide."]

