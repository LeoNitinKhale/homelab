    facts: "Johann Wolfgang von Goethe was the towering figure of German literature and, arguably, the last true 'universal genius'. His early novel The Sorrows of Young Werther made him an overnight European sensation and reportedly triggered a wave of copycat suicides; his masterpiece, the two-part drama Faust, about a scholar who bargains with the devil, occupied him for some sixty years.\n\nBut he was far more than a poet: he served for decades as a minister at the court of Weimar (overseeing, among much else, its mines), conducted serious scientific research into plants, anatomy and colour, and mentored a generation of Romantics. He died in 1832, aged 82; his reputed last words, 'Mehr Licht!' ('More light!'), have become famous, though he may simply have been asking someone to open the shutters."
    notes: ["Author of Faust; also a statesman, scientist and mining administrator; last words reputedly 'More light!'"]

