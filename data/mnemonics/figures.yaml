    facts: "William was the illegitimate son of a Norman duke — 'William the Bastard' to his enemies — who survived a violent, treacherous childhood to master Normandy, then staked everything on a claim to the English throne. In 1066 he shipped an army across the Channel and, at the Battle of Hastings, defeated and killed King Harold (by tradition, shot through the eye), changing the course of English history overnight.\n\nHe held his new kingdom down with castles and ruthless force — the 'Harrying of the North' laid whole regions waste — and ordered the Domesday Book, an extraordinary survey of who owned what across England. Enormously overweight in later life, he was fatally injured when his horse threw him against his saddle. His end was as grim as it was memorable: attendants forcing his swollen corpse into a too-small stone sarcophagus burst it open, filling the church with such a stench that the funeral was cut short."
    notes: ["Won England at Hastings, 1066; ordered the Domesday Book; his corpse famously burst at his funeral."]

