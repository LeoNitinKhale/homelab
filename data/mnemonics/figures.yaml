    facts: "Miguel de Cervantes led a life of almost comic misfortune before turning it into the greatest work of Spanish literature. A soldier, he was badly wounded at the naval Battle of Lepanto — losing the use of his left hand, and forever after nicknamed 'the one-handed man of Lepanto' — then captured by Barbary pirates and held as a slave in Algiers for five years until his family could ransom him. Back home he scraped by as a tax collector and was jailed over irregular accounts.\n\nOut of all this came Don Quixote (1605 and 1615), the tale of an ageing gentleman who reads too many chivalric romances, goes gently mad, and rides out as a knight-errant with his earthy squire Sancho Panza — famously charging at windmills he takes for giants. Blending comedy, tragedy and sly realism, it is often called the first modern novel and the most influential book in Spanish. Cervantes died poor in Madrid in 1616, reportedly on the same date as Shakespeare."
    notes: ["Wrote Don Quixote, often called the first modern novel; lost the use of a hand at Lepanto; died in 1616, like Shakespeare."]

