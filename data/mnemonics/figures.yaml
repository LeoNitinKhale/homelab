    facts: "John Keats trained as an apothecary-surgeon before abandoning medicine for poetry, and packed almost his entire body of work into a single miraculous burst — the 'great year' of 1819, when he wrote most of the odes on which his fame rests. Dismissed and mocked by the critics of his own day, he was tormented by poverty and by a passionate, unconsummated love for his neighbour Fanny Brawne.\n\nHe had nursed his mother and brother through tuberculosis, and recognised the disease when it came for him too. Sent to Rome in a last hope of warmer air, he died there in 1821 at just twenty-five, convinced he had failed. He asked for no name on his grave, only the line 'Here lies one whose name was writ in water' — yet he is now counted among the greatest of the English Romantic poets."
    notes: ["Died of TB in Rome at 25; his epitaph reads 'Here lies one whose name was writ in water.'"]

