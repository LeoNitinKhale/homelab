    facts: "Mao Zedong was the revolutionary who founded the People's Republic of China and ruled it until his death, one of the most consequential — and lethal — figures of the twentieth century. A farmer's son turned Communist guerrilla, he led the epic Long March retreat, outlasted both the Japanese invasion and his Nationalist rivals, and proclaimed the new China from Tiananmen Gate in 1949.\n\nHis rule transformed a poor, war-torn country but at horrific cost: the Great Leap Forward, his crash industrialisation drive, triggered the deadliest famine in history, killing tens of millions, and the Cultural Revolution he unleashed in the 1960s plunged the nation into a decade of chaos, persecution and destruction, its 'Little Red Book' of his quotations brandished by fanatical Red Guards. Increasingly frail, he died in Beijing in 1976, leaving a China that would soon change course dramatically."
    notes: ["Founded the People's Republic of China; the Long March and the Little Red Book; the Great Leap Forward famine and the Cultural Revolution."]

