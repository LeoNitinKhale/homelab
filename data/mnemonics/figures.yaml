    facts: "Charlemagne — Charles the Great — was a towering Frankish warrior-king who spent decades on campaign, conquering much of Western and Central Europe and forcibly converting the pagan Saxons at sword-point. On Christmas Day in the year 800, the Pope crowned him Emperor in Rome, reviving the idea of a Western empire that had died with Rome centuries before and founding what would become the Holy Roman Empire.\n\nThough he could barely write himself, he sparked a revival of learning and art — the 'Carolingian Renaissance' — gathering scholars to his court at Aachen, standardising handwriting, and preserving classical texts that might otherwise have been lost. He is often called the 'Father of Europe'. He died of pleurisy in 814 and was buried in his chapel at Aachen, where his stone throne still stands."
    notes: ["First Holy Roman Emperor (crowned 800); the 'Father of Europe'; buried at Aachen."]

