    facts: "Johannes Gutenberg was the German goldsmith and inventor who introduced mechanical movable-type printing to Europe around 1440, one of the most transformative inventions in human history. By combining reusable metal type, an oil-based ink and a modified wine press, he made it possible to produce books quickly and cheaply for the first time, breaking the monopoly of hand-copying monks and scribes.\n\nHis masterpiece was the 'Gutenberg Bible' of the 1450s, a work of astonishing beauty and quality, of which a few precious copies survive. The print revolution he unleashed spread literacy, learning and new ideas across the continent, fuelling the Renaissance, the Reformation and the Scientific Revolution — arguably making the modern world possible. Ironically, Gutenberg himself was a poor businessman: sued by his financier Johann Fust, who seized his workshop, he died in relative obscurity and poverty in Mainz around 1468."
    notes: ["Invented the movable-type printing press (c.1440); printed the Gutenberg Bible; sparked the print revolution; died in poverty."]

