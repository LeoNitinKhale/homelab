    facts: "Cyrus the Great founded the Achaemenid Persian Empire, the largest the world had yet seen, sweeping up Media, Lydia and Babylon in a generation of conquest. Yet he is remembered less for brutality than for an unusual policy of tolerance: he let conquered peoples keep their own customs and religions, and famously freed the Jews from their Babylonian captivity and let them return to rebuild Jerusalem — earning him praise even in the Bible.\n\nThe clay 'Cyrus Cylinder' recording his conquest of Babylon is sometimes hailed as one of the earliest declarations of human rights. According to Herodotus, his luck ran out fighting the nomadic Massagetae on the empire's wild north-eastern frontier around 530 BC; their warrior-queen Tomyris, avenging her son, is said to have plunged his severed head into a skin of blood, telling him to drink his fill."
    notes: ["BC — numbers run backwards (600 BC birth, 530 BC death). Founder of the Persian Empire; the Cyrus Cylinder is often called an early charter of tolerance."]

