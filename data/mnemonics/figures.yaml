    facts: "Louis XIV came to the French throne as a four-year-old and reigned for seventy-two years — the longest of any major European monarch. Styling himself the 'Sun King' around whom all France revolved, he concentrated absolute power in his own hands, tamed the fractious nobility by turning them into courtiers, and (probably apocryphally) summed up his rule as 'L'état, c'est moi' — 'I am the state.'\n\nHe transformed a hunting lodge at Versailles into the most dazzling palace in Europe, a gilded stage-set of mirrors, fountains and rigid etiquette designed to overawe. A keen dancer in his youth, he loved spectacle and made France the cultural capital of the age — while his endless wars and his persecution of French Protestants drained the treasury and sowed trouble for his heirs. Outliving his son and grandson, he died of gangrene in 1715, leaving the throne to his five-year-old great-grandson."
    notes: ["Built Versailles; longest reign in European history (72 years); 'L'état, c'est moi.'"]

