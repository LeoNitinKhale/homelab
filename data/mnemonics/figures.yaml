    facts: "Rodrigo Díaz de Vivar, known as El Cid ('the Lord'), was a Castilian nobleman and warlord who became the greatest folk hero of medieval Spain. A brilliant, pragmatic soldier in the tangled world of the Reconquista — where Christian and Muslim kingdoms fought and allied by turns — he served, was exiled by, and defied his own King Alfonso VI, and even fought for the Muslim rulers of Zaragoza, before carving out an independent principality for himself by conquering the rich city of Valencia in 1094.\n\nHe ruled Valencia until his death in 1099, and his widow Jimena held it for a time after him. His deeds, embroidered into the great Spanish epic El Cantar de mío Cid, made him a national symbol of chivalry and defiance — including the enduring (if legendary) tale that after his death his embalmed body was tied upright onto his horse Babieca and led out at the head of his troops, terrifying the besieging Almoravids into flight."
    notes: ["Legendary Castilian warlord of the Reconquista; took Valencia; by legend his corpse was strapped to his horse to win a final battle."]

