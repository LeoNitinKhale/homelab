    death_peg_num: 41
    death_peg_candidates: ["Root", "Rat", "Rod"]
    facts: "Paracelsus — born Theophrastus von Hohenheim — was a Swiss physician, alchemist and all-round troublemaker who did as much as anyone to drag medicine out of the ancient world. Contemptuous of the revered authorities Galen and Avicenna, he publicly burned their books and insisted that healing should be based on observation and on chemistry rather than on balancing the four 'humours'. He pioneered the medical use of minerals and chemical remedies, and is often called the father of toxicology.\n\nHis most enduring insight was that 'the dose makes the poison' — that any substance can be either medicine or poison depending on the amount — a principle at the heart of pharmacology to this day. Arrogant, hard-drinking and constantly quarrelling (his adopted name means 'greater than Celsus'), he wandered Europe making enemies and cures in equal measure, and died in mysterious circumstances at an inn in Salzburg in 1541."
    notes: ["Pioneer of using chemistry in medicine; 'the dose makes the poison' (toxicology); burned Galen's texts; hugely arrogant."]

