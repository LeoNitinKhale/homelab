    facts: "Michel de Montaigne was a French nobleman and thinker who effectively invented the personal essay — indeed the word 'essay' comes from his French essais, meaning 'attempts' or 'trials'. Retiring in his late thirties from public life to the tower library of his château, he began writing a series of frank, digressive, endlessly curious pieces examining his own thoughts, habits and contradictions, and through them the whole human condition.\n\nRanging over friendship, education, cruelty, death, sex and the workings of his own mind — and questioning everything with his famous motto 'Que sais-je?' ('What do I know?') — he pioneered a warm, sceptical, self-aware voice that feels startlingly modern. His Essays influenced writers and philosophers from Shakespeare to the present day. A moderate and humane figure in an age of savage religious wars, he served as mayor of Bordeaux and died in 1592, reportedly during Mass in his own home."
    notes: ["Invented the personal essay; his Essais ('Que sais-je?' — 'What do I know?'); a sceptical, humane French thinker."]

