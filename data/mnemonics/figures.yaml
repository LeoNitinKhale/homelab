    facts: "Erasmus of Rotterdam was the most celebrated scholar of the northern Renaissance, a Dutch priest and 'prince of the humanists' whose wit, learning and enormous correspondence made him a one-man intellectual network across Europe. His satire In Praise of Folly skewered the ignorance and corruption of monks, theologians and popes, while his scrupulous new edition of the Greek New Testament exposed errors in the Church's official Latin Bible.\n\nBy urging a return to the original sources and a simpler, more inward Christianity, he helped prepare the ground for the Reformation — hence the jibe that 'Erasmus laid the egg that Luther hatched'. Yet when Luther's revolt came, Erasmus, a lover of moderation and unity, refused to join the break with Rome, and clashed with Luther over free will. Caught between the warring camps, he died in Basel in 1536."
    notes: ["Leading Renaissance humanist; wrote In Praise of Folly and a landmark Greek New Testament; 'laid the egg Luther hatched'."]

