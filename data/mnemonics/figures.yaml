    facts: "Emmeline Pankhurst was the fiery leader of the militant British suffragette movement, founder of the Women's Social and Political Union, whose motto was 'deeds, not words'. Frustrated by decades of polite, fruitless campaigning, she led women into direct action — smashing windows, chaining themselves to railings, and enduring arrest, hunger strikes and brutal force-feeding.\n\nReleased and re-arrested over and over under the notorious 'Cat and Mouse Act', she became one of the most divisive and celebrated women of her age. She died in 1928 — just weeks before Parliament finally granted women the vote on fully equal terms with men, the cause to which she had given her life."
