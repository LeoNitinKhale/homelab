    facts: "Ivan IV of Russia — 'the Terrible', better rendered as 'the Formidable' or 'Awe-inspiring' — was the first ruler crowned Tsar of all Russia. He began as an energetic reformer who expanded the realm enormously, but the death of his beloved wife and a near-fatal illness seem to have tipped him into savage paranoia.\n\nHe created the oprichnina, a state-within-a-state policed by black-clad enforcers who terrorised and slaughtered the nobility, and personally oversaw the brutal sack of Novgorod. In one notorious fit of rage he struck and killed his own son and heir with an iron staff. Increasingly ill and tormented, he died in 1584, reportedly collapsing just as he sat down to a game of chess."
    notes: ["First crowned Tsar of Russia; killed his own son in a rage; died (of a stroke) reportedly as he sat down to chess."]

