    facts: "Drake was a Devon farmer's son who became Elizabeth I's favourite sea-dog — a national hero to the English and a bloodthirsty pirate to the Spanish, who called him 'El Draque', the Dragon, and put a bounty on his head. In the Golden Hind he became the first Englishman to sail around the world, returning laden with plundered Spanish treasure; the Queen knighted him on the deck of his own ship.\n\nLegend has him coolly finishing a game of bowls on Plymouth Hoe as the Spanish Armada approached in 1588, insisting there was 'time to finish the game and beat the Spaniards too' — and he played a leading part in the fireships and running battles that broke the invasion. His luck ran out on a final raiding voyage to the Caribbean, where dysentery killed him; he was buried at sea off Panama in a lead coffin that treasure-hunters still search for today."
    notes: ["Second to circumnavigate the globe; harried the Armada; died of dysentery and was buried at sea, 1596."]

