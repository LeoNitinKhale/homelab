    facts: "Aristarchus of Samos was an ancient Greek astronomer and mathematician who made one of the most breathtaking intellectual leaps in history: he proposed that the Sun, not the Earth, lies at the centre of the cosmos, and that the Earth both spins on its axis and orbits the Sun — a heliocentric model some eighteen centuries before Copernicus.\n\nHe also devised ingenious geometric methods to estimate the relative sizes and distances of the Sun and Moon, concluding (roughly, and with the crude instruments of his day) that the Sun was far larger than the Earth — perhaps a clue to why he thought it should sit at the centre. His radical idea was rejected in favour of the Earth-centred view for nearly two thousand years, and most of his writings are lost, but he is remembered as the man who guessed the truth far too early."
    notes: ["Proposed a Sun-centred (heliocentric) universe some 1,800 years before Copernicus."]

