    facts: "John Maynard Keynes was the most influential economist of the twentieth century, whose ideas reshaped how governments manage their economies. Reacting to the mass unemployment of the Great Depression, he argued in his 1936 General Theory that markets do not automatically self-correct, and that governments should actively spend — running deficits if necessary — to boost demand and pull economies out of slumps. 'In the long run,' he famously quipped of those who counselled patience, 'we are all dead.'\n\nA dazzling, many-sided figure — Cambridge don, member of the artistic Bloomsbury Group, ballet-loving patron, and a shrewd if volatile speculator who made and lost fortunes — he also warned prophetically that the harsh terms imposed on Germany after the First World War would breed catastrophe. At the end of the Second World War he helped design the Bretton Woods system of international finance; the strain wrecked his health, and he died of a heart attack in 1946. 'Keynesian' economics went on to dominate policy for decades."
    notes: ["Founder of Keynesian economics — government spending to counter recessions; helped design the post-war Bretton Woods system."]

