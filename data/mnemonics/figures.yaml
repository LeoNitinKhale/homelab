    facts: "George Orwell — pen name of Eric Blair — was an English writer whose two late masterpieces gave the twentieth century its vocabulary for tyranny. After serving as a colonial policeman in Burma (which he came to loathe), deliberately living among the destitute, and fighting and being shot through the throat in the Spanish Civil War, he became a fierce, clear-eyed critic of totalitarianism of every stripe.\n\nAnimal Farm (1945) skewered the betrayal of the Russian Revolution as a barnyard fable, while Nineteen Eighty-Four (1949) imagined a future of total surveillance and thought control, coining Big Brother, doublethink, thoughtcrime, the Thought Police and 'Orwellian' itself. Already gravely ill with tuberculosis as he finished it, typing in a cold Scottish farmhouse, he died in a London hospital in 1950 at just 46 — his warning about the corruption of truth more quoted with every passing decade."
    notes: ["Animal Farm and Nineteen Eighty-Four; coined Big Brother, doublethink and thoughtcrime; died of TB in 1950."]

