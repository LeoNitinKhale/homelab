    facts: "Hans Christian Andersen was a Danish author who rose from desperate poverty — a washerwoman's and cobbler's son with almost no schooling — to become one of the most beloved storytellers in history. Awkward, gangly and painfully sensitive (his own life mirrored The Ugly Duckling), he wrote novels, plays and travel books, but it is his fairy tales, published from 1835, that made him immortal.\n\nUnlike the folk tales gathered by the Brothers Grimm, Andersen mostly invented his own — The Little Mermaid, The Ugly Duckling, The Emperor's New Clothes, The Snow Queen, The Little Match Girl, Thumbelina — blending whimsy, heartbreak and sly social satire in stories that work for children and adults alike. Translated into scores of languages, they have inspired countless films and ballets. He was celebrated as a national treasure by the time he died in 1875, and a statue of his Little Mermaid still watches over Copenhagen's harbour."
    notes: ["Danish author of beloved fairy tales — The Little Mermaid, The Ugly Duckling, The Emperor's New Clothes, The Snow Queen."]

