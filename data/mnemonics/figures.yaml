    facts: "Kublai Khan was the grandson of Genghis Khan who completed the Mongol conquest of China and founded the Yuan dynasty, becoming the first non-Chinese to rule all of China. Presiding over the largest contiguous empire in history, he moved his capital to what is now Beijing and adopted many Chinese ways of governing, while his summer capital, Shangdu ('Xanadu'), became a byword for exotic splendour — immortalised centuries later in Coleridge's poem.\n\nIt was to Kublai's cosmopolitan court that the young Venetian Marco Polo claimed to have travelled and served for years, bringing astonishing tales back to Europe. Kublai's later reign was marred by costly failed invasions of Japan (thwarted by the 'divine wind', or kamikaze) and by personal grief; heartbroken by the deaths of his favourite wife and chosen heir, he ate and drank himself into obesity and gout, and died in 1294."
    notes: ["Grandson of Genghis Khan; founded China's Yuan dynasty; his Xanadu inspired Coleridge; hosted Marco Polo."]

