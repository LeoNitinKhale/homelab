    facts: "Galen of Pergamon was a Greek physician, surgeon and philosopher in the Roman Empire whose theories dominated Western and Islamic medicine for well over a thousand years. Beginning as a doctor to gladiators — which gave him a grim education in wounds and anatomy — he rose to become personal physician to several Roman emperors, and wrote a staggering quantity of works on anatomy, physiology, pharmacology and philosophy.\n\nThrough careful (if animal-based) dissection he made real discoveries about the nervous system, arteries and muscles, but he also entrenched errors — especially the ancient theory of the four 'humours' (blood, phlegm, black and yellow bile) whose balance supposedly governed health. Because so much of his vast output survived and carried such authority, his mistakes went largely unchallenged until Vesalius and Harvey overturned them in the Renaissance. He died around 216 AD, the towering medical authority of antiquity."
    notes: ["Prolific Greek-Roman physician; the theory of the four humours; his authority dominated medicine for ~1,400 years."]

