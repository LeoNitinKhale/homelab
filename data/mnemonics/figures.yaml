    facts: "Werner Heisenberg was a German physicist and one of the principal architects of quantum mechanics, the theory that governs the subatomic world. In 1925, recovering from hay fever on the barren island of Heligoland, the 23-year-old worked out 'matrix mechanics', the first complete formulation of quantum theory, and two years later stated his famous Uncertainty Principle: that there is a fundamental limit to how precisely one can simultaneously know a particle's position and its momentum — a fuzziness built into reality itself, not just our instruments.\n\nAwarded the Nobel Prize at 31, he became a controversial figure during the Second World War as the scientific head of Nazi Germany's nuclear-weapons research, which failed to build a bomb — whether through incompetence, lack of resources, or deliberate foot-dragging is still debated. After the war he helped rebuild West German science and philosophised about the meaning of quantum theory, dying of cancer in Munich in 1976."
    notes: ["Formulated the Uncertainty Principle and matrix mechanics; a founder of quantum theory; led the German wartime nuclear programme."]

