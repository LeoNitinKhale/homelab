    facts: "Pablo Picasso was the most famous and influential artist of the twentieth century — a Spanish prodigy who could draw like an old master as a child and then spent seventy years relentlessly reinventing art. He moved through his melancholy Blue and Rose periods before, around 1907, co-inventing Cubism with Georges Braque, shattering the single fixed viewpoint that painting had used since the Renaissance and depicting objects as fractured, multi-angled planes.\n\nAstonishingly prolific across painting, sculpture, ceramics and printmaking, he produced tens of thousands of works, including 'Guernica', his searing black-and-white protest against the bombing of a Basque town in the Spanish Civil War. Famous too for his tangled love life and larger-than-life personality, he kept working almost until the day he died in 1973, aged 91, having done more than anyone to shape modern art."
    notes: ["Co-founder of Cubism; painted Guernica; one of the most prolific and influential artists of the 20th century."]

