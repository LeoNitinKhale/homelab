    facts: "F. Scott Fitzgerald was the golden boy and chief chronicler of the American 'Jazz Age' — a term he coined — capturing the glittering excess, romantic yearning and hollow disillusion of the 1920s. His masterpiece, The Great Gatsby (1925), the story of the mysterious millionaire Jay Gatsby and his obsessive love for Daisy, symbolised by the green light across the bay, is now regarded as one of the great American novels, though it sold only modestly in his lifetime.\n\nHis own life mirrored his themes: he and his glamorous, unstable wife Zelda lived a whirlwind of parties, fame and reckless spending on both sides of the Atlantic, but it curdled into alcoholism, Zelda's mental breakdown and financial desperation. As his popularity faded in the 1930s he ended up writing screenplays in Hollywood, and died there of a heart attack in 1940, aged just 44, convinced he was a failure. His reputation soared after his death."
    notes: ["The Great Gatsby; chronicler of the Jazz Age; died believing himself a forgotten failure, later hailed as a classic."]

