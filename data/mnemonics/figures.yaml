    facts: "Rudyard Kipling was a British writer and poet, born in India, who became the great literary voice of the British Empire at its height — and the youngest ever winner of the Nobel Prize in Literature, in 1907. His enduringly popular works include The Jungle Book (with the boy Mowgli raised by wolves), the Just So Stories, the novel Kim, and poems like the stoic 'If—', often voted Britain's favourite poem, and 'Gunga Din'.\n\nA masterful storyteller who captured the sights, sounds and slang of colonial India and the lives of ordinary soldiers, he was also, controversially, a fervent champion of imperialism (coining 'the white man's burden'), which has complicated his reputation ever since. Devastated by the death of his only son in the First World War — a loss for which he partly blamed his own war-fever — he wrote poignant later verse before dying of a perforated ulcer in 1936."
    notes: ["The Jungle Book, 'If—', Kim; poet of the British Empire; the youngest winner of the Nobel Prize in Literature (1907)."]

