    scene: "Eighteen-year-old Mary, in a ghost-story contest at a stormy Swiss villa, dreams up a **book** like no other — Frankenstein, the scientist who steals the spark of life. She stands up and opens it and the monster steps out with a glowing heart. People say 'Looks like he was bought at **Lidl**!'. She turns into the **lady** monster he never had and that same reanimating **light** finally gutters and goes out as, widowed and ill, she collapses and dies alongside the monster as his consort."
    position: "The book of Frankenstein conceived and written, held up in front — birth (creating) action; carries 97. The spark-light extinguished as she dies, low; carries 51."
    facts: "Mary Shelley was the daughter of two radical thinkers — the pioneering feminist Mary Wollstonecraft, who died giving birth to her, and the philosopher William Godwin. At sixteen she eloped with the married poet Percy Bysshe Shelley, and two years later, during a wet, gloomy summer at Lord Byron's Villa Diodati on Lake Geneva, the group challenged one another to write ghost stories.\n\nFrom a waking nightmare, the teenage Mary produced Frankenstein — the tale of a scientist who assembles and reanimates a creature, then recoils in horror from it — often called the first true science-fiction novel and a profound meditation on ambition and responsibility. Her later life was marked by tragedy: the drowning of Percy and the deaths of three of her four children. She kept writing, guarded her husband's legacy, and died of a brain tumour in 1851."
    notes: ["Wrote Frankenstein at 18 after a ghost-story challenge at the Villa Diodati; daughter of Mary Wollstonecraft."]
