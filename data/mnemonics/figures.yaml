    facts: "Thomas Aquinas was the towering theologian and philosopher of the Middle Ages, a Dominican friar who set out to reconcile the newly rediscovered philosophy of Aristotle with Christian doctrine — arguing that reason and faith, properly used, could never truly conflict. A huge, quiet man mocked by fellow students as the 'Dumb Ox', he became the most systematic thinker of his age, and his teacher reportedly predicted his 'bellowing' would one day be heard around the world.\n\nHis masterwork, the Summa Theologica, is a vast, meticulously argued exploration of God, morality, law and salvation that remains foundational to Catholic thought today, including his famous 'Five Ways' of arguing for God's existence. Near the end of his life a profound mystical experience during Mass left him declaring that all he had written seemed 'like straw', and he stopped work; he died in 1274 and was later canonised as a saint and declared a Doctor of the Church."
    notes: ["Greatest medieval theologian; the Summa Theologica fused Aristotle with Christianity; a Dominican friar, nicknamed 'the Dumb Ox'."]

