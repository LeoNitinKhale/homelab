    facts: "Hippocrates of Kos was the ancient Greek physician remembered as the 'father of medicine' for insisting — radically, in an age of temple-priests — that diseases had natural causes that could be studied, rather than being punishments from the gods. He and his followers observed patients closely, kept case records, and emphasised rest, diet, cleanliness and, above all, 'first, do no harm'.\n\nHis school's theory that the body was governed by four 'humours' (blood, phlegm, black and yellow bile) dominated Western medicine for two thousand years, long after it had been shown wrong. The famous Hippocratic Oath, in which doctors pledge to act ethically, bears his name and is still echoed at medical graduations today. Little is known for certain about his life, but he is said to have lived to a great age, dying around 370 BC."
    notes: ["The 'father of medicine'; the Hippocratic Oath and the theory of the four humours are attributed to him."]

