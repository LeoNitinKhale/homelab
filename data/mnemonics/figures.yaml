    facts: "Charlie Chaplin was the defining figure of silent cinema and one of the most famous people on Earth in the 1920s and 30s — a writer, director, composer and comic genius who rose from desperate poverty in Victorian London to worldwide fame. His creation, the 'Little Tramp' — bowler hat, cane, baggy trousers and a heart of gold — was recognised and loved across every culture and language, blending slapstick with genuine pathos.\n\nA perfectionist who controlled every aspect of his films, he made classics including The Kid, City Lights, Modern Times (a satire of industrial dehumanisation) and The Great Dictator, in which he mocked Hitler. His radical politics and colourful private life made him enemies, and during the McCarthy-era Red Scare he was effectively exiled from the United States, settling in Switzerland. Knighted late in life and given an honorary Oscar, he died peacefully on Christmas Day 1977."
    notes: ["The Little Tramp; the biggest star of silent film; Modern Times, The Great Dictator; exiled from the US during the Red Scare."]

