    facts: "Winston Churchill packed several lifetimes into one — cavalry officer, war correspondent who escaped a Boer prison camp, painter, bricklayer, Nobel-winning historian, and a politician written off as finished more than once. Then, in 1940, at sixty-five, he became Prime Minister at Britain's darkest hour and, through sheer defiance and thunderous oratory, rallied the country to fight on alone against Nazi Germany.\n\nBulldog-stubborn, cigar-chomping and prone to the black moods he called his 'black dog', he was voted out almost as soon as the war was won, returned as PM in the 1950s, and lived to be given a state funeral in 1965. His reputation is shadowed by his diehard imperialism, but his wartime leadership remains legendary."
