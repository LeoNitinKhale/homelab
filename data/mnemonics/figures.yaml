    facts: "Zheng He was a Chinese admiral, diplomat and court eunuch who led the greatest maritime expeditions the world had yet seen, nearly a century before the European Age of Discovery. Captured and castrated as a boy and rising to become a trusted commander under the Ming Emperor Yongle, he led seven enormous voyages between 1405 and 1433 with a 'treasure fleet' of hundreds of ships and tens of thousands of men, ranging across Southeast Asia, India, Arabia and the east coast of Africa.\n\nHis largest 'treasure ships' were, by many accounts, vastly bigger than the vessels Columbus would later sail, and the expeditions were designed to display Ming power, secure trade and tribute, and bring exotic goods and envoys back to China — including, famously, a giraffe presented to the emperor. Shortly after his death (probably during or just after the final voyage, around 1433), China turned inward and abandoned such ventures, leaving Zheng He's astonishing achievements to fade until modern times."
    notes: ["Ming admiral of the vast 'treasure fleet'; sailed to India, Arabia and East Africa; his ships dwarfed European ones."]

