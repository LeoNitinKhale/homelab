    facts: "Agatha Christie is the best-selling novelist of all time — only the Bible and Shakespeare are said to have outsold her — the undisputed 'Queen of Crime' who published 66 detective novels and shaped the whole genre of the whodunit. She created two of fiction's most beloved sleuths, the fastidious Belgian detective Hercule Poirot and the sharp-eyed village spinster Miss Marple, and mastered the fair-but-fiendish puzzle with its last-page twist (most audaciously in The Murder of Roger Ackroyd).\n\nHer own life held one genuine mystery: in 1926, distraught over her husband's affair, she disappeared for eleven days, sparking a national manhunt before being found at a spa hotel — an episode she never explained. A keen traveller (Murder on the Orient Express and Death on the Nile drew on her journeys), she also wrote the record-breaking play The Mousetrap, still running after seventy years. She died, much honoured, in 1976."
    notes: ["Best-selling novelist of all time; created Poirot and Miss Marple; Murder on the Orient Express; her own 11-day disappearance in 1926."]

