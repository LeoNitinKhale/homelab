    facts: "Magellan was a Portuguese navigator who, snubbed by his own king, offered his services to Spain and set out in 1519 with five ships to find a westward route to the spice islands. The voyage was an ordeal of mutiny, starvation and scurvy: he crushed a rebellion, discovered the treacherous strait at the tip of South America that now bears his name, and then crossed the vast, uncharted Pacific — so calm after the strait that he named it — with his men reduced to eating rats and leather.\n\nHe never completed the journey. On the island of Mactan in the Philippines he waded ashore to subdue a local chief and was overwhelmed and killed in the surf. Of the five ships and some 270 men who set out, a single battered vessel, the Victoria, limped back to Spain three years later with just eighteen survivors — the first human beings to circle the Earth."
    notes: ["Led the first circumnavigation but was killed at the Battle of Mactan; his surviving crew completed it."]

