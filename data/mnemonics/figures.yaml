    facts: "Erwin Rommel was a German field marshal of the Second World War, popularly known as the 'Desert Fox' for the daring and cunning of his command of the Afrika Korps in the North African desert campaign. A gifted, aggressive tactician of mobile armoured warfare who had first made his name in the swift 1940 conquest of France, he ran rings around larger Allied forces in Libya and Egypt until finally being worn down at El Alamein and by overwhelming supply problems.\n\nUnusually for an enemy commander, he earned widespread respect from his opponents for his skill and his relatively chivalrous conduct, and his reputation was later burnished into a myth of the 'clean' Wehrmacht general untainted by Nazi crimes. Implicated (though his exact role is debated) in the July 1944 bomb plot to assassinate Hitler, he was given a choice by the regime: stand trial, or take cyanide and be spared, with his family protected and a hero's state funeral. He chose suicide, dying in October 1944, his true fate concealed from the public at the time."
    notes: ["The 'Desert Fox' of WWII North Africa; respected by both sides; forced to suicide over the July plot against Hitler."]

