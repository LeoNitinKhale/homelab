    scene: "Wearing a cap with \"E=MC²\" on it. Looks down and touches water with lilies floating on it; ripples radiate out like spacetime ripples."
    position: "cap on his head — birth position, front. Looking down to the water — death position. \"Touches\" isn't a listed death verb; mild looseness, not a conflict."
    facts: "Albert Einstein was an obscure patent clerk in Bern, turned down for academic posts, when in his 'miracle year' of 1905 he published four papers that overturned physics — including special relativity and E=mc². A decade later general relativity reimagined gravity as the bending of space and time itself, confirmed when starlight was seen to bend around the sun during the 1919 eclipse, making him the world's first scientific superstar.\n\nA lifelong pacifist and, from 1933, a refugee from Nazi Germany, he settled at Princeton and reluctantly signed the letter that spurred the atomic bomb — a step he later regretted. He spent his last decades chasing a unified theory he never found, declined the presidency of Israel, and died in 1955 of an aortic aneurysm, refusing surgery."
    notes: []

