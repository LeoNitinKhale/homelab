    facts: "Franklin Delano Roosevelt led the United States through its two greatest twentieth-century crises — the Great Depression and the Second World War — and is the only president ever elected four times. His 'New Deal' remade the American state with jobs programmes, social security and financial regulation, while his warm, reassuring radio 'fireside chats' spoke directly into millions of homes.\n\nStricken by polio at 39, he was largely unable to walk and went to great lengths to hide it from the public, projecting confidence from a wheelchair. He guided the Allied war effort and helped shape the post-war order at conferences with Churchill and Stalin, but the strain was immense: he died of a stroke in April 1945, just weeks before the final victory in Europe that he had done so much to secure."
    notes: ["Only US president elected four times; led through the Depression and WWII; governed from a wheelchair after polio."]

