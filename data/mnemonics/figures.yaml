    facts: "Nelson was a small, sickly, chronically seasick clergyman's son who became the most daring naval commander in British history. He lost the sight of one eye at Corsica and his right arm at Tenerife, and famously put his telescope to his blind eye at Copenhagen so he could claim not to have seen the order to withdraw — then won the battle anyway.\n\nHis scandalous, adoring affair with Emma, Lady Hamilton, was the talk of Europe. At Trafalgar in 1805 he broke the combined French and Spanish fleets in a single decisive action, hoisting the signal 'England expects that every man will do his duty' — but was shot by a sniper from the rigging as he paced the quarterdeck of HMS Victory in full dress uniform. He lived just long enough to learn the victory was won, murmuring 'Thank God I have done my duty,' and his body was brought home preserved in a barrel of brandy."
    notes: ["Lost an arm and the sight in one eye in earlier battles; killed by a sniper at Trafalgar, 1805."]

