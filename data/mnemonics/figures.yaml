    facts: "Frederick II of Prussia, called Frederick the Great, was an eighteenth-century king who turned the modest state of Prussia into a major European power through military genius and administrative reform. A bold and innovative general, he won a string of remarkable victories in the War of the Austrian Succession and the Seven Years' War, often outnumbered, seizing the rich province of Silesia and cementing Prussia's status as a great power.\n\nHe was also a leading example of the 'enlightened despot': he reformed the law and bureaucracy, promoted religious tolerance and education, drained marshes and encouraged agriculture (championing the humble potato), and corresponded with philosophers, most famously Voltaire. A cultured man who played and composed for the flute, wrote in French and preferred the company of his beloved greyhounds to court ceremony, he built the elegant palace of Sanssouci as a retreat. He died there in 1786, exhausted, and was eventually buried, as he wished, beside his dogs."
    notes: ["King of Prussia; brilliant military commander; enlightened despot, flute player and friend of Voltaire; palace of Sanssouci."]

