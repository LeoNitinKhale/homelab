    facts: "Pythagoras of Samos is one of history's most influential and mysterious figures — a philosopher and mathematician who left no writings, so that fact and legend are hopelessly tangled. He is credited with the theorem that bears his name (that the square on a right triangle's longest side equals the sum of the squares on the other two), and with the profound discovery that musical harmony can be expressed as simple whole-number ratios, suggesting the whole universe was built on number.\n\nHe founded a secretive religious brotherhood that believed in the transmigration of souls and followed strange rules — most famously a taboo against eating beans. Tradition holds that when his enemies attacked, he was cornered and killed because he refused to escape across a field of beans, though the many versions of his death only deepen the myth around him, around 495 BC."
    notes: ["BC. The Pythagorean theorem; founded a mystical number-cult; legendarily died refusing to cross a bean field."]

