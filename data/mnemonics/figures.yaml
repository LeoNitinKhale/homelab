    facts: "William Caxton was an English merchant, diplomat and writer who introduced the printing press to England and so transformed the spread of the written word. Having spent years as a cloth trader in Bruges, he learned the new German art of printing, produced the first-ever book printed in English (a history of Troy) abroad, and in 1476 set up his own press at Westminster — the first in England.\n\nOver the following years he printed around a hundred books, choosing and often translating them himself, including Chaucer's Canterbury Tales, Malory's Le Morte d'Arthur and much else. By selecting which works to print, and in which dialect, he helped standardise English spelling and grammar and made literature far cheaper and more widely available than the hand-copied manuscripts of the monastic scriptoria he replaced. He worked at his press until his death around 1491."
    notes: ["Set up England's first printing press (1476); printed the first books in English, including The Canterbury Tales."]

