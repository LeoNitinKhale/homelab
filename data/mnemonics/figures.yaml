    facts: "Galileo Galilei was the Italian physicist and astronomer often called the father of modern science for insisting that nature be read through experiment and mathematics. Hearing of a new Dutch invention, he built his own telescope and turned it on the heavens — discovering craters on the Moon, the four largest moons of Jupiter, and the phases of Venus, all pointing to an Earth that moves around the Sun.\n\nHis championing of Copernicus brought him before the Roman Inquisition, which forced him under threat to recant — he is said to have muttered 'and yet it moves'. He spent his last years under house arrest and blind, dying in 1642, the year Newton was born; the Church formally conceded he had been right only in 1992."
