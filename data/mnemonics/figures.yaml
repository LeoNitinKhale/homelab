    facts: "Louis Pasteur was a French chemist whose work saved untold millions of lives by proving that microscopic germs — not 'bad air' or spontaneous generation — cause disease and fermentation. He showed that gently heating liquids killed the microbes that spoiled them, a process now called pasteurisation, and rescued the French wine, beer and silk industries in the process.\n\nHe went on to develop vaccines by weakening the germs themselves, most dramatically saving a nine-year-old boy bitten by a rabid dog with the first rabies vaccine in 1885 — a huge public gamble that made him a national hero. Half-paralysed by strokes for much of his later life, he kept working, and died in 1895; the Pasteur Institute continues his fight against disease to this day."
    notes: ["Founder of germ theory and vaccination; 'pasteurisation' bears his name."]

