    facts: "Augustine of Hippo was one of the most influential thinkers in the history of Western Christianity — a philosopher and bishop in Roman North Africa whose ideas shaped Christian theology for over a thousand years. In his Confessions, one of the first true autobiographies, he laid bare his misspent, pleasure-seeking youth (including the famous prayer 'Lord, make me chaste — but not yet') before his dramatic conversion, wrestling honestly with sin, memory, time and desire.\n\nHis vast City of God, written as the Roman Empire reeled from the sack of Rome, argued that Christians belong ultimately to an eternal heavenly city rather than any earthly one, reframing history itself. He developed enduring doctrines of original sin and divine grace. He died in 430 as Vandal armies besieged his own city of Hippo, at the very end of the classical world he had done so much to reinterpret."
    notes: ["Author of the Confessions and City of God; one of the most influential Christian theologians; died as the Vandals besieged Hippo."]

