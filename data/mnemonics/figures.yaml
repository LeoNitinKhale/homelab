    facts: "John Steinbeck was an American novelist who gave enduring literary voice to the poor, the dispossessed and the working people of his native California and beyond, especially during the Great Depression. His masterpiece, The Grapes of Wrath (1939), followed the Joad family of 'Okie' farmers driven off their Dust Bowl land and westward to California in search of work, a searing portrait of hardship and injustice that won the Pulitzer Prize and stirred national controversy.\n\nAcross a string of humane, powerful books — Of Mice and Men, Cannery Row, East of Eden — he combined social conscience with warm, earthy storytelling and a deep feeling for the land. He was awarded the Nobel Prize in Literature in 1962, and later reported from the front lines of the Vietnam War. He died of heart disease in New York in 1968, one of the most widely read and taught of all American authors."
    notes: ["The Grapes of Wrath, Of Mice and Men, East of Eden; chronicler of the Great Depression's poor; 1962 Nobel laureate."]

