    facts: "Chopin was a child prodigy in Warsaw who left Poland at twenty, just before a failed uprising against Russian rule — and never returned, carrying a silver goblet of Polish soil with him into a life of exile in Paris. Frail and famously private, he hated large concert halls and preferred to play in candlelit salons, where his nocturnes, mazurkas and études redefined what the piano could do.\n\nHe conducted a stormy, celebrated affair with the cross-dressing novelist George Sand, whose care sustained him through years of worsening tuberculosis. He died in Paris at just thirty-nine. At his own request his heart was removed, preserved in alcohol, and smuggled past the Russian authorities by his sister back to Warsaw, where it remains sealed inside a church pillar to this day."
    notes: ["Chopin's heart really was removed and taken to Warsaw at his request; he died of TB (or a related illness)."]

