    facts: "Nero became emperor at sixteen and began well enough under the guidance of his tutor, the philosopher Seneca — but power curdled him. He is remembered for murdering his own mother, kicking his pregnant wife to death, persecuting Christians as scapegoats, and above all for the Great Fire of Rome in AD 64, during which he was rumoured (almost certainly falsely) to have 'fiddled' while the city burned.\n\nHe fancied himself a great artist and athlete, forcing crowds to sit through his lyre recitals and rigging the Olympic Games in his own favour. When the army and Senate finally turned against him and declared him a public enemy, he fled the city and, unable to do the deed himself, had a servant help him take his own life — lamenting, according to Suetonius, 'Qualis artifex pereo' — 'What an artist dies in me.'"
    notes: ["'Fiddled while Rome burned' is legend; the deathbed line ('Qualis artifex pereo') is from Suetonius."]

