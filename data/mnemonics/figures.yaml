    facts: "Alexander von Humboldt was a Prussian naturalist and explorer whose epic five-year expedition through South America (1799–1804) laid the foundations of modern geography, ecology and climate science. He climbed volcanoes, hacked through jungles collecting thousands of specimens, measured temperature, pressure and magnetism obsessively, and was among the first to grasp nature as a single interconnected web — an idea far ahead of its time.\n\nWildly famous in his day — more places are named after him than after anyone else, from the Humboldt Current to a sea on the Moon — he poured his fortune into science and his final decades into Cosmos, a sweeping attempt to describe the entire physical universe. He died in Berlin in 1859, the same year that Darwin, whom he had inspired, published On the Origin of Species."
    notes: ["Pioneering naturalist-explorer; the Humboldt Current and countless species and places are named after him; inspired Darwin."]

