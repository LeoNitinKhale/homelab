    facts: "Suleiman I ruled the Ottoman Empire for forty-six years at the very peak of its power and splendour, which is why Europeans called him 'the Magnificent'. Under him the Ottomans took Belgrade and Rhodes, crushed the Hungarians at Mohács, besieged Vienna, and dominated the Mediterranean, ruling a vast, wealthy and cosmopolitan empire spanning three continents.\n\nTo his own subjects, though, he was Kanuni — 'the Lawgiver' — for his sweeping overhaul of the Ottoman legal, educational and tax systems. A poet and patron who filled Istanbul with the masterpieces of the architect Sinan, he was also ruthless in power, having his own able son and heir strangled on suspicion of plotting. He died in 1566 in his tent during yet another Hungarian campaign, his death kept secret from the army for weeks to preserve morale."
    notes: ["The longest-reigning Ottoman sultan; known to his own people as 'the Lawgiver' (Kanuni); died on campaign in Hungary."]

