    facts: "Jane Austen spent her quiet life in the villages of Georgian England, yet turned the small world of drawing-rooms, marriage and money into some of the sharpest, wittiest novels ever written — Pride and Prejudice, Sense and Sensibility, Emma. She wrote in secret at a small table, hiding her pages when a deliberately creaky door warned of visitors, and published anonymously as 'By a Lady'.\n\nHer irony and psychological insight were quietly revolutionary, though she earned little in her lifetime and her authorship was revealed to the public only after her death. She died in 1817 at just forty-one, of an illness still argued over (Addison's disease and lymphoma among the theories), her last novels published posthumously by her brother."
