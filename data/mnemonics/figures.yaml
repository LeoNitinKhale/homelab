    facts: "Tolstoy was born to enormous wealth — a count with a vast estate and hundreds of serfs — and spent his youth gambling, drinking and soldiering, seeing real combat as an artillery officer in the Crimean War. Out of that experience, and his aristocratic world, came the two novels often called the greatest ever written: the epic War and Peace and the tragic Anna Karenina.\n\nIn middle age he underwent a shattering spiritual crisis and reinvented himself as a radical Christian anarchist and pacifist, renouncing his wealth, dressing as a peasant, and preaching non-violent resistance — ideas that would directly inspire Gandhi and Martin Luther King. His new beliefs wrecked his marriage, and at eighty-two, seeking to escape it and live simply, he fled his home in the dead of night. He fell ill and died days later in the stationmaster's house at the remote railway halt of Astapovo, as the world's press gathered outside."
    notes: ["He served as an artillery officer at the naval siege of Sevastopol; died at Astapovo station after abandoning his estate."]

