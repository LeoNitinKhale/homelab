    facts: "Ernest Shackleton was an Anglo-Irish explorer whose greatest achievement was, technically, a failure. His 1914 expedition to cross Antarctica ended when his ship, the aptly named Endurance, was trapped and slowly crushed by pack ice, stranding his men on the drifting floes.\n\nWhat followed became legend: months camped on the ice, an escape by lifeboat to desolate Elephant Island, and then Shackleton's own 800-mile open-boat voyage across the most dangerous seas on Earth to South Georgia, followed by the first-ever crossing of its uncharted mountains to reach help. Astonishingly, he brought back every single one of his 27 men alive. He died of a heart attack in 1922 at South Georgia, on his way to yet another Antarctic expedition, and was buried there at his widow's request."
    notes: ["Led the Endurance expedition; when his ship was crushed by ice he brought every one of his men home alive; died of a heart attack heading south again."]

