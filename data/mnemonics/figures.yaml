    facts: "Confucius grew up poor after his father died when he was three, working humble jobs before becoming a teacher who would accept any student earnest enough to learn. He wandered from state to state offering rulers a radical idea: that good government came not from force but from the moral character of those in charge, cultivated through education, ritual and respect for family and elders.\n\nIn his own lifetime he was largely a failure — few rulers took his advice, and he died thinking his mission unfulfilled. But his students preserved his sayings in the Analects, and over the following centuries 'Confucianism' became the ethical backbone of Chinese civilisation and much of East Asia, shaping its schools, families and governments for more than two thousand years."
    notes: ["Wrote little himself — the Analects were compiled by his pupils."]

