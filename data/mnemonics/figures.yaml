    facts: "Sigmund Freud was the Austrian neurologist who founded psychoanalysis and, more than anyone, gave the modern world its vocabulary of the mind — the unconscious, repression, the ego, the Freudian slip. From his consulting couch in Vienna he argued that our behaviour is driven by hidden desires and childhood experience, and that dreams are the 'royal road' to the unconscious.\n\nHis theories were controversial and much of the detail is now disputed, but his influence on psychology, art and everyday thought is immense. A heavy cigar smoker, he endured more than thirty operations for jaw cancer; having fled the Nazis to London in 1938, he died there in 1939 by a doctor-assisted dose of morphine."
