    facts: "Amundsen was the supreme professional of polar exploration, a Norwegian who studied Inuit survival techniques, trusted dogs and skis over machines and ponies, and left nothing to chance. He was the first to navigate the Northwest Passage, and then, switching targets in secret, the first human being to reach the South Pole, in December 1911 — beating Scott and returning with every man alive and well.\n\nHe went on to cross the Arctic by airship, and became one of the first people to see both Poles. In 1928 he climbed aboard a flying boat to search for Umberto Nobile, an Italian rival whose airship had crashed in the Arctic. Amundsen's aircraft disappeared over the Barents Sea; a wing float and fuel tank were later found, but his body never was — a fitting, restless end for a man who could not stay away from the ice."
    notes: ["First to the South Pole (1911); disappeared in 1928 on an Arctic rescue flight — body never found."]

