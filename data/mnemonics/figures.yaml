    facts: "Alexander Graham Bell was a Scottish-born inventor and teacher of the deaf whose work on transmitting speech electrically gave the world the telephone. Both his mother and his wife were deaf, and his lifelong effort to help deaf people communicate led him to study the mechanics of sound and hearing — which in turn inspired his experiments in sending the human voice along a wire.\n\nIn 1876 he was granted the patent for the telephone (in a famous race to the patent office ahead of a rival) and soon after spoke the first intelligible telephone sentence to his assistant: 'Mr Watson, come here, I want to see you.' The invention made him rich and famous, and he went on to work on everything from aircraft to hydrofoils, while championing deaf education. When he died in 1922, every telephone on the North American continent was silenced for a minute in his honour."
    notes: ["Invented the telephone (1876); a teacher of the deaf; every US phone was silenced for a minute at his funeral."]

