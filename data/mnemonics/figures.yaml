    facts: "Bob Marley was a Jamaican singer-songwriter who became the global face of reggae music and one of the most beloved and influential musicians of the twentieth century. Rising from poverty in Kingston with his band The Wailers, he fused reggae's hypnotic rhythms with heartfelt songs of love, faith, poverty and political resistance — 'No Woman, No Cry', 'Get Up, Stand Up', 'One Love', 'Redemption Song' — carrying the sound and the message of his Rastafarian faith to audiences on every continent.\n\nA charismatic symbol of peace and unity (he famously joined the hands of rival Jamaican political leaders on stage) and of Pan-African pride, he turned reggae into a worldwide movement. In 1977 doctors found a malignant melanoma under a toenail; he declined amputation, partly on religious grounds, and the cancer spread through his body. He died in 1981, aged just 36, and has since become an almost mythic figure, his greatest-hits album Legend among the best-selling records of all time."
    notes: ["Global reggae superstar and Rastafarian icon; One Love, Redemption Song; died of melanoma that began in his toe."]

