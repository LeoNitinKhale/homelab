    death_peg_candidates: ["Cane", "Coin", "Gun", "Can", "Queen", "Canoe"]
    facts: "Harry S. Truman was the unassuming former haberdasher and Missouri farmer who became one of the most consequential US Presidents almost by accident, thrust into the White House when Franklin Roosevelt died just months into his fourth term while the Second World War still raged. Within weeks Truman had to decide whether to use a weapon he had only just learned existed — and ordered the atomic bombings of Hiroshima and Nagasaki, which ended the war but opened the nuclear age.\n\nBlunt, decisive and fond of the motto 'the buck stops here', he then presided over the dawn of the Cold War: the Marshall Plan to rebuild Europe, the founding of NATO, the Berlin Airlift and the Korean War, and the doctrine of 'containing' Soviet communism. Written off as certain to lose in 1948, he won a famous come-from-behind re-election. He retired to Missouri, took brisk daily walks into his eighties, and died in 1972, his reputation steadily rising over the decades."
    notes: ["33rd US President; ordered the atomic bombings of Japan; the Marshall Plan and NATO; 'the buck stops here'."]

  - id: 191
