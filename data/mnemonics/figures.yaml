    facts: "Vilfredo Pareto was an Italian engineer, economist and sociologist who brought mathematical rigour to the study of society and left his name on two enduring ideas. 'Pareto efficiency' describes a state of affairs in which no individual can be made better off without making someone else worse off — a benchmark still central to modern economics. And the 'Pareto principle', or 80/20 rule, grew from his observation that about 80% of Italy's land was owned by about 20% of the population, a lopsided pattern he found echoed everywhere.\n\nIn later life he turned to sociology, developing a cynical theory of the 'circulation of elites' — the idea that history is a graveyard of aristocracies, one ruling class endlessly replacing another. Reclusive and famously fond of the many cats at his villa on Lake Geneva, he died there in 1923, his ideas later claimed, controversially, by admirers across the political spectrum."
    notes: ["Pareto efficiency/optimality; the 80/20 'Pareto principle'; a founder of mathematical economics and elite theory."]

