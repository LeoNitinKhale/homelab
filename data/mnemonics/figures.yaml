    facts: "Ernesto 'Che' Guevara was an Argentine-born Marxist revolutionary who became one of the most recognisable icons of the twentieth century. A medical student whose travels across Latin America (recorded in The Motorcycle Diaries) convinced him that only armed revolution could end the region's poverty and injustice, he joined Fidel Castro's guerrilla movement and played a leading role in the 1959 Cuban Revolution, afterwards holding senior posts in the new government.\n\nRestless and uncompromising, he left Cuba to spread revolution abroad, first in the Congo and then in Bolivia, where his small guerrilla band was hunted down. Captured by the Bolivian army (with CIA assistance) in 1967, he was executed the next day without trial. His defiant good looks — immortalised in Alberto Korda's photograph of him in a beret — made him a lasting symbol of rebellion, splashed across countless posters and T-shirts, even as debate continues over his ruthlessness and his role in Cuba's revolutionary tribunals."
    notes: ["Argentine-born Marxist guerrilla; hero of the Cuban Revolution; his portrait is a global icon; executed in Bolivia."]

