    facts: "Fyodor Dostoevsky endured one of the most extraordinary near-death experiences in literary history. Arrested for belonging to a radical discussion circle, he was sentenced to death and led out before a firing squad, only to be reprieved at the very last moment in a cruel piece of theatre staged by the Tsar. The mock execution, followed by years of hard labour in a Siberian prison camp, marked him forever and fed the obsessions with mortality, faith, guilt and redemption that fill his novels.\n\nAn epileptic haunted by fits and a compulsive gambler perpetually in debt, he poured his turbulent inner life into psychological masterpieces — Crime and Punishment, The Idiot, Demons and The Brothers Karamazov — that probe the darkest corners of the human soul and helped invent modern psychological fiction. He died in St Petersburg in 1881 of a lung haemorrhage, revered as a prophet of the Russian spirit."
    notes: ["Faced a mock execution (reprieved at the last moment); wrote Crime and Punishment and The Brothers Karamazov; an epileptic and compulsive gambler."]

