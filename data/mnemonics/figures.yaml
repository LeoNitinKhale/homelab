    facts: "Grigori Rasputin was a Siberian peasant and self-styled holy man whose sinister influence over Russia's last royal family helped bring down the Romanov dynasty. A wandering mystic and faith-healer with hypnotic eyes and a scandalous reputation for drink and womanising, he won the desperate trust of the Empress Alexandra by seeming, uncannily, to ease the life-threatening bleeding of her haemophiliac son, the heir to the throne.\n\nAs the First World War went badly and the Tsar left for the front, Rasputin's sway over the Empress and over government appointments provoked fury and scandal. In December 1916 a group of noblemen lured him to a cellar and, by legend, poisoned, shot and beat him — only for him to keep clinging to life — before finally binding him and dumping him through a hole in the frozen Neva, where he drowned. The monarchy he had helped discredit fell just weeks later."
    notes: ["The 'Mad Monk' faith-healer who swayed the last Tsar's family; famously hard to kill — poisoned, shot and finally drowned in 1916."]

