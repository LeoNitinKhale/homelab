    facts: "David Livingstone was a Scottish missionary and explorer who became a Victorian superhero — the man who filled in the blank spaces on the European map of Africa. Driven by a mix of Christian mission and a fierce hatred of the Arab-run slave trade, he trekked thousands of miles across the continent, was the first European to see the vast waterfall he named Victoria Falls, and spent his final years obsessively (and wrongly) hunting for the source of the Nile.\n\nWhen he vanished from contact for years, a newspaper sent the journalist Henry Morton Stanley to find him, leading to the famously understated greeting 'Dr Livingstone, I presume?' He died in 1873 in what is now Zambia, found kneeling as if in prayer. His African companions buried his heart under a tree and carried his embalmed body over a thousand miles to the coast, so that he could be shipped home for burial in Westminster Abbey."
    notes: ["Scottish missionary-explorer; 'Dr Livingstone, I presume?'; his heart was buried in Africa, his body carried over 1,000 miles to the coast."]

