    facts: "Alexander III of Macedon was tutored as a boy by Aristotle and, legend says, tamed the unrideable warhorse Bucephalus before he was even a teenager. Taking the throne at twenty after his father's murder, he launched one of history's greatest military campaigns, never losing a battle as he shattered the mighty Persian Empire and drove his army all the way to India.\n\nBy thirty he ruled from Greece to the Punjab, founding some twenty cities named Alexandria and spreading Greek culture across the known world. Then, at just thirty-two, he died suddenly in Babylon — of fever, typhoid, or perhaps poison — and his vast empire was promptly torn apart by his squabbling generals."
