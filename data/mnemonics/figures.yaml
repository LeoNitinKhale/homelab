    facts: "Diogenes of Sinope was the most outrageous of the ancient Greek philosophers, a founder of the Cynic school who turned rejecting society's values into a kind of performance art. He renounced money, property and comfort, living — by legend — in a large ceramic storage jar or 'tub' in the Athenian marketplace, owning only a cloak, a staff and a bowl (which he threw away after seeing a boy drink from cupped hands).\n\nHe deliberately flouted convention to expose what he saw as human hypocrisy, and reputedly wandered by daylight with a lamp claiming to be 'looking for an honest man'. Most famously, when Alexander the Great sought him out and offered to grant any wish, Diogenes simply asked him to step aside because he was blocking the sun — prompting Alexander to remark that, were he not Alexander, he would wish to be Diogenes. He died around 323 BC (the same year as Alexander), by various accounts from eating raw octopus, an infected dog bite, or simply holding his breath."
    notes: ["BC. The Cynic who lived in a barrel and shunned all possessions; told Alexander to stop blocking his sunlight; died in 323 BC."]

