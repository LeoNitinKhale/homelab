    facts: "Buckminster Fuller was an American architect, designer, inventor and irrepressible visionary who devoted his life to a single question: how to do 'more and more with less and less' so that all humanity could thrive on the finite resources of what he called 'Spaceship Earth'. After a series of failures and a period of despair, he reinvented himself as a one-man experiment in useful living, filing dozens of patents and dreaming up radical designs like the Dymaxion car and house.\n\nHis most famous invention was the geodesic dome — a lightweight sphere of interlocking triangles that is astonishingly strong and encloses huge volumes with minimal material, and thousands were built around the world. His ideas ranged from the practical to the utopian, delivered in marathon lectures. Fittingly, when a new form of carbon shaped like his domes was discovered in 1985, it was named 'buckminsterfullerene', or the 'buckyball'. He died in 1983, aged 87, just hours before his comatose wife."
    notes: ["Popularised the geodesic dome and 'Spaceship Earth'; the carbon 'buckyball' molecule is named after him."]

