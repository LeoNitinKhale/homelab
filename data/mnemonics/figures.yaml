    facts: "Henry Ford didn't invent the car, but he did more than anyone to put the world on wheels. By perfecting the moving assembly line at his Michigan factories, he slashed the time to build a car from over twelve hours to about ninety minutes, making the Model T cheap enough for ordinary workers — whom he also famously paid the then-generous $5 a day, both to cut staff turnover and to create customers who could afford his cars.\n\nHe sold some 15 million Model Ts and became one of the richest and most influential industrialists in history, reshaping cities, work and daily life. But his legacy is deeply stained: he was a virulent antisemite who published and promoted vicious propaganda and was admired by the Nazis. Autocratic and set in his ways to the end, he died of a stroke in 1947."
    notes: ["Pioneered the moving assembly line and the affordable Model T, putting the world on wheels; also a notorious antisemite."]

