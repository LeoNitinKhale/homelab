    facts: "Carl Sagan was an American astronomer and the most famous science communicator of his generation, who brought the wonder of the cosmos to a mass audience with rare warmth and eloquence. A serious planetary scientist who contributed to NASA's robotic missions to Venus, Mars and the outer planets, he became a household name through his 1980 television series Cosmos: A Personal Voyage — one of the most-watched science programmes ever made — and its accompanying best-selling book.\n\nHe championed critical thinking and scepticism, searched seriously for extraterrestrial intelligence (SETI), and helped design the golden records carried by the Voyager probes as messages to any aliens who might find them. He is perhaps best remembered for the 'Pale Blue Dot' — his moving reflection on a photograph of Earth taken by Voyager 1 from billions of miles away, showing our whole world as a tiny speck and pleading for humility and stewardship. He died of pneumonia, following a bone-marrow disease, in 1996, aged 62."
    notes: ["Astronomer and science populariser; the TV series Cosmos; the 'Pale Blue Dot'; searched for extraterrestrial life."]

