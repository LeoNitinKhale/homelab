    death_peg_num: 8
    death_peg_candidates: ["Safe", "Sofa", "Sieve"]
    facts: "Sir Edmund Hillary was a New Zealand mountaineer and explorer who, together with the Nepali-Indian Sherpa Tenzing Norgay, became the first person confirmed to reach the summit of Mount Everest, the highest point on Earth, on 29 May 1953. A tall, unassuming former beekeeper, he had honed his skills in the New Zealand Alps and on Himalayan expeditions before the British attempt on Everest succeeded, news of which reached Britain just in time for Queen Elizabeth II's coronation.\n\nInstantly world-famous and knighted, Hillary went on to further adventures — reaching the South Pole overland and exploring the Himalayas — but devoted much of his later life to the Sherpa communities of Nepal, building schools, hospitals and airfields through his Himalayan Trust. Humble and practical to the end (he described the summit success in typically blunt terms), he became New Zealand's most revered figure, appearing on its five-dollar note, and died in 2008."
    notes: ["First (with Tenzing Norgay) to summit Mount Everest, 1953; later a humanitarian for the Sherpa people."]

  - id: 229
