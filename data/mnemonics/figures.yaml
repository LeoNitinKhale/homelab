    facts: "Elizabeth I survived a perilous youth — her mother Anne Boleyn beheaded when she was two, herself imprisoned in the Tower under her half-sister Mary — to become one of England's greatest monarchs. The 'Virgin Queen' never married, dangling rival suitors and powers against one another for forty-five years while insisting she was wedded only to her country.\n\nHer reign became a golden age: the defeat of the Spanish Armada in 1588, the flowering of Shakespeare and Marlowe, and the first stirrings of English sea power. Vain, shrewd and formidably educated, she died in 1603 as the last of the Tudors, having steered a Protestant England through decades of religious and dynastic danger."
    notes: ["Sum is abstract, retained as an accepted exception for the finance pun."]

