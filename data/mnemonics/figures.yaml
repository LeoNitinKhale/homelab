    facts: "Leonardo da Vinci was the archetypal 'Renaissance man' — painter, anatomist, engineer, inventor and insatiable observer of everything. The illegitimate son of a Tuscan notary, he painted the two most famous pictures in the world, the Mona Lisa and The Last Supper, while filling thousands of mirror-written notebook pages with flying machines, war engines, dissections and studies of water and light.\n\nHe left much unfinished, forever chasing the next question, and carried the Mona Lisa around with him for years. He spent his final years in France under the patronage of King Francis I, and died there in 1519 — the famous deathbed scene of him cradled in the king's arms is a lovely legend rather than fact."
