    facts: "Vasco da Gama was the Portuguese navigator who, in 1497–98, achieved what Columbus had only dreamed of: a genuine sea route from Europe to Asia, sailing around the Cape of Good Hope at the southern tip of Africa and on across the Indian Ocean to the spice ports of India. It was a staggering feat of navigation and endurance, and it broke the Muslim and Venetian stranglehold on the fabulously lucrative spice trade.\n\nIt also had a brutal side: on later voyages da Gama used ferocious violence to force open Indian trade, bombarding cities and slaughtering crews and pilgrims. Immensely rich and ennobled, he was finally sent out again as Portuguese viceroy of India in 1524 — but caught malaria and died within months, at Cochin, that Christmas. His voyages made tiny Portugal, for a time, a global maritime empire."
    notes: ["Opened the sea route from Europe to India around the Cape of Good Hope (1498); died of malaria in Cochin."]

