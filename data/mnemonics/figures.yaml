    facts: "Karl Marx was a German philosopher, economist and revolutionary whose ideas would shape twentieth-century politics more than almost anyone's. A brilliant, combative journalist hounded from one country to another for his radicalism, he settled in London, where he spent years in the British Museum reading room writing his vast analysis of capitalism, Das Kapital.\n\nWith his friend and financial backer Friedrich Engels he wrote The Communist Manifesto, arguing that history is driven by class struggle and predicting that the workers would overthrow the capitalist order. Perennially poor and often ill, grieving several children who died young, he died stateless in 1883 and was buried in London's Highgate Cemetery."
