    facts: "Washington was a Virginia planter and surveyor who learned war the hard way in the frontier campaigns against the French, then took command of a ragtag Continental Army against the greatest military power on earth. He lost more battles than he won, but he kept the army together through the frozen misery of Valley Forge and struck when it mattered, wearing the British down until they surrendered at Yorktown.\n\nHis greatest act may have been giving power away: he resigned his commission rather than seize control, and after two terms as the first President he stepped down voluntarily, setting the precedent that no American leader should rule for life. He died in 1799 after riding his estate in freezing rain and developing a savage throat infection; his physicians, following the medicine of the day, drained around two litres of his blood, hastening the end of a man who had refused to be made a king."
    notes: ["Died of a throat infection (quinsy), made fatal by heavy bloodletting, 1799."]

