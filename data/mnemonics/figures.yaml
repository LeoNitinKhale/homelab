    facts: "Mehmed II, called 'the Conqueror', was the Ottoman sultan who, at just twenty-one, achieved what besiegers had failed to do for a thousand years: in 1453 he captured Constantinople, the fabled capital of the Byzantine Empire, ending an empire whose roots ran back to ancient Rome. He did it partly with a monstrous new bombard cannon that battered the city's legendary triple walls, and by famously hauling his ships overland to bypass its harbour chain.\n\nHe made the city — soon to be Istanbul — his new capital, converting the great church of Hagia Sophia into a mosque, and went on to conquer widely across the Balkans and Anatolia, styling himself heir to both the Islamic caliphs and the Roman emperors. A complex ruler who was also a patron of scholars and artists (he had the Italian painter Bellini portray him), he died in 1481 while setting out on yet another campaign, possibly poisoned — leaving the Ottoman Empire a dominant world power."
    notes: ["Conquered Constantinople in 1453, ending the Byzantine Empire; a patron of arts and law; died on campaign (possibly poisoned) in 1481."]

