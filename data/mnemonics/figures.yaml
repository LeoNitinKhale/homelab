    facts: "Plato was a young aristocrat, possibly a wrestler, whose life was upended when his teacher Socrates was executed by the Athenian democracy. The trauma turned him against mob rule and toward a lifelong search for eternal, unchanging truth behind the chaos of appearances — his famous Theory of Forms, and the Allegory of the Cave.\n\nHe founded the Academy on the outskirts of Athens, arguably the Western world's first university, where he taught for decades and wrote his ideas as dramatic dialogues starring Socrates. Ancient sources say he died peacefully in old age — one tradition has him passing in his sleep, another at a wedding feast. His pupil Aristotle would go on to challenge almost everything he taught."
    notes: ["'Carving nature at its joints' is Plato's own phrase. Student of Socrates, teacher of Aristotle."]

