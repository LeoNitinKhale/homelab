    facts: "Nefertiti was a queen of ancient Egypt in the 14th century BC, the principal wife of the pharaoh Akhenaten, and one of the most recognisable figures of the ancient world thanks to a single extraordinary object: the beautifully preserved painted limestone bust of her, discovered in 1912 and now among the most famous artworks on Earth. Her name means 'the beautiful one has come'.\n\nShe was far more than a royal consort: she wielded unusual power and prominence during Akhenaten's radical religious revolution, which swept aside Egypt's traditional gods in favour of the worship of a single sun-disc deity, the Aten. She is depicted alongside the pharaoh in scenes of worship and even in the smiting-of-enemies pose usually reserved for kings, and some scholars believe she may briefly have ruled Egypt in her own right after his death. Her later life and death, however, are shrouded in mystery — she disappears from the records, and her tomb and mummy have never been definitively identified."
    notes: ["BC. Powerful queen of Egypt, wife of Akhenaten; the famous painted bust; her later fate is a lasting mystery."]

