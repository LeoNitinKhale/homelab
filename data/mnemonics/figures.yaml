    facts: "Diego Velázquez was the towering painter of the Spanish Golden Age and one of the supreme masters of European art, court painter to King Philip IV of Spain for most of his career. Renowned for his astonishing, almost modern naturalism and his loose, magical handling of paint, he portrayed the royal family, dwarfs, jesters, gods and ordinary people alike with the same unflinching dignity and psychological truth.\n\nHis masterpiece, Las Meninas (1656), is among the most endlessly analysed paintings ever made: it shows the little Infanta Margarita and her attendants in the artist's studio, with Velázquez himself at his easel gazing out at us, and the king and queen glimpsed only as reflections in a mirror — a bewildering meditation on reality, image and the act of looking. Increasingly burdened with courtly duties, he died of a fever in Madrid in 1660, having raised the status of the painter and influenced artists from Goya to Picasso."
    notes: ["Master of the Spanish Golden Age; painter to Philip IV; his Las Meninas is one of the most analysed paintings in history."]

