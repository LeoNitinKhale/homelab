    facts: "Richard III was the last king of the House of York and the last of the Plantagenet dynasty, seizing the throne in 1483 after the mysterious disappearance of his two young nephews — the 'Princes in the Tower' — whom many believe he had murdered. His brief, bitterly contested reign lasted just two years.\n\nIn 1485 he was defeated and killed at the Battle of Bosworth Field by Henry Tudor, becoming the last English king to die in battle and ending the Wars of the Roses. Shakespeare later immortalised him as a scheming, hunchbacked villain crying 'A horse! A horse! My kingdom for a horse!' — a portrait shaped by Tudor propaganda. In an extraordinary modern coda, his lost skeleton was dug up from beneath a council car park in Leicester in 2012 and reburied in the city's cathedral."
    notes: ["Last English king killed in battle (Bosworth, 1485); Shakespeare's villain; his skeleton was found under a Leicester car park in 2012."]

