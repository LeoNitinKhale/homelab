    facts: "Machiavelli was a Florentine diplomat and civil servant who watched at close quarters as princes, popes and mercenaries carved up Renaissance Italy. When the Medici returned to power he was sacked, tortured on suspicion of conspiracy, and exiled to his small farm — where, dressing each evening in his finest robes to 'converse with the ancients', he wrote The Prince.\n\nIts cold advice — that a ruler should be both feared and, if necessary, deceitful and cruel, because the ends justify the means — was so shocking that his name became a byword for scheming ('Machiavellian'), and the Devil himself was nicknamed 'Old Nick' after him. He always hoped the book would win him back a government post; it never did, and he died disappointed in 1527, only to become one of the most influential political thinkers in history."
    notes: ["The Prince argued a ruler must be feared if he cannot be loved; 'Machiavellian' entered the language."]

