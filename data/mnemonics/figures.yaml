    facts: "Charles Babbage was a brilliant, cantankerous English mathematician who conceived the first programmable computer more than a hundred years before the electronic age. His Difference Engine was to calculate mathematical tables automatically, banishing the human errors that plagued navigation and science; his even grander Analytical Engine, with its 'store', 'mill' and punch-card programs, was a true general-purpose computer in all but electricity.\n\nNeither was completed in his lifetime — the engineering was at the very limit of what Victorian workshops could build, and his government funding collapsed amid quarrels. He grew famously irritable in old age, waging a public war against London's street musicians. He died in 1871 with his great engines unbuilt, his true importance recognised only when modern computing finally caught up with his vision."
    notes: ["Designed the Difference and Analytical Engines — mechanical computers a century before electronics; worked with Ada Lovelace."]

