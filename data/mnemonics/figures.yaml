    facts: "Catherine was a minor German princess married off at sixteen to the heir to the Russian throne — a childish, unstable man she came to despise. When he became Tsar Peter III and quickly alienated everyone, Catherine seized the moment: backed by the army and her lover, she overthrew her own husband in a bloodless coup, and days later he was conveniently dead. She ruled Russia in her own right for thirty-four years.\n\nA voracious reader who corresponded with the great thinkers of the French Enlightenment, she styled herself a philosopher-queen, founded schools and hospitals, amassed the art collection that became the Hermitage, and expanded the empire dramatically at the expense of the Ottomans and Poland. She also crushed a massive peasant revolt and tightened serfdom. Endlessly gossiped about for her string of favourites, she died of a stroke at 67 — and the famous, entirely false story about a horse was invented by her enemies to smear her."
    notes: ["Corresponded with Voltaire and Diderot; expanded Russia hugely; died of a stroke, 1796 (the horse story is a slander)."]

