    facts: "Salvador Dalí was the most flamboyant of the Surrealists, a Spanish painter of prodigious technical skill who rendered the irrational logic of dreams with hallucinatory, photographic precision. His most famous image — soft, melting pocket-watches draped over a barren landscape in 'The Persistence of Memory' — became one of the defining pictures of the twentieth century.\n\nAs much showman as painter, he cultivated an outrageous public persona, complete with a long, waxed, upturned moustache, wild pronouncements ('I am Surrealism'), and stunts that infuriated even his fellow Surrealists, who eventually expelled him. He designed dream sequences for Hitchcock, a logo for a lollipop brand, jewellery and furniture, and built a bizarre theatre-museum to himself in his home town. Increasingly frail after the death of his wife and muse Gala, he died of heart failure in 1989."
    notes: ["Leading Surrealist ('The Persistence of Memory' / melting clocks); a flamboyant self-promoter with a famous moustache."]

