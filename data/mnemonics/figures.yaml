    facts: "Aristotle came to Athens at seventeen to study under Plato and stayed for twenty years. When he was passed over to lead the Academy after Plato's death, he left — and was eventually hired to tutor a Macedonian prince who would go on to conquer the known world: Alexander the Great.\n\nBack in Athens he founded his own school, the Lyceum, teaching as he strolled its covered walks (his pupils were nicknamed the 'peripatetics', the wanderers). He wrote on almost everything — logic, physics, biology, ethics, politics, drama — and was the first to collect, dissect and classify knowledge as a system, personally cataloguing hundreds of animal species. When anti-Macedonian feeling flared after Alexander died, Aristotle fled rather than let Athens 'sin twice against philosophy' (the first being the execution of Socrates), and died of a stomach illness soon after."
    notes: ["Aristotle tutored Alexander the Great and founded the Lyceum; died in exile on Euboea."]

