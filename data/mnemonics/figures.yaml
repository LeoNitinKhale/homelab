    facts: "Edward Teach, better known as Blackbeard, was the most feared pirate of the golden age of piracy, though his actual reign of terror lasted only a couple of years. He cultivated a deliberately demonic image, weaving lit, slow-burning fuses into his huge black beard so that his face appeared wreathed in smoke during battle, and festooning himself with pistols and cutlasses to overawe his victims into surrendering without a fight.\n\nCommanding the captured French slave ship he renamed Queen Anne's Revenge, he blockaded the port of Charleston and prowled the American and Caribbean coasts. In 1718 the governor of Virginia sent a naval force to hunt him down; in a savage boarding action off North Carolina, Blackbeard was shot five times and slashed some twenty more before he fell. His head was cut off and hung from the victorious sloop's bowsprit, sealing his legend."
    notes: ["Tied slow-burning fuses in his beard to look demonic; killed in a ferocious 1718 boarding fight, his head hung from the bowsprit."]

