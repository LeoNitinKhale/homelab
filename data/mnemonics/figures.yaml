    facts: "Dwight D. Eisenhower — universally known as 'Ike' — was the American general who commanded the Allied forces in Western Europe during the Second World War and then served two terms as the 34th President of the United States. As Supreme Allied Commander he planned and launched Operation Overlord, the massive D-Day landings in Normandy on 6 June 1944, and oversaw the campaign that liberated Western Europe from Nazi Germany, managing a fractious coalition of strong personalities with a famous blend of geniality and firmness.\n\nElected president in 1952 on a wave of popularity, he presided over a prosperous, stable 1950s America, ended the Korean War, built the interstate highway system, sent troops to enforce school desegregation in Little Rock, and steered the early Cold War. In his farewell address he issued a prescient warning against the growing power of the 'military-industrial complex'. He died in 1969, remembered as one of the most trusted figures of his era."
    notes: ["Supreme Allied Commander in WWII (D-Day); 34th US President; warned of the 'military-industrial complex'."]

