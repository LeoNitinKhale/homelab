    facts: "Dante Alighieri was a Florentine poet and politician who backed the losing side in the city's vicious factional wars and was banished on pain of being burned alive if he ever returned. He never did. Out of that bitterness and longing he wrote the Divine Comedy, an epic journey down through Hell, up Mount Purgatory and into Paradise, guided first by the Roman poet Virgil and then by Beatrice, the woman he had loved from afar since childhood.\n\nWritten not in scholarly Latin but in the everyday Tuscan of ordinary people, the poem effectively founded the modern Italian language and became one of the pillars of world literature — populating Hell with his real political enemies along the way. He died of malaria in Ravenna in 1321, still in exile; Florence has been asking, in vain, for his bones back ever since."
    notes: ["Wrote the Divine Comedy in exile; died of malaria in Ravenna, never allowed home to Florence."]

