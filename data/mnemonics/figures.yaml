    facts: "Orville Wright was the younger of the two brothers who invented the aeroplane, and it was he who lay at the controls for the very first of the four powered flights at Kitty Hawk on 17 December 1903 — a hop of 12 seconds and 120 feet that changed the world. The brothers' fascination with flight reportedly began in childhood with a toy helicopter and a love of building and flying kites.\n\nAfter Wilbur's early death, Orville sold their company and lived on for another 36 years as the grand old man of aviation, serving on advisory boards and watching, with mixed feelings, as the machine he had created was turned into a weapon of world war. He lived to see aircraft break records and approach the sound barrier, dying in 1948 at 76 — long enough to witness his 12-second flight blossom into the age of mass air travel and jet-powered war."
    notes: ["Piloted the first powered flight in 1903; outlived Wilbur by 36 years, into the jet age."]

