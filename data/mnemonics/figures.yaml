    facts: "Peter Paul Rubens was the greatest and most influential painter of the Northern Baroque, a Flemish master whose dynamic, sensuous, colour-drenched canvases seemed to burst with energy and abundance. Running a huge, workshop, he produced an astonishing quantity of altarpieces, mythologies, hunting scenes and portraits, his voluptuous female nudes so characteristic that 'Rubenesque' still describes a full, rounded figure.\n\nUnusually for an artist, he was also a cultured, multilingual gentleman and a trusted diplomat, undertaking delicate peace missions between the great powers and being knighted by two different kings. Immensely wealthy, he bought a grand town house and a country estate, and in later life painted his adored young second wife, Hélène Fourment, with tender delight. Plagued by gout, he died in Antwerp in 1640, having defined an entire era of European art."
    notes: ["The leading Flemish Baroque painter; his fleshy figures gave us 'Rubenesque'; also a knighted diplomat."]

