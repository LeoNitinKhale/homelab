    facts: "Francisco Goya was the greatest Spanish painter of his age and, in many ways, the first truly modern artist. He rose to become official painter to the Spanish crown, turning out brilliant, subtly unflattering royal portraits, but a severe illness left him permanently deaf, and his art grew ever darker and more inward.\n\nHe witnessed the horrors of Napoleon's invasion of Spain and recorded them without mercy — in the shattering canvas The Third of May 1808, showing a French firing squad executing Spanish civilians, and in his savage print series The Disasters of War. In his final years, alone and embittered, he covered the walls of his house with the terrifying 'Black Paintings' (among them Saturn devouring his son), private visions of madness and despair. He died in self-exile in Bordeaux in 1828, having bridged the Old Masters and the modern world."
    notes: ["Spanish master who went deaf; The Third of May 1808 and the Black Paintings; bridged the Old Masters and modern art."]

