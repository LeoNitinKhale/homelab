    facts: "Constantine the Great was the Roman emperor who changed the course of Western history by embracing Christianity, transforming a persecuted sect into the faith of an empire. According to legend, before the decisive Battle of the Milvian Bridge in 312 he saw a cross of light in the sky with the words 'in this sign you will conquer', and had his soldiers mark their shields with the Christian 'Chi-Rho' symbol; he won, and credited the Christian God.\n\nHe issued the Edict of Milan granting religious tolerance, called the Council of Nicaea to settle Christian doctrine (producing the Nicene Creed), and founded a magnificent new eastern capital, Constantinople (modern Istanbul), which would outlast Rome itself by a thousand years. A ruthless as well as visionary ruler — he had his own son and wife put to death — he delayed his own baptism until he lay dying in 337, a common practice of the age, and passed into history as the first Christian emperor."
    notes: ["First Christian Roman emperor; his vision 'in this sign conquer'; founded Constantinople; baptised on his deathbed."]

