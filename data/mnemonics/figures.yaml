    facts: "John Pierpont Morgan was the dominant American financier of the Gilded Age, a banker so powerful that he effectively acted as the United States' central bank before one existed. Through his firm J.P. Morgan & Co. he reorganised and consolidated whole industries — merging companies to create giants like U.S. Steel (the first billion-dollar corporation) and General Electric — in a process critics dubbed 'Morganization'.\n\nHis power was never clearer than during financial panics: in 1893 and again in the Panic of 1907 he personally marshalled the resources of Wall Street, locking bankers in his library until they agreed to a rescue, to shore up the collapsing system — episodes that spurred the creation of the Federal Reserve. Gruff, imposing and self-conscious about a skin condition that reddened and disfigured his nose, he was also one of the greatest art and book collectors of his age. He died in Rome in 1913, leaving a financial dynasty and a spectacular library."
    notes: ["The most powerful American banker of his era; created US Steel and General Electric; twice stemmed financial panics."]

