    facts: "Avicenna (Ibn Sina) was the greatest polymath of the Islamic Golden Age, a Persian physician and philosopher whose influence stretched across both the Muslim world and medieval Europe. A prodigy said to have memorised the Quran by age ten and mastered medicine as a teenager, he wrote well over a hundred works, but two loomed largest: The Book of Healing, a vast philosophical and scientific encyclopedia, and The Canon of Medicine.\n\nThe Canon systematised all the medical knowledge of the age — anatomy, diseases, drugs, and early notions of clinical testing and contagion — into a single authoritative text that remained a standard reference in universities from Baghdad to Paris for some six hundred years. He also made important contributions to logic, metaphysics and astronomy, and blended Aristotle's philosophy with Islamic thought. Living a turbulent life in the service of various princes, he died, probably of colic, around 1037, aged about 57."
    notes: ["Persian polymath of the Islamic Golden Age; his Canon of Medicine was a standard European medical text for centuries."]

