    facts: "Watt was a Scottish instrument-maker at Glasgow University when he was handed a model steam engine to repair and realised how appallingly wasteful it was — pouring away most of its heat with every stroke. His insight, supposedly sparked while walking on a Sunday, was to add a separate condenser so the cylinder never had to cool down. It made the steam engine dramatically more efficient and, in partnership with the businessman Matthew Boulton, commercially unstoppable.\n\nWatt engines went on to drive the mills, mines and factories of the Industrial Revolution, turning coal into power on a scale the world had never seen. A meticulous, sometimes gloomy perfectionist, he also coined the term 'horsepower' to sell his machines. He grew wealthy, retired to a comfortable old age, and died at 83; the SI unit of power, the watt, keeps his name switched on in every light bulb."
    notes: ["Radically improved the steam engine; the unit of power, the watt, is named for him."]

