    facts: "Neil Armstrong was a US Navy fighter pilot and test pilot of legendary cool who, on 20 July 1969, became the first human being to set foot on another world. As commander of Apollo 11, he took manual control of the lunar module 'Eagle' when its computer steered toward a boulder-strewn crater, setting it down on the Sea of Tranquillity with only seconds of fuel remaining, then radioing back the immortal 'The Eagle has landed'.\n\nStepping onto the surface, he spoke the most famous sentence of the space age: 'That's one small step for man, one giant leap for mankind.' Uncomfortable with the celebrity that followed, he shunned the limelight, taught engineering, and guarded his privacy fiercely for the rest of his life. He died in 2012, aged 82, from complications following heart-bypass surgery, and was buried at sea."
    notes: ["First human to walk on the Moon (Apollo 11, 1969); famously modest and reclusive afterward. (His birth 30 doesn't peg to 'Moon', which is 32.)"]

