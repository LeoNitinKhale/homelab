    death_peg_candidates: ["Tin", "Den", "Dawn", "Ton", "Down", "Tan"]
    facts: "Scott was a Royal Navy officer who led two British expeditions to Antarctica in the golden age of polar exploration. His second, the Terra Nova Expedition, aimed to be first to the South Pole — but he insisted on man-hauling sledges and using ponies rather than relying wholly on dogs, and was beaten to it by the ruthlessly efficient Norwegian Roald Amundsen, who arrived five weeks earlier.\n\nWorn out and heartbroken, Scott and his four companions turned for home into a brutal Antarctic autumn. One by one they died of cold, hunger and exhaustion; Captain Oates, crippled by frostbite, famously walked out into a blizzard to die so as not to slow the others — 'I am just going outside and may be some time.' Scott himself perished only eleven miles from a supply depot, keeping his journal until his frozen fingers failed. The diaries, found months later beside the bodies, turned failure into national legend."
    notes: ["Reached the Pole a month after Amundsen; died with his team on the return march, keeping his diary to the end."]

