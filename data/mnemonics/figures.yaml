    facts: "Ernest Rutherford was a New Zealand-born British physicist often called the 'father of nuclear physics', who did more than almost anyone to reveal the structure of the atom. His famous gold-foil experiment, in which a few alpha particles fired at a thin sheet of gold rebounded sharply, led him to conclude that an atom is mostly empty space with a tiny, dense, positively charged nucleus at its centre — overturning the earlier 'plum pudding' model.\n\nHe also distinguished alpha and beta radiation, explained radioactive decay and half-life (for which he won the Nobel Prize in Chemistry in 1908), was the first to deliberately split the atom by inducing a nuclear reaction, and mentored a generation of great physicists at Manchester and Cambridge's Cavendish Laboratory. A big, hearty, loud-voiced man, he died unexpectedly in 1937 from complications of a strangulated hernia, and is buried near Newton in Westminster Abbey."
    notes: ["Discovered the atomic nucleus (gold-foil experiment); 'father of nuclear physics'; first to split the atom; 1908 Nobel."]

