    facts: "Edgar Allan Poe was an American writer who all but invented the modern horror and detective genres, and became a byword for gothic gloom. Orphaned young and dogged by poverty, gambling debts, drink and the deaths of the women he loved (including his young wife, of tuberculosis), he poured his morbid genius into tales of terror and the macabre — 'The Tell-Tale Heart', 'The Fall of the House of Usher', 'The Pit and the Pendulum' — and the hypnotic poem 'The Raven', which made him famous but little money.\n\nHis story 'The Murders in the Rue Morgue', with its brilliant amateur sleuth solving a baffling locked-room killing (the culprit an escaped orangutan), effectively created detective fiction, inspiring Sherlock Holmes and everyone after. His death, at just 40, remains one of literature's great mysteries: he was found delirious on the streets of Baltimore, wearing clothes that were not his own, and died a few days later in hospital without ever being able to explain what had happened."
    notes: ["Master of gothic horror and inventor of the detective story ('The Raven', 'The Murders in the Rue Morgue'); died mysteriously in 1849."]

