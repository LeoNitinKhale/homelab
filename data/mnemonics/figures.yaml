    facts: "Wagner was a revolutionary in every sense — he manned the barricades in the failed 1849 Dresden uprising and had to flee into political exile, and he set out to overthrow opera itself. He fused music, poetry and staging into what he called the 'total work of art', wrote his own librettos, invented the leitmotif, and produced the colossal four-opera Ring of the Nibelung, some fifteen hours of music built on recurring themes.\n\nGrandiose, endlessly in debt, and rescued by the infatuated 'mad king' Ludwig II of Bavaria, he built his own theatre at Bayreuth precisely to his specifications, where his works are still performed today. His virulent antisemitism and later adoption by the Nazis remain an inescapable stain on his legacy. He died of a heart attack in Venice in 1883."
    notes: ["Built the Bayreuth Festspielhaus for the Ring; died of a heart attack in Venice."]

