    facts: "Oliver Cromwell was an obscure middle-aged country gentleman when the English Civil War broke out, but he proved a military genius, forging the disciplined 'New Model Army' and its cavalry 'Ironsides' that crushed the Royalists. A fervent Puritan convinced he was doing God's work, he became the driving force behind the trial and execution of King Charles I in 1649 — the only English king ever put to death by his own people.\n\nAs 'Lord Protector' he ruled England as a republic, relatively tolerant of most Protestants and of Jews, but harsh in his brutal campaigns in Ireland and his ban on frivolities. He refused the crown when it was offered. He died of illness (probably malaria and kidney disease) in 1658; after the monarchy was restored, his body was dug up, posthumously 'executed', and his severed head displayed on a spike for decades — a grisly full stop to England's brief life as a republic."
    notes: ["Led Parliament to victory; signed Charles I's death warrant; ruled as Lord Protector; posthumously 'executed'."]

