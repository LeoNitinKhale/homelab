    facts: "Xerxes I was the Persian 'king of kings' who launched the greatest invasion of ancient Greece, immortalised (and much distorted) in the film 300. Determined to avenge his father Darius's defeat, he assembled an enormous army and fleet, cut a canal through a peninsula, and bridged the Hellespont with boats — and when a storm smashed the first bridge, he reportedly ordered the strait to be given 300 lashes and branded, in fury at the disobedient sea.\n\nHis forces broke the heroic 300 Spartans at Thermopylae and burned Athens, but his fleet was crushed at the Battle of Salamis and his army defeated at Plataea, ending the Persian threat to Greece. He spent his later years on grand building works at Persepolis and mired in palace intrigues, and was assassinated around 465 BC by the commander of his own royal bodyguard in a conspiracy at court — a murky end to a once-mighty reign."
    notes: ["BC. Persian 'king of kings'; invaded Greece (Thermopylae, Salamis); had the sea whipped; assassinated in a palace conspiracy."]

