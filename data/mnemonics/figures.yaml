    facts: "Mohandas 'Mahatma' Gandhi was a London-trained lawyer who, after suffering racist humiliation in South Africa, forged a new political weapon: satyagraha, mass non-violent resistance. Returning to India, he led the decades-long campaign to free the subcontinent from British rule, dressing in homespun cloth he spun himself and living with deliberate simplicity.\n\nHe galvanised millions with acts like the 1930 Salt March, was jailed repeatedly, and inspired later leaders from Martin Luther King to Mandela. India won independence in 1947, but partition brought terrible bloodshed that broke his heart. In 1948 he was shot dead by a Hindu extremist. Astonishingly, he was nominated for the Nobel Peace Prize five times and never awarded it."
