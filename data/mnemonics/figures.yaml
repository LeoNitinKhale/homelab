    facts: "Charles Martel — 'Charles the Hammer' — was the Frankish military leader who, though never formally king, was the real power in the Frankish realm and the founder of the Carolingian dynasty that would produce his grandson, Charlemagne. His most famous moment came at the Battle of Tours (or Poitiers) in 732, where his disciplined Frankish infantry halted a raiding army of the Umayyad Caliphate, a victory later mythologised as saving Christian Europe from Muslim conquest.\n\nA relentless campaigner who spent his career subduing rivals and expanding Frankish power, he also began the reforms — including granting land to fund heavy cavalry — that historians link to the rise of feudalism and the mounted knight. He died in 741, dividing his realm between his sons and leaving a dynasty poised to dominate early medieval Europe."
    notes: ["'The Hammer'; won the Battle of Tours (732), checking the Umayyad advance into Europe; grandfather of Charlemagne."]

