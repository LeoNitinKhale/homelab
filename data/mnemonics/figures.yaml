    facts: "Theodore Roosevelt was a human whirlwind — a sickly, asthmatic boy who remade himself into a cowboy, boxer, war hero, naturalist, author of some 35 books, and, at 42, the youngest man ever to become US President. He led the 'Rough Riders' cavalry charge at San Juan Hill in the Spanish-American War, and as president wielded a 'big stick', busting the great monopolistic trusts, building the Panama Canal, and mediating an end to the Russo-Japanese War (which won him a Nobel Peace Prize).\n\nAbove all he was America's great conservationist, protecting some 230 million acres of public land as national parks, forests and monuments. His refusal to shoot a tethered bear on a hunt inspired the 'teddy bear'. After leaving office he explored an uncharted Amazon river that nearly killed him. He died in his sleep in 1919 at just 60, prompting his son to remark that 'the old lion is dead'."
    notes: ["26th US President; Rough Rider; a trust-buster and conservationist who created national parks and forests; the 'teddy bear' is named after him."]

