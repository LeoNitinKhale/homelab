    facts: "Marcus Aurelius was the last of Rome's 'Five Good Emperors' and the closest the ancient world came to Plato's ideal of a philosopher-king. He ruled at the height of the empire, but spent much of his reign not in luxury but on the cold northern frontier fighting off Germanic invasions, and was dogged by the devastating Antonine Plague sweeping the empire.\n\nThrough it all he kept a private journal — never meant for publication — of Stoic reflections on duty, mortality and self-control, reminding himself to bear misfortune calmly and treat others justly. Rediscovered centuries later, these Meditations became one of the most treasured works of philosophy ever written. He died, probably of plague, on campaign near modern Vienna in AD 180 — and made the fateful mistake of leaving the throne to his unworthy son Commodus."
    notes: ["His private notebook survives as the Meditations, a classic of Stoic philosophy; died of plague on campaign."]

