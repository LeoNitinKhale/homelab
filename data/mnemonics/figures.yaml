    facts: "Jackson Pollock was the wild man of American art, the leading figure of Abstract Expressionism who helped make New York the new capital of the art world after the Second World War. Abandoning the easel, he laid enormous canvases on the floor of his barn studio and moved around them, dripping, flinging and pouring house paint in rhythmic, dancing skeins — a radical technique dubbed 'action painting' that turned the very act of creation into the subject of the work.\n\nMagazine features made him a celebrity ('Jack the Dripper'), but fame sat badly on a shy, volatile man plagued by alcoholism and self-doubt, and his drinking wrecked his marriage to the painter Lee Krasner and darkened his final years. In August 1956, drunk behind the wheel near his Long Island home, he crashed his car and was killed instantly at just 44, cementing the enduring myth of the tormented modern artist."
    notes: ["Pioneer of drip / 'action' painting and Abstract Expressionism; died in a drunk-driving car crash in 1956."]

