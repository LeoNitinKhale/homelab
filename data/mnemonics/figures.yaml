    facts: "Queen Victoria gave her name to an entire age. Coming to the throne at eighteen, she reigned for sixty-three years — the longest of any British monarch until Elizabeth II — over a period of vast industrial, imperial and scientific expansion that made Britain the world's dominant power.\n\nHer marriage to Prince Albert was a genuine love match, and his death in 1861 devastated her: she withdrew from public life and wore mourning black for the remaining forty years of her life, becoming 'the Widow of Windsor'. She survived at least seven assassination attempts, was made Empress of India (which she never visited), and died in 1901, her children and grandchildren married into royal houses across Europe."
