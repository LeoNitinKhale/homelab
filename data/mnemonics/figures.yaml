    facts: "Euclid was the ancient Greek mathematician known as the 'father of geometry', who worked in Alexandria around 300 BC and produced the Elements — one of the most influential books ever written. In it he gathered and systematised the geometry and number theory of his age, but his true genius lay in the method: starting from a tiny set of self-evident 'axioms' and definitions, he derived hundreds of theorems in a rigorous logical chain, creating the model of deductive proof that underpins all mathematics.\n\nThe Elements served as the standard geometry textbook for well over two thousand years, studied by everyone from medieval scholars to Abraham Lincoln, and its structure shaped how Western thinkers reasoned about everything from science to philosophy. Almost nothing is known of Euclid's life, but one famous story has him telling King Ptolemy, who wanted a shortcut to mastering the subject, that 'there is no royal road to geometry'."
    notes: ["BC. 'Father of geometry'; his Elements was the world's main geometry textbook for over 2,000 years; 'no royal road to geometry'."]

