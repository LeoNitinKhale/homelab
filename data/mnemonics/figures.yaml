    facts: "Philip II of Macedon took a weak, fractious backwater and forged it into the dominant military power of Greece — and in doing so built the war machine his son, Alexander the Great, would use to conquer the known world. A brilliant reformer and diplomat, he created the Macedonian phalanx armed with the sarissa, a pike up to six metres long, and combined it with heavy cavalry to devastating effect, crushing the allied Greek city-states at Chaeronea in 338 BC.\n\nHe lost an eye to an arrow at a siege and survived numerous wounds, only to be murdered in 336 BC at the wedding of his daughter, stabbed by one of his own bodyguards for reasons still debated — leaving the throne, and his superb army, to the twenty-year-old Alexander."
    notes: ["BC. Father of Alexander the Great; created the Macedonian phalanx; assassinated at his daughter's wedding."]

