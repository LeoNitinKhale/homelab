    facts: "Sun Tzu is the semi-legendary ancient Chinese general, strategist and philosopher traditionally credited with writing The Art of War, the most famous treatise on strategy ever composed. Living (according to tradition) during the turbulent Spring and Autumn period around the 5th-6th century BC, he supposedly served the state of Wu; the details of his life are shadowy and some scholars doubt he existed as a single person, but the work attributed to him has proved immortal.\n\nIn thirteen terse, aphoristic chapters, The Art of War argues that warfare is a matter of intelligence, deception, adaptability and psychology far more than brute force — that the greatest victory is to subdue the enemy without fighting, and that one must 'know the enemy and know yourself' to be assured of success. Rediscovered and revered far beyond the battlefield, its maxims are now applied to business, politics, sport and law the world over."
    notes: ["BC. Traditional author of The Art of War; 'know your enemy'; win without fighting; dates are traditional/uncertain."]

