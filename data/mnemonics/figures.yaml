    facts: "Sergei Rachmaninoff was a Russian composer, virtuoso pianist and conductor, one of the last great champions of lush Romanticism as the twentieth century turned toward atonality and modernism. His piano concertos (especially the Second and Third), the Rhapsody on a Theme of Paganini and his Preludes are staples of the concert hall, full of sweeping, melancholy melody and dazzling difficulty.\n\nHe was renowned for his enormous hands, said to span an interval of a twelfth on the keyboard, letting him play chords that defeat most pianists. The disastrous premiere of his First Symphony plunged him into a depression cured only by hypnotherapy. The Russian Revolution drove him into permanent exile, and he spent his last decades touring as one of the greatest pianists of the age, mostly in the United States. He died of cancer in Beverly Hills in 1943, days before his 70th birthday."
    notes: ["Late-Romantic composer and virtuoso pianist; famously huge hands with a wide reach; died in exile in the US."]

