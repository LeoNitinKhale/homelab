    facts: "Kepler was a sickly, half-blind genius who wanted to be a theologian but ended up finding God in the mathematics of the heavens. Working as assistant to the brilliant, wealthy astronomer Tycho Brahe, he inherited Tycho's unrivalled observations of Mars and spent years wrestling them into sense — finally, and reluctantly, abandoning the perfect circles everyone assumed and proving that planets move in ellipses.\n\nHis life was dogged by hardship: religious persecution, the deaths of his children, and a sensational trial in which he had to defend his own mother against charges of witchcraft (he got her acquitted). Chronically underpaid by his royal employers, he died of a fever in Regensburg in 1630 while travelling to try to collect wages he was owed."
    notes: ["Discovered the three laws of planetary motion; died of fever in Regensburg chasing unpaid wages."]

