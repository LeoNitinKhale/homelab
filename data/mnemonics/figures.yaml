    facts: "Murray Rothbard was an American economist, historian and political theorist who took the free-market ideas of the Austrian School to their most radical conclusion, becoming the founding father of 'anarcho-capitalism' — the belief that not just central planning but the state itself should be abolished, with even law, defence and courts provided by the free market. A student of Ludwig von Mises, he was astonishingly prolific across economics, history, philosophy and political polemic.\n\nExuberant, combative and famously jovial, he was a central figure in the growth of the modern American libertarian movement, helping to shape its institutions even as he feuded with many of its other leaders. His sprawling works ranged from dense economic treatises like Man, Economy, and State to popular histories and pamphlets. He died of a heart attack in New York in 1995, leaving a devoted following that keeps his combative brand of libertarianism alive."
    notes: ["Founder of anarcho-capitalism; a leading libertarian theorist and prolific Austrian-School economist."]

