    facts: "Carl Menger was an Austrian economist who launched a quiet revolution in how we understand value. In his 1871 Principles of Economics he argued — independently of, but alongside, others in the 'Marginal Revolution' — that the worth of a good is not some fixed property or the labour that went into it, but depends on how useful the next available unit is to a particular person at a particular time (marginal utility). A thirsty man values his first cup of water enormously, his tenth hardly at all.\n\nThis subjective theory of value overturned the older classical economics of Smith and Ricardo and became the cornerstone of the 'Austrian School' that Menger founded — later carried on by Mises, Hayek and others. A careful, scholarly man who also tutored the doomed Austrian crown prince Rudolf, he largely withdrew from academic life in later years and died, much honoured, in Vienna in 1921."
    notes: ["Founder of the Austrian School; pioneered the theory of marginal utility and subjective value."]

