    facts: "Vladimir Lenin was the Russian revolutionary and political theorist who led the Bolsheviks to power in the October Revolution of 1917 and founded the Soviet Union, the world's first communist state. A brilliant, ruthless and single-minded Marxist, radicalised partly by the execution of his elder brother, he spent years in exile developing his ideas about a disciplined 'vanguard' party seizing power on behalf of the working class.\n\nWhen the First World War destabilised the Tsarist regime, Germany helped spirit him back into Russia in a sealed train, hoping he would sow chaos — which he duly did, overthrowing the provisional government and pulling Russia out of the war. He then led the Bolsheviks to victory in a brutal civil war, establishing a one-party dictatorship whose apparatus of terror his successor Stalin would vastly expand. Weakened by a series of strokes, he died in 1924; his embalmed body remains on display in a mausoleum in Moscow's Red Square."
    notes: ["Led the 1917 Bolshevik Revolution; founded the Soviet Union; arrived in Russia via a sealed train; embalmed in a mausoleum."]

  - id: 223
