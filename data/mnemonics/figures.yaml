    facts: "Frederick Douglass was an African American who escaped slavery to become the most influential abolitionist orator and writer of nineteenth-century America, and a living, eloquent refutation of the racist claims used to justify slavery. Born enslaved in Maryland, he secretly learned to read and write as a boy — later saying that literacy was 'the pathway from slavery to freedom' — and escaped to the North in 1838.\n\nThere he became a spellbinding public speaker and published his searing autobiography, Narrative of the Life of Frederick Douglass, which became a bestseller and a landmark of American letters. He founded anti-slavery newspapers, campaigned for the vote for both black Americans and women, recruited black soldiers for the Union in the Civil War, and pressed President Lincoln on emancipation and equal treatment. After the war he continued fighting for civil rights and held several government posts, a revered national figure, until his death in 1895."
    notes: ["Escaped slavery to become the leading abolitionist orator and writer; his Narrative; advised Abraham Lincoln."]

