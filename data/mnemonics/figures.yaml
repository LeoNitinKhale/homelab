    facts: "Niels Bohr was a Danish physicist who did more than almost anyone to shape our understanding of the atom and to found quantum mechanics. In 1913 he proposed a revolutionary model in which electrons orbit the nucleus only in fixed 'quantised' energy levels, jumping between them by absorbing or emitting precise packets of light — an idea that explained the colours atoms give off and won him the Nobel Prize. His institute in Copenhagen became the world capital of quantum physics, and his long, deep debates with Einstein over the meaning of the theory are legendary.\n\nHalf-Jewish, he escaped Nazi-occupied Denmark in 1943, reportedly flying to Britain in a bomber's cramped hold, and contributed to the Manhattan Project — while campaigning, presciently, for openness and international control to prevent a nuclear arms race. After the war he championed the peaceful use of atomic energy until his death in Copenhagen in 1962."
    notes: ["Quantum model of the atom; led the Copenhagen school; Nobel laureate; worked on the atomic bomb and later nuclear-arms control."]

