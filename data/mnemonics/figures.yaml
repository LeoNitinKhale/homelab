    facts: "Tchaikovsky was the first Russian composer to win lasting fame in the West, pouring an almost unbearable emotional intensity into his symphonies, concertos and the ballets Swan Lake, Sleeping Beauty and The Nutcracker. A sensitive, anxious man, he was tormented by his homosexuality in a society that condemned it, and endured a disastrous few weeks of marriage that drove him to a nervous breakdown.\n\nHe was rescued by an extraordinary patron, the widow Nadezhda von Meck, who funded him for years on the strict condition that they never meet. Nine days after conducting the premiere of his despairing Sixth Symphony, the 'Pathétique', he was dead. The official cause was cholera from a glass of unboiled water — but the timing has fed persistent theories that he took poison, possibly under pressure to avoid a scandal."
    notes: ["The 1812 Overture calls for real cannon fire; died of cholera after drinking unboiled water — suicide is also argued."]

