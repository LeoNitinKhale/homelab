    facts: "Marcus Tullius Cicero was ancient Rome's greatest orator and one of its most important thinkers — a lawyer, statesman, philosopher and prolific writer whose polished Latin prose became the gold standard of eloquence for two thousand years. Rising without noble birth to become consul, he foiled the Catiline conspiracy against the Republic and championed its traditional institutions against the strongmen who were tearing it apart.\n\nHe left a vast body of speeches, letters and philosophical works that transmitted Greek thought to the Latin West and shaped Renaissance humanism and the language of the founders of modern republics. But in the deadly politics after Julius Caesar's assassination, his blistering attacks on Mark Antony (the 'Philippics') proved fatal: Antony had him proscribed and murdered in 43 BC, ordering that his severed head and his hands — the hands that had written against him — be nailed up on the speaker's platform in the Roman Forum."
    notes: ["BC. Rome's supreme orator, lawyer and statesman; his severed head and hands were displayed after he denounced Mark Antony."]

