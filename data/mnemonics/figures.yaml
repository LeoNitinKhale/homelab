    facts: "Robert Boyle was an Anglo-Irish aristocrat-turned-scientist, one of the founders of modern chemistry and a leading light of the new Royal Society. In an age still steeped in alchemy, his book The Sceptical Chymist argued that matter was built from tiny particles and pushed chemistry toward rigorous experiment and away from mysticism.\n\nUsing an improved air pump, he established the law still taught today — that the pressure and volume of a gas are inversely related (Boyle's Law) — and demonstrated the role of air in breathing, burning and the carrying of sound. Deeply religious, he spent as much energy defending Christianity and funding Bible translations as on science, and never married, devoting himself to his work until his death in 1691, just a week after that of his beloved sister."
    notes: ["A founder of modern chemistry; Boyle's Law relates the pressure and volume of a gas; a devout founding member of the Royal Society."]

