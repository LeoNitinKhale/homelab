    facts: "David Ricardo was a British economist who rose from a stockbroker's clerk to become one of the wealthiest men in England — making a legendary fortune speculating on government bonds around the Battle of Waterloo — before devoting his later years to economic theory, where he ranks among the founders of the classical school alongside Adam Smith.\n\nHis most celebrated idea, the law of comparative advantage, showed that two countries both benefit from trade if each specialises in producing whatever it makes relatively most efficiently, even if one is better at everything — a cornerstone of the case for free trade ever since. He also developed influential (and gloomier) theories of rent, wages and the distribution of income, building the first rigorous abstract models in economics. A reluctant but respected Member of Parliament, he died in 1823, aged only 51, from an infection of the middle ear."
    notes: ["The law of comparative advantage; theories of rent and value; a self-made financier turned classical economist."]

