    facts: "Jonas Salk was the American medical researcher who conquered one of the twentieth century's most terrifying diseases: polio, which every summer paralysed and killed thousands of children and left survivors in leg braces or iron lungs. Working at the University of Pittsburgh, he developed a vaccine using killed virus and, after a colossal 1954 field trial involving nearly two million schoolchildren, it was declared safe and effective in 1955 — greeted with church bells and celebrations across America.\n\nSalk became an instant national hero, and cemented his saintly image by declining to patent the vaccine, reportedly asking 'Could you patent the sun?' — forgoing a fortune so it could reach as many people as possible. He founded the Salk Institute for biological studies in California and spent his later years searching, without success, for a vaccine against AIDS. He died of heart failure in 1995, his name synonymous with the near-eradication of a childhood scourge."
    notes: ["Developed the first polio vaccine (1955); refused to patent it; a national hero. (The vaccine was an injection; 'pill' carries the 95.)"]

