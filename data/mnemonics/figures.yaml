    facts: "Douglas MacArthur was one of America's most brilliant, flamboyant and controversial generals, a supreme commander in the Pacific theatre of the Second World War and afterwards the effective ruler of occupied Japan. The son of a general and a top graduate of West Point, he cultivated a larger-than-life public image with his sunglasses, corncob pipe and gold-braided cap. Driven out of the Philippines by the Japanese in 1942, he famously pledged 'I shall return', and did so two years later, wading ashore for the cameras.\n\nAs overlord of postwar Japan he oversaw its demilitarisation and democratic reconstruction with notable success. But his career ended in dramatic insubordination: commanding UN forces in the Korean War, he publicly clashed with President Truman over whether to widen the conflict against China, and Truman dismissed him in 1951. Returning home to hero's welcomes, he told Congress that 'old soldiers never die; they just fade away', and did so himself in 1964."
    notes: ["US general; commanded the Pacific in WWII; 'I shall return' to the Philippines; ran postwar Japan; sacked in the Korean War."]

