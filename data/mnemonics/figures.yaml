    facts: "Sir Walter Raleigh was the dashing embodiment of the Elizabethan age — soldier, sailor, explorer, poet, courtier and adventurer. A great favourite of Queen Elizabeth I (legend says he once threw his fine cloak over a puddle so she could cross dry-shod), he helped popularise tobacco and the potato in England and sponsored the ill-fated 'Lost Colony' of Roanoke in the New World.\n\nHe sailed in search of the fabled golden city of El Dorado in South America, but his fortunes collapsed after Elizabeth's death: the new king, James I, distrusted him, and after years imprisoned in the Tower of London (where he wrote a History of the World) and a final disastrous expedition, he was executed in 1618. Facing the axe with famous composure, he is said to have felt its edge and called it 'sharp medicine, but a physician for all diseases'."
    notes: ["Elizabethan courtier, explorer and writer; popularised tobacco; sponsored the lost Roanoke colony; beheaded in 1618."]

