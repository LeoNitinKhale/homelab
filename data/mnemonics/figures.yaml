    facts: "Nelson Mandela spent twenty-seven years in prison — eighteen of them breaking rocks in a blinding lime quarry on Robben Island — for his fight against South Africa's brutal apartheid system. Refusing offers of freedom in exchange for renouncing the armed struggle, he became the world's most famous political prisoner.\n\nReleased in 1990, he chose reconciliation over revenge, negotiating with the very government that had jailed him and, in 1994, becoming South Africa's first Black president in its first fully democratic election. Sharing a Nobel Peace Prize for dismantling apartheid, he served a single term and then stepped down. He died in 2013, aged 95, mourned around the world as a moral giant."
