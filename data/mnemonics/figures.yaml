    scene: "Inflating an inflatable ape — evolution. A giant fan blows it away — the controversy and pushback."
    position: "inflating — birth action, above/front. The fan blowing it away — dispersal, death-consistent."
    facts: "Charles Darwin was a comfortably-off young naturalist, all but destined to become a country parson, when a five-year voyage aboard HMS Beagle changed everything. Studying the finches and giant tortoises of the Galápagos and fossils across South America, he slowly assembled the theory of evolution by natural selection — then sat on it, terrified of the uproar, for some twenty years.\n\nHe finally published On the Origin of Species in 1859, prompted only when a rival, Alfred Russel Wallace, hit on the same idea. It transformed biology and set off a culture war that still smoulders. A gentle, chronically ill family man, he died in 1882 and — despite his lost faith — was buried in Westminster Abbey near Newton."
    notes: ["**Accepted exception**: Ape is a single-sound word (P), so it doesn't carry the tens-place zero the 00–09 range otherwise requires. Since you only ever peg isolated two-digit year-endings in context, never freeform digit strings, there's no reading of Ape other than 09."]

