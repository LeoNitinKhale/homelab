    facts: "Mansa Musa was the ruler of the West African Empire of Mali at its fourteenth-century height, and is often described as the wealthiest individual in all of human history, thanks to Mali's vast reserves of gold and salt. A devout Muslim, he is best remembered for his spectacular pilgrimage to Mecca in 1324, when he crossed the Sahara with an enormous caravan of thousands of followers and camels laden with gold.\n\nSo lavishly did he spend and give away gold along the route — especially in Cairo — that he reportedly caused years of inflation and devalued the metal across the region, an almost unbelievable display of one man's riches. Back home he was a great patron of learning and architecture, commissioning mosques and helping turn the city of Timbuktu into a renowned centre of Islamic scholarship and trade. His fame spread to Europe, where his image appeared clutching gold on medieval maps. He died around 1337."
    notes: ["Emperor of Mali; probably the richest person in history; his gold-laden 1324 pilgrimage to Mecca; patron of Timbuktu."]

