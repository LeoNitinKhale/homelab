    facts: "Martin Luther was the German monk and theologian who lit the fuse of the Protestant Reformation, shattering the thousand-year unity of Western Christianity. A tormented young man who (legend says) vowed to become a monk when caught in a violent thunderstorm, he grew convinced that salvation came through faith alone, not through good works or the Church's sale of 'indulgences'. In 1517 he reportedly nailed his 95 Theses attacking that trade to a church door in Wittenberg.\n\nSummoned before the Emperor at the Diet of Worms in 1521 and ordered to recant, he refused — 'Here I stand; I can do no other' — and was declared an outlaw. Hidden by sympathetic princes, he translated the Bible into vigorous everyday German, shaping the language itself, and married a former nun. His defiance, spread by the new printing press, permanently divided Europe. He died in 1546, having changed the course of Western history."
    notes: ["Sparked the Protestant Reformation with his 95 Theses (1517); defied the Diet of Worms; translated the Bible into German. (Roach = a pun on the Diet of Worms.)"]

