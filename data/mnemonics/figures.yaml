    facts: "Samuel Morse was an American who led two lives — first as an accomplished portrait painter, then as the inventor whose electric telegraph and 'Morse code' annihilated distance and transformed communication. A talented artist trained in London, he was reportedly away painting when a letter reached him too late to say farewell to his dying young wife; the anguish of slow news is said to have spurred his obsession with instant long-distance messaging.\n\nWorking with collaborators, he developed a practical single-wire electric telegraph and, crucially, the simple code of dots and dashes that bears his name, allowing operators to tap out messages letter by letter. In 1844 he sent the famous first official message down the line from Washington to Baltimore: 'What hath God wrought'. The telegraph spread explosively across America and the world, making Morse wealthy and celebrated (though embroiled in patent disputes) and knitting distant places together for the first time. He died in New York in 1872."
    notes: ["Co-invented the electric telegraph and Morse code; 'What hath God wrought'; also a noted portrait painter."]

