    facts: "Richard I earned the name 'Lionheart' (Cœur de Lion) as a fearless, charismatic warrior who spent almost his entire ten-year reign away from England — which he treated mainly as a source of money for war. He was the great Christian commander of the Third Crusade, winning famous victories against the sultan Saladin, with whom he shared a wary mutual respect, though he never managed to retake Jerusalem itself.\n\nReturning home he was captured and held for a colossal ransom by rivals, nearly bankrupting England to free him. His end was almost absurdly small: besieging an obscure castle in France in a squabble over buried treasure, he was hit in the shoulder by a crossbow bolt. The wound turned gangrenous, and he died at forty-one — pardoning, it is said, the boy who had shot him (a mercy his men ignored once he was dead)."
    notes: ["Warrior-king of the Third Crusade; killed by a crossbow bolt (gangrene) at a minor siege, 1199."]

