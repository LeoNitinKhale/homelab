    position: "born in the basket, squeezing, painting — creating, above/front. Clean. The bees *pour out* and swarm at head height, which reads as emergence rather than a death action. **Fix**: have them pour downward and settle behind/below him as he falls in the field."
    facts: "Vincent van Gogh came to painting late and sold, famously, almost nothing in his lifetime — kept afloat financially and emotionally by his devoted brother Theo, to whom he poured out his soul in hundreds of letters. In barely a decade he produced some 2,000 works of blazing colour and feeling, from the Sunflowers to The Starry Night, all but inventing the language of modern expressive painting.\n\nHe was tormented by mental illness, most notoriously cutting off part of his own ear during a breakdown in Arles. In 1890, at thirty-seven, he shot himself in a wheat field and died two days later. His fame — and astronomical prices — came only after his death, making him the archetype of the misunderstood genius."
    notes: ["The \"I can't 'ear them\" pun refers to cutting off his ear.", "He shot himself in a wheat field at Auvers (29 July 1890, dying two days later), so the field is right. The bees carry the number but have no historical hook — the weakest part of an otherwise strong scene."]

