    facts: "Hannibal Barca of Carthage was Rome's most feared enemy, a general who as a boy reputedly swore an eternal oath of hostility to Rome. In 218 BC he did the unthinkable, leading an army — complete with war elephants — across the Pyrenees and the snowbound Alps to strike at Italy from the north, catching the Romans completely off guard.\n\nFor fifteen years he rampaged almost unbeaten through Italy, annihilating a vast Roman army at Cannae in one of the most studied battles in history. Yet he could never take Rome itself, was recalled to defend Carthage, and lost at Zama, spending his last years as a hunted exile advising Rome's other enemies. Rather than be captured and paraded through the streets of the city he had sworn to destroy, he took poison, around 183 BC."
    notes: ["Crossed the Alps with elephants to invade Italy; won crushing victories but never took Rome; took poison to avoid capture."]

