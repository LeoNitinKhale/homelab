    facts: "Napoleon Bonaparte was a minor Corsican noble who rose on the chaos of the French Revolution to become, by his mid-thirties, Emperor of the French and master of most of Europe. A military genius who reshaped the art of war, he also left a deeper civilian legacy in the Napoleonic Code, still the backbone of law in much of the world.\n\nHis ambition finally overreached in the frozen catastrophe of the 1812 invasion of Russia; after a brief comeback he was crushed at Waterloo in 1815. Exiled to the remote Atlantic island of St Helena, he died there in 1821 — officially of stomach cancer, though arsenic poisoning has been rumoured ever since."
