# Controlled vocabulary — the standard values used across all figures. Mirrors the
# Fields table in mnemonic_implementations.md. role/field are many-valued per figure;
# era/region/end are single-valued.
vocabulary:
  role: [writer, poet, playwright, composer, artist, philosopher, mathematician,
    astronomer, physicist, chemist, naturalist, physician, nurse, engineer, architect,
    inventor, historian, statistician, economist, lawyer, clergyman, politician,
    statesman, ruler, king-emperor, queen, general, revolutionary, explorer, businessman]
  field: [science, arts, music, literature, power, military, exploration, philosophy]
  era: [ancient, medieval, renaissance, early-modern, enlightenment, industrial, modern]
  region: [british, french, italian, german, austrian, american, dutch, polish,
    serbian, egyptian, roman, greek, macedonian, mongol, genoese, indian, south-african]
  end: [natural, illness, assassinated, executed, suicide, battle, uncertain]

