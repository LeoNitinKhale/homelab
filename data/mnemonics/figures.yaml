    position: "grabbing chalk, writing on the board — birth action, above waist, front. The myrrh box is the weak point: *opening* is a birth-type action, and nothing places it low or behind. **Fix**: put the box on the floor, drop the lid, have the fumes rise from below her."
    facts: "Marie Curie, born Maria Skłodowska in Russian-occupied Poland, studied in a clandestine 'flying university' before escaping to Paris, where she often worked hungry and freezing in a garret. With her husband Pierre she discovered the elements polonium (named for her homeland) and radium, and coined the very word 'radioactivity'.\n\nShe became the first woman to win a Nobel Prize, the first person to win two, and the only person ever to win in two different sciences — physics and chemistry. She carried tubes of glowing radium in her pockets, unaware of the danger; the radiation she pioneered eventually killed her in 1934, and her notebooks remain so radioactive they are kept in lead-lined boxes."
    notes: ["She died of aplastic anaemia from radiation exposure, not from inhaling anything — the fumes are a number-carrier, not history."]

