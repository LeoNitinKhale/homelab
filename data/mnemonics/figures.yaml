    facts: "Dmitri Mendeleev was a Russian chemist celebrated for creating the periodic table of the elements, one of the great unifying achievements of science. Arranging the known elements by atomic weight and recurring chemical properties, he saw a repeating 'periodic' pattern — and, crucially, had the confidence to leave gaps in his 1869 table where he believed undiscovered elements must fit, predicting their properties in detail. When elements like gallium and germanium were later found and matched his forecasts closely, his system was triumphantly vindicated.\n\nA colourful, famously shaggy-bearded eccentric who reputedly had his hair and beard trimmed only once a year, he was also a wide-ranging thinker who worked on petroleum, agriculture and standardising Russian vodka, and served as director of the national bureau of weights and measures. Despite his fame he was, controversially, never awarded a Nobel Prize. He died of influenza in St Petersburg in 1907; the element mendelevium is named in his honour."
    notes: ["Devised the periodic table of the elements; left gaps that correctly predicted undiscovered elements."]

