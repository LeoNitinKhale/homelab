    death_peg_candidates: ["Tub", "Tape", "Tip", "Tuba", "Tap"]
    facts: "Andrew Carnegie was a Scottish-American industrialist who rose from desperate poverty — arriving in the United States as a poor immigrant boy and starting work in a cotton mill — to become one of the wealthiest people in history as the king of American steel. Through relentless drive, shrewd investment and ruthless efficiency, he built the Carnegie Steel Company into a giant that he sold in 1901 for an astronomical sum, helping to power America's industrial rise.\n\nHis reputation is shadowed by the violent 1892 Homestead strike, in which steelworkers were killed. But Carnegie also articulated, in his 'Gospel of Wealth', the belief that the rich have a duty to use their fortunes for the public good — and he practised it spectacularly, giving away the equivalent of billions to found some 2,500 public libraries around the world, plus universities, concert halls (Carnegie Hall) and peace endowments. Declaring that 'the man who dies rich dies disgraced', he had donated most of his fortune by the time he died in 1919."
    notes: ["Steel magnate turned great philanthropist; funded ~2,500 libraries; 'the man who dies rich dies disgraced'."]

