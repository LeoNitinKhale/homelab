    facts: "Hipparchus of Nicaea is often called the greatest astronomer of antiquity and the founder of trigonometry, which he developed as a tool for calculating the positions of the stars and planets. He compiled the first comprehensive star catalogue in the Western world, recording the positions and brightnesses of hundreds of stars, and invented the 'magnitude' scale for stellar brightness that astronomers still use in modified form today.\n\nBy comparing his own careful observations with older Babylonian records, he made his most celebrated discovery — the slow 'precession of the equinoxes', a gradual wobble of the Earth's axis over some 26,000 years. Almost all his own writings are lost; much of what we know survives only because the later astronomer Ptolemy built upon (and preserved fragments of) his work."
    notes: ["Compiled the first major star catalogue; founded trigonometry; discovered the precession of the equinoxes."]

