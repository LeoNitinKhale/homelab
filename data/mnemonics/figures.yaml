    facts: "Simón Bolívar was the aristocratic Venezuelan soldier and statesman who led much of South America to independence from Spain, earning the title 'El Libertador' ('the Liberator'). Inspired by Enlightenment ideals and the American and French revolutions, he waged a long, daring military campaign across the continent — including an audacious crossing of the freezing Andes to surprise the Spanish — and helped free the territories that became Venezuela, Colombia, Ecuador, Peru, Panama and Bolivia (which is named after him).\n\nHe dreamed of uniting Spanish America into a single great federation, 'Gran Colombia', but regional rivalries, personal ambitions and political chaos tore it apart almost as fast as he built it, and he was eventually forced from power. Bitter and exhausted, reportedly lamenting that those who serve a revolution 'plough the sea', he died of tuberculosis in 1830 at just 47. He remains the supreme national hero across much of Latin America."
    notes: ["'The Liberator'; freed much of South America from Spain; Bolivia is named after him; died disillusioned of tuberculosis."]

