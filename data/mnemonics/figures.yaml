    facts: "Ernest Hemingway turned his own adventures into a legend and a literary revolution. He drove ambulances in the First World War, reported the Spanish Civil War, fished the Gulf Stream, hunted in Africa, survived two plane crashes on consecutive days, and drank prodigiously through it all — living the raw, physical life he then rendered in prose stripped to the bone.\n\nHis 'iceberg' style — short, declarative sentences that leave most of the meaning beneath the surface — reshaped twentieth-century writing and won him the Nobel Prize, capped by his fable of dignity in defeat, The Old Man and the Sea. But the injuries, the alcohol and a family history of depression caught up with him; increasingly paranoid and unable to write, he shot himself at his Idaho home in 1961, as his father had done before him."
    notes: ["Nobel laureate; the spare 'iceberg' style; died by suicide in 1961."]

