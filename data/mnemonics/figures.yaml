    facts: "Pericles led Athens through its golden age in the mid-fifth century BC, championing its radical direct democracy and pouring public money into the arts and architecture — above all the Parthenon and the other great temples of the Acropolis, built under his patronage. A brilliant orator and cautious strategist, he dominated Athenian politics for some thirty years without ever being a king, ruling instead through persuasion and repeated election.\n\nWhen war with Sparta came, his strategy was to shelter Athens' population behind its walls and rely on its navy — but the overcrowding helped a terrible plague tear through the city. His magnificent Funeral Oration, honouring the war dead and praising Athenian democracy, survives as one of the great speeches of antiquity. He himself succumbed to the plague in 429 BC, and Athens never quite found his equal again."
    notes: ["BC. Led Athens at its democratic and cultural peak; built the Parthenon; died in the plague during the Peloponnesian War."]

