    facts: "John Donne lived two lives in one. As a young man he was a witty, worldly adventurer who sailed on naval raids against Spain and wrote some of the most passionate, ingenious and frankly erotic love poetry in English — the 'metaphysical' style, full of startling extended metaphors ('conceits'). His secret marriage to his employer's young niece wrecked his career and briefly landed him in prison.\n\nYears of hardship and a deepening faith led him to the Church, and he became the celebrated Dean of St Paul's Cathedral, preaching powerful sermons on death and salvation and writing devotional works that gave the language enduring phrases like 'No man is an island' and 'never send to know for whom the bell tolls; it tolls for thee'. Obsessed with mortality, he even posed for a portrait wrapped in his burial shroud before dying in 1631."
    notes: ["Metaphysical poet ('No man is an island'; 'Death, be not proud'); later Dean of St Paul's; posed for his portrait in his burial shroud."]

  - id: 133
    name: "James Clerk Maxwell"
