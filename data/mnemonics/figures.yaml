    facts: "Attila was king of the Huns and the most feared barbarian leader of the ancient world, remembered by terrified Christians as 'the Scourge of God'. From his power base on the plains of central Europe he built a vast, if short-lived, empire of Hunnic and subject tribes, and for years extorted enormous payments of gold from the Eastern Roman Empire by threatening — and repeatedly delivering — devastating raids across the Balkans.\n\nHe invaded Gaul, where he was checked at the great Battle of the Catalaunian Plains, then ravaged northern Italy, reportedly turned back from Rome itself only by a personal appeal from Pope Leo I. His end, in 453, was strikingly undramatic for such a warrior: celebrating a new marriage with a heavy feast, he suffered a severe nosebleed and, lying in a drunken stupor, choked to death on his own blood. His empire fell apart almost immediately among his squabbling sons."
    notes: ["'The Scourge of God'; terrorised the late Roman Empire; died of a haemorrhage (nosebleed) on his wedding night in 453."]

