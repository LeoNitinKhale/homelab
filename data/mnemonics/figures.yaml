    facts: "Margaret Thatcher was Britain's first female Prime Minister and its longest-serving of the twentieth century, a conviction politician so uncompromising that a Soviet journalist's jibe, the 'Iron Lady', became her badge of honour. A grocer's daughter and trained chemist turned lawyer, she led the Conservatives to power in 1979 and drove through a radical free-market revolution — privatising state industries, curbing the trade unions (most bitterly in the year-long miners' strike), cutting taxes and championing individual enterprise.\n\nAbroad she forged a close partnership with Ronald Reagan, took a hard line against the Soviet Union, and won a surge of patriotic support by retaking the Falkland Islands after Argentina invaded in 1982. Adored and loathed in almost equal measure, she was finally forced out by her own party in 1990 over the deeply unpopular 'poll tax' and splits over Europe. She spent her final years in failing health and dementia, dying in 2013, as polarising in death as she had been in life."
    notes: ["Britain's first female PM (1979–90); the 'Iron Lady'; free-market reforms, the miners' strike and the Falklands War."]

