    facts: "Johannes Brahms was a German composer usually ranked with Bach and Beethoven as one of the three great 'B's of classical music, the towering conservative of the Romantic era. Weighed down by the crushing legacy of Beethoven, he laboured for more than two decades over his First Symphony, so nervous of the comparison that when it finally appeared admirers dubbed it 'Beethoven's Tenth' — a compliment that both pleased and irritated him.\n\nA gruff, bearded, endlessly self-critical bachelor who destroyed much of his own work, he nonetheless produced four majestic symphonies, concertos, chamber music, the consoling German Requiem, and the tender Lullaby now sung to babies everywhere. Devoted (probably chastely) to Clara Schumann, the wife of his mentor, he never married. He died of cancer in Vienna in 1897, the last giant of the German symphonic tradition."
    notes: ["Four symphonies, the German Requiem and the famous Lullaby; a perfectionist who took over 20 years to finish his First Symphony."]

