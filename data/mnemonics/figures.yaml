    facts: "Carl Gustav Jung was a Swiss psychiatrist who founded analytical psychology and gave everyday language a host of concepts — the 'collective unconscious', 'archetypes', 'complex', 'synchronicity', and the introvert/extravert distinction. Once Freud's heir apparent, he broke painfully with him around 1913, rejecting Freud's emphasis on sexuality and proposing instead a deeper, shared layer of the human mind populated by universal symbols that surface in myths, religions and dreams across all cultures.\n\nAfter the split he endured a prolonged psychological crisis he later mined for insight, exploring dreams, mandalas, mythology and (to many colleagues' unease) alchemy and the occult as maps of the journey toward psychological wholeness, which he called 'individuation'. Enormously influential on psychology, religion, art and the modern fascination with the inner life, he kept writing into old age and died peacefully at his lakeside home near Zürich in 1961."
    notes: ["Founder of analytical psychology; coined the collective unconscious, archetypes, and introvert/extravert; broke with Freud."]

