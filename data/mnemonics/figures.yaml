    facts: "William Blake was a poet, painter and printmaker so far ahead of his time that he was dismissed in his own life as an eccentric or a madman, and only recognised as a genius long after his death. From childhood he claimed to see visions — angels in a tree, the face of God at a window — and these fed a body of work of extraordinary imaginative power, from the deceptively simple Songs of Innocence and Experience (including 'The Tyger') to sprawling mythological epics.\n\nHe invented his own method of 'illuminated printing', etching poem and picture together onto copper plates and hand-colouring the prints, so that he was author, artist and publisher all at once. Fiercely independent, mystical and politically radical, he lived and died in poverty, but reportedly spent his final hours in 1827 singing joyfully — and is now regarded as one of the towering figures of English Romanticism."
    notes: ["Poet and printmaker ('The Tyger', 'Jerusalem'); invented relief etching for his illuminated books; a lifelong visionary."]

