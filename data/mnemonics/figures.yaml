    facts: "George S. Patton was the most aggressive and colourful American field commander of the Second World War, a master of fast-moving armoured warfare famed for his profane speeches, ivory-gripped revolvers and driving will to attack. Nicknamed 'Old Blood and Guts', he led troops with dramatic flair in North Africa and Sicily, then commanded the Third Army in its lightning sweep across France after the Normandy breakout, and in a celebrated feat wheeled his forces north through winter to relieve the besieged town of Bastogne during the Battle of the Bulge.\n\nBrilliant but volatile, he nearly wrecked his career by slapping two shell-shocked soldiers he accused of cowardice, and he repeatedly courted controversy with his outspokenness and his hard line against the Soviets. He believed in reincarnation and thought himself a warrior of ages past. Ironically, having survived so much combat, he died in December 1945 from injuries sustained in a low-speed car accident in occupied Germany, just months after victory in Europe."
    notes: ["Aggressive US tank general of WWII; North Africa, Sicily, the relief of Bastogne; died after a car accident in 1945."]

