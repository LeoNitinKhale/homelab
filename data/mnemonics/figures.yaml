    facts: "Joseph Stalin — 'man of steel' — rose from a Georgian cobbler's son and bank-robbing revolutionary to absolute dictator of the Soviet Union, which he ruled for a quarter of a century. Seizing power after Lenin's death, he drove through brutal, breakneck industrialisation and the forced collectivisation of farming, causing famines (notably in Ukraine) that killed millions, while the Great Purge of the 1930s sent countless more to execution or the gulag labour camps on his paranoid orders.\n\nHe led the USSR at staggering human cost to victory over Nazi Germany in the Second World War, emerging as master of a superpower and an architect of the Cold War. Feared even by his closest henchmen, he died in 1953 after a stroke — collapsing alone, with his guards reportedly too terrified to check on him for hours. Denounced by his own successor, he remains one of history's deadliest tyrants."
    notes: ["Ruled the USSR through terror; purges, gulags and famine killed millions; led the Soviet war against Nazi Germany; died of a stroke in 1953."]

