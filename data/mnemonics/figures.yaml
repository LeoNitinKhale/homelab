    facts: "Ludwig Wittgenstein was born into one of the wealthiest families in Europe and gave away his entire vast inheritance, choosing to live in radical simplicity. Widely regarded as one of the twentieth century's greatest philosophers, he wrestled with the deepest problems of logic, language and meaning — and did it twice, first in his Tractatus and then by demolishing his own earlier conclusions.\n\nRestless and intense, he kept abandoning philosophy for humbler work — a village schoolteacher, a monastery gardener, a wartime hospital porter — before returning to it. He published just one slim book in his lifetime. Dying of prostate cancer in 1951, his last words were reportedly: 'Tell them I've had a wonderful life.'"
