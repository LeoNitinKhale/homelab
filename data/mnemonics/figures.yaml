    death_peg_candidates: ["Coal", "Coil", "Eagle", "Gold"]
    facts: "Charles Lyell was a Scottish-born geologist whose great work, Principles of Geology (1830-33), transformed how humanity understands the Earth's past. He championed 'uniformitarianism' — the idea that the same slow, everyday processes we see today (erosion, sedimentation, volcanism) shaped the planet over immense spans of time — against the prevailing 'catastrophist' view that dramatic events like a biblical flood had done the work.\n\nBy demonstrating that the Earth was vastly older than a few thousand years, Lyell provided the 'deep time' that Charles Darwin needed for evolution by natural selection to work; Darwin took Lyell's book on the Beagle voyage and the two became close friends, though Lyell struggled personally to accept that humans had evolved. Immensely influential and much honoured, he was knighted and later made a baronet, and died in London in 1875, buried in Westminster Abbey."
    notes: ["Principles of Geology; championed 'deep time' and uniformitarianism; a key influence on Darwin."]

  - id: 220
