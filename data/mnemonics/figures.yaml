    facts: "Sir Alexander Fleming was a Scottish physician and bacteriologist whose chance discovery of penicillin in 1928 launched the antibiotic era and transformed medicine. Returning from holiday to his notoriously untidy laboratory at St Mary's Hospital in London, he noticed that a culture dish of Staphylococcus bacteria had been contaminated by a stray mould, Penicillium, and that the bacteria had been killed in a ring around it — the mould was producing a substance that destroyed them.\n\nFleming identified and named 'penicillin', but struggled to purify it in quantity, and it was only a decade later that Howard Florey and Ernst Chain turned it into a usable, mass-produced drug in time to save countless lives in the Second World War and after. The three shared the Nobel Prize in 1945. Modest about how much luck was involved, Fleming himself warned presciently about the danger of bacteria developing resistance if the drug were misused. He died of a heart attack in 1955."
    notes: ["Discovered penicillin (1928), the first antibiotic, by lucky accident; shared the 1945 Nobel Prize."]

