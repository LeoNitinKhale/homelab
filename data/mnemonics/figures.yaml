    facts: "John Lennon was the co-founder, rhythm guitarist and one of the two chief songwriters of the Beatles, the most influential band in the history of popular music. Sharp-witted, rebellious and endlessly inventive, he formed a legendary songwriting partnership with Paul McCartney that produced dozens of classics as the group conquered the world in the 1960s and reshaped what pop music could be.\n\nAfter the Beatles split, he pursued a solo career and, with his second wife Yoko Ono, turned increasingly to peace activism — staging 'bed-ins' against the Vietnam War and writing the anthems 'Give Peace a Chance' and the utopian 'Imagine'. Having stepped back from music to raise his young son, he was returning to his New York apartment building, the Dakota, on the night of 8 December 1980 when a deranged fan shot him dead. He was just 40, and the world's grief was immediate and overwhelming."
    notes: ["Beatles co-founder and songwriter; 'Imagine' and peace activism; assassinated outside his New York home in 1980."]

