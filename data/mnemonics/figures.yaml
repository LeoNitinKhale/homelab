    facts: "Daniel Defoe was an English writer, merchant, pamphleteer and government spy who came to novel-writing late and produced, in Robinson Crusoe (1719), one of the first and most influential novels in the language — the tale of a shipwrecked sailor surviving alone for decades on a desert island, loosely inspired by the real castaway Alexander Selkirk.\n\nBefore that he had led a turbulent life: a religious dissenter jailed and pilloried for his satirical pamphlets, bankrupted more than once, and employed as a secret agent. Astonishingly prolific, he also wrote Moll Flanders and A Journal of the Plague Year. Hounded by creditors to the end, he died in 1731 while hiding from them — but left behind a template for the realistic novel that shaped everything that followed."
    notes: ["Author of Robinson Crusoe, an early English novel; also a prolific pamphleteer, government spy and serial debtor."]

