    facts: "Michelangelo Merisi da Caravaggio revolutionised European painting with his violent realism and his trademark tenebrism — figures hauled out of deep darkness by a single dramatic beam of light. He used prostitutes and street people as models for the Virgin and the saints, giving his religious scenes a shocking, dirty-fingernailed immediacy that scandalised and electrified Rome.\n\nHis life was as extreme as his art: a hot-tempered brawler perpetually in trouble with the law, he killed a man in a duel (possibly over a bungled bet) in 1606 and spent his last years as a fugitive, painting furiously between scrapes. In 1610, chasing a papal pardon, he died alone and feverish on a beach at Porto Ercole, aged just 38 — his death, like much of his life, wrapped in mystery."
    notes: ["Master of dramatic light (chiaroscuro/tenebrism); a murderer who died a fugitive at Porto Ercole in 1610."]

