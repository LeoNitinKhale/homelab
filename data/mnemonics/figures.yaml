    facts: "Enrico Fermi was an Italian-American physicist, one of the very few equally brilliant as a theorist and an experimentalist, whose work opened the nuclear age. In Italy he made fundamental contributions to quantum theory and the physics of the atomic nucleus (winning the 1938 Nobel Prize), then used his Nobel trip as a chance to flee Fascist Italy for the United States with his Jewish wife.\n\nAt the University of Chicago in 1942 he built and ran Chicago Pile-1, the first controlled, self-sustaining nuclear chain reaction — the birth of nuclear power — signalled by the coded message 'the Italian navigator has landed in the New World'. He became a central figure in the Manhattan Project that built the atomic bomb. His name lives on in the Fermi paradox (about alien civilisations), the element fermium, and the fermilab accelerator. Years of work around radiation likely contributed to the stomach cancer that killed him in 1954, aged just 53."
    notes: ["Built the first nuclear reactor (Chicago Pile-1, 1942); key Manhattan Project figure; the 'Fermi paradox' and element fermium."]

