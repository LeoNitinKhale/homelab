    facts: "Antonio Vivaldi was ordained a priest — nicknamed 'il Prete Rosso', the Red Priest, for his flaming hair — but asthma soon excused him from saying Mass, and he devoted himself instead to music. For much of his career he taught at the Ospedale della Pietà, a Venetian home for orphaned and abandoned girls, whose all-female orchestra he trained into one of the finest ensembles in Europe.\n\nAstonishingly prolific, he wrote some 500 concertos, among them the four violin concertos known as The Four Seasons — early 'programme music' that paints frozen streams, barking dogs and summer storms in sound. Fashion turned against him in old age; he travelled to Vienna hoping for imperial patronage, but his backer the Emperor died, and Vivaldi followed soon after in 1741, penniless and all but forgotten. His music lay ignored for two centuries before its triumphant twentieth-century rediscovery."
    notes: ["The 'Red Priest' who taught at a Venetian orphanage; wrote the Four Seasons; died poor in Vienna."]

