    death_peg_candidates: ["Tin", "Den", "Dawn", "Ton", "Down", "Tan"]
    facts: "Wilbur Wright was the elder and, many thought, the more intellectually driving of the two Ohio bicycle-shop brothers who cracked the age-old problem of powered, controlled human flight. Where earlier would-be aviators had focused on engines, the Wrights realised the real challenge was control — and, watching birds and testing wings in a home-made wind tunnel, they devised 'wing-warping' to bank and steer.\n\nOn 17 December 1903, on the windy dunes of Kitty Hawk, North Carolina, their Flyer made the first sustained, controlled powered flights in history. Wilbur then led the fight to demonstrate and patent their invention, dazzling Europe with flying exhibitions and battling rivals and imitators in exhausting lawsuits. The strain may have worn him down; in 1912 he contracted typhoid fever and died at just forty-five, before the aviation age he had launched truly took off."
    notes: ["With his brother Orville, achieved the first controlled powered flight (Kitty Hawk, 1903); died of typhoid in 1912."]

