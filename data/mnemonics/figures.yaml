    facts: "Carl von Clausewitz was a Prussian general and military theorist whose posthumous book On War became the most influential study of conflict ever written, still taught in war colleges today. Having fought in the brutal Napoleonic campaigns from the age of twelve — including catastrophic defeat and later victory — he set out to understand war not as a set of formulas but as a violent, chaotic, deeply human political act.\n\nHis famous insight, that 'war is the continuation of politics by other means', reframed armed force as a tool of state policy rather than an end in itself, and he coined enduring concepts like the 'fog of war' and 'friction' — the way that fear, chance and exhaustion foul up even the best plans. He died of cholera in 1831 with the manuscript unfinished; his widow Marie edited and published it, securing his lasting fame."
    notes: ["Author of On War; 'war is politics by other means'; the 'fog of war'; died of cholera on campaign."]

