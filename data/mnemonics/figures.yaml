    facts: "Kurt Gödel was an Austrian-American logician widely regarded as the greatest of the twentieth century, and perhaps since Aristotle. In 1931, aged just 25, he proved his two Incompleteness Theorems, which shattered a cherished dream: he showed that in any consistent formal system rich enough to describe arithmetic, there will always be true statements that the system itself can never prove, and that such a system can never prove its own consistency. It set permanent limits on what logic and mathematics can achieve.\n\nHe emigrated to Princeton, where he became one of Einstein's closest friends and daily walking companions, and even produced a solution to Einstein's equations describing a universe in which time travel was possible. But Gödel was tormented by anxiety and paranoia; convinced that people were trying to poison him, he would eat only food prepared by his wife. When she was hospitalised and could no longer cook for him, he refused to eat and effectively starved himself to death in 1978."
    notes: ["Incompleteness Theorems — true statements exist that no consistent system can prove; a close friend of Einstein; died of self-starvation."]

