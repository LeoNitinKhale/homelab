    facts: "Before he was Britain's greatest architect, Christopher Wren was a brilliant astronomer and mathematician — a founder of the Royal Society whom Isaac Newton rated among the finest geometers of the age. He came to architecture almost by accident, and then the Great Fire of London in 1666 handed him the commission of a lifetime: to rebuild a gutted city.\n\nOver the following decades he designed 52 churches and his masterpiece, the vast domed St Paul's Cathedral, which he lived to see completed — climbing the scaffolding into his eighties to inspect the work. He died at 90 after catching a chill, and was buried in the crypt of St Paul's beneath a plain slab whose Latin inscription reads: 'Reader, if you seek his monument, look around you.'"
    notes: ["Rebuilt London after the Great Fire; his epitaph in St Paul's: 'if you seek his monument, look around you.'"]

