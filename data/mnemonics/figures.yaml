    death_peg_candidates: ["Vase", "Fuse", "Face", "Fez"]
    facts: "Jean-Paul Sartre was the most famous philosopher of the twentieth century's middle decades, the presiding figure of French existentialism and a public intellectual of enormous influence. In dense works like Being and Nothingness and accessible novels and plays like Nausea and No Exit ('Hell is other people'), he argued that human beings have no fixed, God-given essence — 'existence precedes essence' — and are therefore radically, even agonisingly, free and wholly responsible for what they make of themselves.\n\nWith his lifelong partner, the philosopher Simone de Beauvoir, he held court in the cafés of postwar Paris and became a byword for the engaged, politically committed thinker, championing Marxism and anti-colonial causes (though his defence of the Soviet Union drew fierce criticism). In a famous gesture he declined the 1964 Nobel Prize in Literature, refusing to be 'institutionalised'. Nearly blind and worn out, he died in 1980, with some 50,000 people following his funeral procession."
    notes: ["Leading existentialist; Being and Nothingness, Nausea; 'existence precedes essence'; declined the 1964 Nobel Prize."]

