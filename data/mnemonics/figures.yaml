    facts: "Alfred Nobel was a Swedish chemist, engineer and industrialist who invented dynamite and, troubled by its uses, endowed the world's most prestigious prizes. A restless inventor who held hundreds of patents and built an international business empire, he found a way to stabilise the dangerously volatile explosive nitroglycerine by absorbing it into an inert material, creating dynamite — a controllable explosive that revolutionised mining, construction and tunnelling, but was also seized upon for warfare.\n\nAccording to a famous story, when his brother died a French newspaper mistakenly printed Alfred's obituary, condemning him as a 'merchant of death' who had grown rich by finding new ways to kill; appalled at how he might be remembered, he resolved to leave a better legacy. In his will he directed the bulk of his enormous fortune to fund annual prizes for achievements in physics, chemistry, medicine, literature and peace. He died in 1896; the Nobel Prizes, first awarded in 1901, have honoured human achievement ever since."
    notes: ["Invented dynamite; a premature 'merchant of death' obituary led him to endow the Nobel Prizes."]

