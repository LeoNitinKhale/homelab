    facts: "William Bligh was a supremely skilled British naval navigator whose name became a byword for tyrannical command — though historians now think him more hot-tempered than truly cruel. In 1789 his crew aboard HMS Bounty, seduced by the easy life of Tahiti, mutinied under Fletcher Christian and cast Bligh and eighteen loyal men adrift in a 23-foot open boat with almost no supplies.\n\nWhat should have been a death sentence became one of the greatest feats of seamanship in history: Bligh navigated that little boat some 3,600 miles across the open Pacific to safety in Timor, losing barely a man. His later career was stormy too — he faced further mutinies, including one as the deeply unpopular governor of New South Wales — but he was repeatedly cleared, rose to vice-admiral, and died in London in 1817."
    notes: ["The Mutiny on the Bounty (1789); cast adrift, he navigated 3,600 miles in an open boat; later a colonial governor and vice-admiral."]

