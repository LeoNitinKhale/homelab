    facts: "Herman Melville was an American writer whose masterpiece, Moby-Dick, is now regarded as one of the greatest novels ever written — though it nearly ruined him. As a young man he had sailed on whaling ships and even lived among Pacific islanders, adventures that fed his early, popular sea tales; but Moby-Dick (1851), his sprawling, philosophical epic of Captain Ahab's obsessive hunt for the white whale that took his leg, baffled and disappointed contemporary readers and reviewers.\n\nHis later books sold poorly, and he slid into obscurity, spending his final decades as a New York customs inspector and writing poetry almost no one read. He died in 1891 so forgotten that one obituary got his name wrong. Only in the 1920s did critics rediscover Moby-Dick and recognise Melville as a giant of American literature — a reputation that has only grown since, with 'Call me Ishmael' now among the most famous opening lines in fiction."
    notes: ["Author of Moby-Dick ('Call me Ishmael'); a former whaler; died obscure in 1891, his masterpiece rediscovered later."]

