    facts: "André-Marie Ampère was a French physicist and mathematician who founded the science of electromagnetism — or 'electrodynamics', a word he coined. When news reached Paris in 1820 that a Danish scientist had found that an electric current deflects a compass needle, Ampère seized on it, and within weeks had worked out, with brilliant experiments and mathematics, the laws describing how electric currents create magnetic forces and how two current-carrying wires attract or repel one another.\n\nA child prodigy who reputedly taught himself advanced mathematics as a boy, his life was shadowed by tragedy — his father was guillotined during the Revolution, and his beloved first wife died young — and he was known as a brilliant but famously absent-minded and melancholy man. He died of fever in Marseille in 1836. The fundamental unit of electric current, the ampere (amp), is named in his honour."
    notes: ["Founder of electrodynamics; showed electric currents create magnetism; the 'ampere' (amp) is named after him."]

