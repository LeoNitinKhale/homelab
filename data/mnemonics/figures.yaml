    era_bc: false
    birth_peg: "42 → Orange (R,N,J — trailing J dropped)"
    death_peg: "27 → Ink"
    century: "16 → Tom & Jerry"
    role: ["mathematician", "physicist", "astronomer"]
    field: ["science"]
    era: "early-modern"
    region: "british"
    end: "natural"
    scene: "An orange falls on Newton's head; the juice drips down as orange ink into an inkwell. A book, \"PrINKipia Mathematica,\" sits by his feet."
    position: "ink dripping down to the well, book at his feet — death action, death position, death number. The orange *falls* (a death-type action) while sitting on his head (birth position) carrying the birth number. **Accepted exception**: the falling-fruit/gravity tie is worth the mismatch."
    facts: "Isaac Newton was a solitary, secretive and famously prickly genius who, sent home from Cambridge during a plague year, used the isolation to invent calculus, split white light into the spectrum, and begin working out universal gravitation — the falling apple, literal or not, belongs to this period. His Principia Mathematica set out the laws of motion and gravity that ruled physics for two centuries.\n\nHe was also a man of strange obsessions, spending as much time on alchemy and biblical prophecy as on physics, and feuding venomously with rivals like Hooke and Leibniz. As Master of the Royal Mint he personally hunted down counterfeiters and sent them to the gallows. He died unmarried and rich in 1727, and was buried in Westminster Abbey."
    notes: ["Ink is shared with Genghis (4)."]

