    facts: "Joan of Arc was an illiterate teenage peasant girl who, convinced she heard the voices of saints, talked her way into the presence of the French heir during the Hundred Years' War and persuaded him to let her lead an army. Clad in white armour, she inspired the French to lift the siege of Orléans and turned the tide of the war, seeing him crowned king.\n\nCaptured by the English and their allies, she was tried for heresy and witchcraft and burned at the stake in 1431, aged only nineteen; witnesses claimed her heart would not burn. Twenty-five years later a retrial cleared her name, and centuries afterwards the Church declared her a saint — France's warrior-martyr and patron."
