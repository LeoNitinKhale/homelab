    facts: "Ludwig von Mises was one of the twentieth century's most uncompromising champions of free-market economics and classical liberalism, a leader of the Austrian School who built his system on 'praxeology' — the study of purposeful human action, from which he claimed the laws of economics could be logically deduced. His most influential argument, the 'economic calculation problem', held that without real market prices generated by private property and trade, socialist central planners simply cannot know how to allocate resources rationally — a critique that looked prophetic when planned economies faltered.\n\nA Jewish intellectual, he fled the Nazis, first to Switzerland and then to the United States, where he spent decades as an unsalaried professor at New York University, mentoring students including the future Nobel laureate Friedrich Hayek's fellow travellers. Combative and utterly principled, he wrote his magnum opus Human Action and kept teaching almost to his death in 1973 at 92."
    notes: ["Leading Austrian-School economist; author of Human Action; argued socialist planning cannot rationally allocate resources."]

