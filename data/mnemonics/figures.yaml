    facts: "Adam Smith was a Scottish moral philosopher whose 1776 masterpiece, An Inquiry into the Nature and Causes of the Wealth of Nations, effectively founded modern economics. Writing at the dawn of the Industrial Revolution, he argued that when individuals freely pursue their own self-interest in a competitive market, they are led 'as if by an invisible hand' to benefit society as a whole — and that specialisation (his famous example being a pin factory, where dividing the work multiplied output enormously) was the key to national prosperity.\n\nHe was also the author of an earlier work on ethics, The Theory of Moral Sentiments, and never saw markets as an amoral free-for-all. A famously absent-minded bachelor who once reportedly fell into a tanning pit while lost in thought, he had many of his unpublished manuscripts burned before his death in Edinburgh in 1790. His ideas became the foundation of free-market economics and are argued over to this day."
    notes: ["The Wealth of Nations (1776); the 'invisible hand' and the division of labour; founder of modern economics."]

