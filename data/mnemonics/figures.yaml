    facts: "Samuel Langhorne Clemens took his pen name from the Mississippi riverboat cry 'mark twain' — a leadsman's call meaning the water was two fathoms deep and safe to pass. Before he was a writer he was a licensed steamboat pilot, a failed silver prospector and a travelling journalist, and he mined all of it for the humour that made him America's most beloved author.\n\nThe Adventures of Tom Sawyer and Huckleberry Finn captured a vanishing frontier America and, in Huck, delivered a sly moral demolition of slavery. Twain made and lost fortunes through bad investments, endured the deaths of his wife and two daughters, and grew darker and more bitter in later life. He had been born in 1835, the year Halley's Comet appeared, and often said he expected to 'go out with it' — and, remarkably, he died the day after the comet returned in 1910."
    notes: ["Born in 1835 with Halley's Comet, died in 1910 on its return — exactly as he'd predicted."]

  - id: 63
