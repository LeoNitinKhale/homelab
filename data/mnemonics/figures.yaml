    facts: "Johann Sebastian Bach came from a vast dynasty of German musicians and spent his life as a working church organist and choirmaster, composing to order week after week rather than for posterity. Deeply devout, he poured staggering craftsmanship into cantatas, the Brandenburg Concertos, the Mass in B minor and the Well-Tempered Clavier, perfecting the art of counterpoint.\n\nHe fathered twenty children, walked 250 miles as a young man simply to hear a famous organist play, and was once jailed for a month for trying too insistently to leave a job. He went blind late in life and died in 1750 after a botched eye operation by a travelling quack — the same one who had blinded Handel. Largely forgotten for decades, he is now revered among the supreme composers."
