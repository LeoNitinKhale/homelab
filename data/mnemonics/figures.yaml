    facts: "Arthur Wellesley, Duke of Wellington, learned his trade fighting in India before becoming the general who steadily drove the French out of Spain and Portugal in the gruelling Peninsular War. His masterpiece was Waterloo in 1815, where, with timely Prussian help, he finally shattered Napoleon — 'the nearest run thing you ever saw in your life,' he called it.\n\nNicknamed the 'Iron Duke', he was famous for cool defensive tactics and blunt, unsentimental sayings. He went on to a long and prickly political career, serving twice as Prime Minister and grudgingly helping to pass Catholic emancipation. The Wellington boot, beef Wellington and countless pubs still carry his name. He died peacefully of a stroke in his armchair at Walmer Castle in 1852, and was given a vast state funeral."
    notes: ["Beat Napoleon at Waterloo (1815); twice Prime Minister; the Wellington boot bears his name."]

