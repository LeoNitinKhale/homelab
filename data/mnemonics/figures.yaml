    facts: "Jean-Jacques Rousseau was a Geneva-born philosopher, novelist and composer whose ideas helped ignite both the French Revolution and the Romantic movement. He argued that humans are naturally good but corrupted by society and private property, romanticising a 'state of nature' and the 'noble savage', and in The Social Contract insisted that legitimate government rests only on the 'general will' of the people — a slogan for revolutionaries ever after.\n\nHis novel Emile reshaped ideas about education and childhood, while his startlingly frank Confessions helped invent modern autobiography. Yet his personal life was tangled and troubled: he quarrelled bitterly with fellow Enlightenment figures like Voltaire and Hume, grew increasingly paranoid, and — notoriously — handed all five of his own children to a foundling hospital. He died suddenly, probably of a stroke, at a country estate in 1778."
    notes: ["The Social Contract ('born free but everywhere in chains'); championed nature and popular sovereignty; a founder of Romanticism."]

