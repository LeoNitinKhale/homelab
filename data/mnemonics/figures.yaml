    facts: "Stephen Hawking was a British theoretical physicist who became the most famous scientist of his age, as celebrated for the courage of his life as for the brilliance of his mind. Diagnosed at 21 with motor-neurone disease and given only a few years to live, he defied the prognosis for more than half a century, gradually losing the use of his body and, after a tracheotomy, his voice — communicating through the synthesised voice that became his trademark.\n\nHis greatest scientific achievement was showing, by combining quantum theory with general relativity, that black holes are not entirely black but slowly emit radiation and can eventually evaporate — 'Hawking radiation'. His 1988 book A Brief History of Time sold millions and made cosmology a mass-market subject, and he became a pop-culture icon, appearing on The Simpsons and Star Trek. He held Newton's old chair at Cambridge for thirty years and died in 2018, aged 76."
    notes: ["Showed black holes emit 'Hawking radiation'; wrote A Brief History of Time; worked for decades despite motor-neurone disease."]

