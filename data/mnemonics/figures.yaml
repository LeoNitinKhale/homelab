    facts: "Jeremy Bentham was an English philosopher, jurist and social reformer, the founding figure of utilitarianism — the doctrine that the rightness of any action is measured purely by how much happiness it produces, encapsulated in his principle of 'the greatest happiness of the greatest number'. He proposed a 'felicific calculus' to weigh pleasures against pains, and applied his relentless rationalism to law, punishment, economics and government.\n\nA tireless radical, he campaigned for prison reform (designing the 'panopticon', a circular prison allowing a single guard to watch all inmates), the decriminalisation of homosexuality, animal welfare, women's suffrage and the separation of church and state, influencing generations of reformers. Famously eccentric, he directed that after his death his body be preserved as an 'auto-icon', which still sits, dressed, in a case at University College London. He died in 1832, his ideas carried forward by his disciple John Stuart Mill."
    notes: ["Founder of utilitarianism ('greatest happiness of the greatest number'); the panopticon; his preserved 'auto-icon' at UCL."]

