    facts: "Oscar Wilde was an Irish poet, playwright and the most quotable wit of the Victorian age — a flamboyant champion of 'art for art's sake' whose epigrams ('I can resist everything except temptation') still sparkle. He conquered London society and the stage with dazzling comedies like The Importance of Being Earnest and the decadent novel The Picture of Dorian Gray, cultivating a public persona of aesthetic excess.\n\nAt the height of his fame he sued his lover's father for libel, a catastrophic misjudgement that exposed his homosexuality; he was convicted of 'gross indecency' and sentenced to two years' hard labour, which broke his health and spirit (and produced the searing Ballad of Reading Gaol). Released bankrupt and disgraced, he died in a cheap Paris hotel in 1900 at just 46, reputedly joking to the last about the dreadful wallpaper: 'One of us has to go.'"
    notes: ["Wit and aesthete; The Picture of Dorian Gray, The Importance of Being Earnest; jailed for homosexuality; died in exile in Paris."]

