    facts: "Friedrich Hayek was an Austrian-British economist and philosopher whose defence of free markets and liberty made him one of the most influential thinkers of the twentieth century, especially after decades in the intellectual wilderness. His central insight, the 'knowledge problem', was that the information needed to run an economy — millions of people's shifting wants, resources and local circumstances — can never be gathered by any central planner, but is coordinated automatically by the price system, an example of the 'spontaneous order' he saw throughout society.\n\nWriting in wartime Britain, his The Road to Serfdom (1944) warned that well-meaning central planning tends toward totalitarianism, and became a surprise bestseller. Long overshadowed by Keynes, he shared the 1974 Nobel Prize in Economics and saw his ideas embraced by leaders like Thatcher and Reagan. He died in 1992, having lived to see the collapse of the planned economies he had spent his life criticising."
    notes: ["The Road to Serfdom; spontaneous order and the knowledge problem; 1974 Nobel laureate; a major influence on late-20th-century liberalism."]

