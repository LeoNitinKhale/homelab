    facts: "Thomas Edison was America's most famous inventor, a self-taught, relentlessly practical genius who held over a thousand patents and, as much as anyone, built the modern electrical world. Working from his 'invention factory' at Menlo Park — arguably the first industrial research laboratory — he and his teams produced the phonograph (which first made him famous as 'the Wizard of Menlo Park'), the motion-picture camera, and, above all, the first commercially practical incandescent light bulb, after testing thousands of possible filaments.\n\nJust as importantly, he built the entire electrical system — generators, wiring, meters — to make electric lighting usable, and fought the 'War of the Currents' against Tesla and Westinghouse's alternating current. A shrewd, sometimes ruthless businessman with a gift for self-promotion, he coined the line that genius is 'one percent inspiration and ninety-nine percent perspiration'. When he died in 1931, communities across the United States briefly dimmed their lights in tribute."
    notes: ["The practical incandescent light bulb, phonograph and motion-picture camera; over 1,000 patents; founded Menlo Park."]

