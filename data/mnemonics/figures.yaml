    facts: "Abraham Lincoln rose from a one-room Kentucky log cabin and almost no formal schooling to become, largely self-taught, a lawyer, congressman and the sixteenth President of the United States. His election triggered the secession of the southern slave states and plunged the nation into the Civil War, which he was determined to fight to preserve the Union.\n\nHe issued the Emancipation Proclamation freeing the enslaved, and distilled the war's higher purpose into the few immortal sentences of the Gettysburg Address. Just days after the war ended in Union victory, he was shot in the head by the actor John Wilkes Booth at Ford's Theatre, and died the next morning — the first American president to be assassinated."
    notes: ["🟡 Visual not strong enough. Open.", "Shares the birth peg with Darwin (8) — same birth year, in fact the same day, 12 Feb 1809. A linked pair of scenes is an option if the separate ones stay thin."]

