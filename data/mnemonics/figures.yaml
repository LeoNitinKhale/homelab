    facts: "Hernán Cortés was a minor Spanish nobleman and adventurer who, in 1519, led a few hundred men into the heart of Mexico and, within two years, brought down the mighty Aztec Empire. To stop his nervous men from turning back, he famously scuttled his own ships on the coast. Exploiting native resentment of Aztec rule, superior steel and gunpowder, and the diseases the Europeans carried, he captured the emperor Moctezuma and razed the great island-capital Tenochtitlán.\n\nThe conquest opened Mexico to three centuries of Spanish rule and unleashed catastrophe on its indigenous peoples. Cortés grew rich but never won the lasting power or recognition he craved; sidelined by the Spanish crown and mired in lawsuits, he died near Seville in 1547, wealthy but resentful and largely forgotten by the court he had made so much richer."
    notes: ["Conquered the Aztec Empire; scuttled his own fleet to prevent retreat; died out of favour in Spain."]

