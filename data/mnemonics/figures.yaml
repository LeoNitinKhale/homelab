figures:
  - id: 1
    name: "Mozart"
    state: completed
    status: green
    birth_year: 1756
    death_year: 1791
    era_bc: false
    birth_peg: "56 → Leash"
    death_peg: "91 → Pad / Bat (both encode 91 — deliberate reinforcement)"
    century: "17 → Tom Kerridge"
    role: ["composer"]
    field: ["music"]
    era: "enlightenment"
    region: "austrian"
    end: "illness"
    scene: "A leash around Mozart's neck, his overbearing father on the other end, controlling him. He wears cricket pads on his legs and holds a bat down at his side."
    position: "leash at the neck, above waist, front. Pads and bat both below waist — death position. Clean."
    facts: "Wolfgang Amadeus Mozart was a freak of nature — a child prodigy playing the keyboard blindfolded and composing at five, paraded around the courts of Europe by his ambitious father Leopold like a performing miracle. He grew into perhaps the most naturally gifted composer who ever lived, able to write out whole works already finished in his head, with barely a correction.\n\nYet fame and money slipped through his fingers. He chafed against his stingy Salzburg employers, went freelance in Vienna, and swung between triumph and debt, firing off begging letters to friends. He died at just thirty-five while writing his Requiem, and was buried in a common grave — the cause (rheumatic fever, kidney failure, or something else) still argued over two centuries later."
    notes: ["The father is an emotional trigger, not a number-carrier."]

  - id: 2
    name: "Newton"
