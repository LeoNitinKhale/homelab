    scene: "Plucks a cherry from a tree hung with oversize cherries and scrolls, inking his fingers. Writes on an unravelled scroll, lays it on a dish, kneels and presents it low: \"a fine dish for her majesty.\""
    position: "plucking from a tree — birth action, birth position. The dish presented low from a kneel — death position. Clean."
    facts: "William Shakespeare is the most famous writer in the English language, yet we know maddeningly little about him — a glover's son from Stratford-upon-Avon who married at eighteen, surfaced in London as an actor and playwright, and produced some 38 plays and 154 sonnets that have never left the stage since. He gave English roughly 1,700 new words and phrases still in daily use.\n\nHe wrote for the Globe, a round open-air playhouse packed with rowdy 'groundlings', ran his company as a profit-sharing shareholder, and grew wealthy enough to retire to the second-grandest house in Stratford. He died at 52 on (by tradition) his own birthday; the cause is unknown, and a curse carved on his gravestone still warns anyone against moving his bones."
    notes: ["The spoken line fixes the word as *dish*. \"Plate\" is P,L,T = 951."]

  - id: 4
    name: "Genghis Khan"
    state: completed
    status: red
    birth_year: 1162
    death_year: 1227
    era_bc: false
    birth_peg: "62 → Chains"
    death_peg: "27 → Nike"
    century: "11 → Tony Tiger"
    role: ["ruler", "general"]
    field: ["power", "military"]
    era: "medieval"
    region: "mongol"
    end: "uncertain"
    scene: "Wrapped in chains — early-life struggle. Breaks free. Sweats uncontrollably and keels over saying 'Just screw it!' Feet have Nikes on represent his historical victory/conquest."
    position: "chains/breaking free reads birth-consistent, above/front. Keeling over and the Nikes on his feet — death position, below waist. Clean."
    facts: "Temüjin was born into a fractured, feuding steppe world — his father poisoned when he was a boy, his family cast out to near-starvation. From that he clawed his way up to unite the warring Mongol tribes and forge, through terrifying discipline and mobility, the largest contiguous land empire in history, from the Pacific almost to the gates of Europe.\n\nHe was both a genocidal conqueror who razed cities that resisted and a surprising moderniser — instituting written law, religious tolerance, a horse-relay postal system and protected Silk Road trade. He died on campaign in 1227; the cause is genuinely uncertain (illness, or injuries from a fall), and his burial place was hidden so completely that it has never been found."
    notes: ["🔴 Cause of death open. The record is genuinely uncertain — illness or fever, possibly plague, following a fall from his horse the year before. The nosebleed story belongs to Attila. The sweating/collapse imagery is compatible with the fever reading without committing to it.", "Nike (27) replaces Ink, clearing the duplicate with Newton (2). \"Just screw it\" is a spoken cue, not a peg — Screw is 74."]

