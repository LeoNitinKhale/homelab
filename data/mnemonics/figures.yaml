    facts: "Thomas Young was a British polymath so accomplished across so many fields that he was nicknamed 'the last man who knew everything'. A physician by training, his most famous achievement was the double-slit experiment, in which he passed light through two narrow slits and observed an interference pattern of light and dark bands — something only waves could produce, reviving the wave theory of light against Newton's particle view and laying groundwork for modern physics.\n\nHe also defined the measure of a material's stiffness still called 'Young's modulus', did important work on the eye and colour vision, and — astonishingly — made key early breakthroughs in deciphering Egyptian hieroglyphs from the Rosetta Stone, work later completed by Champollion. Modest and endlessly curious, he ranged across mechanics, music, medicine and languages until his death in 1829, one of the most versatile minds in the history of science."
    notes: ["Double-slit experiment (wave theory of light); Young's modulus (elasticity); helped decipher Egyptian hieroglyphs."]

