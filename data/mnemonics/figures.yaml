    facts: "Cleopatra VII was the last pharaoh of Egypt, a Greek-descended Ptolemy who — unlike her forebears — actually learned Egyptian and presented herself as the living goddess Isis. Brilliant, multilingual and politically ruthless, she secured her throne and her country's independence by allying herself with, and bearing children to, the two most powerful Romans of the age: Julius Caesar and then Mark Antony.\n\nWhen she and Antony lost the sea battle of Actium to Octavian in 31 BC, their cause collapsed. Rather than be paraded through Rome as a trophy, she took her own life the next year — famously, though disputedly, by the bite of an asp — and Egypt was swallowed into the Roman Empire."
    notes: ["**BC caution**: the numbers run backwards — birth 69 is the larger, death 30 the smaller. The only entry where birth > death. Worth a fixed BC cue in the scene so you know to flip.", "The asp is Plutarch's account and is disputed; poison is the alternative reading."]

