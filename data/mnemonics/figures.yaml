    facts: "Gregor Mendel was an Augustinian friar in Brno (then in the Austrian Empire) who, in the monastery garden, ran one of the most careful scientific experiments in history — breeding some 28,000 pea plants over years and tracking how traits like height, colour and shape passed down the generations. From the neat mathematical ratios he saw, he deduced the existence of discrete units of inheritance, what we now call genes.\n\nHe published his findings in 1866 to near-total silence; the world simply wasn't ready, and he died in 1884 as a respected abbot but an unknown scientist. Worse, much of his paperwork was burned after his death. Only around 1900 did other biologists rediscover his laws and realise that a quiet monk had, decades earlier, founded the entire science of genetics."
    notes: ["An Augustinian friar; his laws of inheritance founded genetics but were ignored until decades after his death."]

