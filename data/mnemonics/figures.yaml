    facts: "James Clerk Maxwell was a Scottish physicist whose work is often ranked with Newton's and Einstein's. In a handful of equations he unified electricity and magnetism into a single force, electromagnetism, and showed that light itself is an electromagnetic wave rippling through space — a revelation that underpins everything from radio to modern physics, and directly inspired Einstein.\n\nHis genius ranged astonishingly wide: he produced the first-ever colour photograph (of a tartan ribbon), explained the rings of Saturn, and helped found the kinetic theory of gases, describing how molecules move and collide. Modest and deeply religious, he was as playful as he was profound. He died of abdominal cancer in 1879 at just 48 — the same disease, and the same age, at which his mother had died — cutting short one of the greatest scientific careers in history."
    notes: ["Maxwell's equations unified electricity, magnetism and light; made the first colour photograph; a founder of modern physics."]

