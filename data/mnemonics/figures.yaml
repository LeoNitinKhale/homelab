    facts: "Ada Lovelace was the daughter of the poet Lord Byron, raised by her mathematician mother on a strict diet of logic and science precisely to suppress any dangerous 'poetic' tendencies. She became a gifted mathematician and, working with Charles Babbage on his never-built mechanical computer, the Analytical Engine, wrote what is often called the first computer program.\n\nCrucially she grasped something Babbage himself had missed: that such a machine could manipulate not only numbers but any symbols — music, letters, ideas — anticipating the general-purpose computer by a century. She died of cancer in 1852 at just thirty-six, the same age at which her father had died, and is now celebrated as a visionary pioneer of computing."
    notes: []

