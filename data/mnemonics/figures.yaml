    facts: "Marco Polo was a teenage Venetian merchant when he set off east with his father and uncle on a journey that would last twenty-four years, crossing deserts and mountains along the Silk Road to the court of Kublai Khan in China. The Khan took a liking to the observant young European and reportedly sent him on missions across the vast Mongol empire, from which Marco returned with tales of paper money, coal, vast cities and riches no European had imagined.\n\nBack in Venice he was captured in a war with Genoa, and while imprisoned dictated his adventures to a fellow inmate — the book that became 'The Travels', nicknamed 'Il Milione' ('The Million') for its seemingly tall tales. Many contemporaries refused to believe him. On his deathbed, urged to recant his 'lies' for the good of his soul, he is said to have replied that he had not told the half of what he had seen."
    notes: ["Dictated his Travels ('Il Milione') from a Genoese prison; 'I did not tell half of what I saw.'"]

