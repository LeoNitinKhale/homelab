    facts: "Carl Friedrich Gauss was a German mathematician and astronomer widely regarded as one of the greatest mathematicians who ever lived, nicknamed the 'Prince of Mathematicians'. A child prodigy — legend says he stunned his schoolteacher by instantly summing the numbers from 1 to 100 — he made profound contributions across an astonishing range of fields, from number theory (his Disquisitiones Arithmeticae) and algebra to geometry, statistics and physics.\n\nHe famously calculated the orbit of the newly discovered asteroid Ceres, allowing astronomers to relocate it after it was lost behind the Sun, and his name attaches to the 'Gaussian' (normal) distribution — the bell curve — the unit of magnetic flux density, and much else. A perfectionist who published only polished work (his motto: 'few, but ripe'), he worked at the University of Göttingen for most of his life and died there in 1855."
    notes: ["'Prince of Mathematicians'; number theory, the normal (Gaussian) distribution, and predicting the orbit of Ceres."]

