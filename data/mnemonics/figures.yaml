    facts: "Guglielmo Marconi was an Italian inventor and entrepreneur who turned the theoretical possibility of radio waves into world-changing technology. As a young man he built wireless apparatus in his family's attic, and in 1901 he stunned the world by transmitting a signal — the letter 'S' in Morse code — across the Atlantic Ocean, something many scientists had flatly declared impossible.\n\nHis wireless company put radio on ships, and it was Marconi equipment and operators that summoned rescuers to the sinking Titanic in 1912, saving hundreds of lives. He shared the Nobel Prize in Physics in 1909 and became a national hero (later, controversially, a supporter of Mussolini). He died of a heart attack in Rome in 1937; radio stations around the world observed a minute's silence, their transmitters briefly stilled in his honour."
    notes: ["Pioneer of long-distance radio; his equipment carried the Titanic's distress calls; shared the 1909 Nobel Prize in Physics."]

