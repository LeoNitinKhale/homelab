    facts: "Albrecht Dürer was the greatest artist of the German Renaissance, a painter, printmaker and theorist who carried the ideas and ambition of the Italian Renaissance north of the Alps. A supreme draughtsman, he raised the humble techniques of woodcut and copperplate engraving to breathtaking heights, producing prints of dazzling detail — the brooding Melencolia I, the Knight, Death and the Devil, and a famous woodcut of a rhinoceros he had never actually seen, based only on a written description.\n\nHe was also revolutionary in his self-image: his intense self-portraits, including one that daringly depicts himself in the frontal pose usually reserved for Christ, treat the artist as a creator of dignity and genius rather than a mere craftsman. Deeply interested in mathematics, proportion and the new humanist learning, and admired across Europe, he died in Nuremberg in 1528, often called 'the Leonardo of the North'."
    notes: ["German Renaissance master of woodcut and engraving; famous self-portraits; the woodcut Rhinoceros; 'the Leonardo of the North'."]

