    facts: "Martin Luther King Jr. was a Baptist minister who became the moral leader of the American civil-rights movement, insisting on non-violent resistance — inspired partly by Gandhi — against racial segregation and injustice. From the Montgomery bus boycott to the March on Washington, where he delivered the 'I Have a Dream' speech to a quarter of a million people, he stirred the conscience of a nation.\n\nHis campaigns helped force through the Civil Rights Act and the Voting Rights Act, and in 1964 he became the youngest man then to receive the Nobel Peace Prize. He wrote his famous 'Letter from Birmingham Jail' in the margins of a newspaper while imprisoned for protesting. In 1968, aged just 39, he was assassinated on the balcony of a Memphis motel, sparking grief and riots across the country — and, eventually, a national holiday in his honour."
    notes: ["Led the American civil-rights movement through non-violence; 'I Have a Dream'; a Baptist minister; assassinated in Memphis, 1968."]

