    facts: "Grace Hopper was an American computer scientist and US Navy rear admiral who was one of the true pioneers of modern computing. Working on the earliest electronic computers during and after the Second World War, she developed the first 'compiler' — a program that translates human-readable instructions into machine code — and championed the radical idea that computers could be programmed in something close to plain English, which led to COBOL, one of the most widely used business programming languages for decades.\n\nShe also helped popularise the term 'debugging': when an early machine failed, her team found the cause was a real moth trapped in a relay, which they taped into the logbook. Famous for handing out 'nanoseconds' (short lengths of wire) to explain computing to admirals, and for her wit and drive, 'Amazing Grace' remained on active naval duty into her eighties, one of the oldest serving officers in the US forces, until her death in 1992."
    notes: ["Pioneered the compiler and COBOL; popularised 'debugging' after a real moth jammed a machine; a US Navy rear admiral."]

