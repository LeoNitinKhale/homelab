    facts: "Saladin (Salah ad-Din) was a Kurdish general who rose to become Sultan of Egypt and Syria and the great unifier of the Muslim world against the Crusader states. In 1187 he crushed the Crusaders at the Battle of Hattin and retook Jerusalem after nearly ninety years of Christian rule — but, unlike the massacre when the Crusaders had first taken the city, he did so with a restraint that astonished even his enemies.\n\nHis chivalry became legendary in Europe as well as the Islamic world: during the Third Crusade he reportedly sent his sick rival Richard the Lionheart fresh fruit and snow to bring down a fever. Personally pious and famously generous, he gave away so much of his wealth that when he died of fever in Damascus in 1193 there was scarcely enough money left to pay for his own funeral."
    notes: ["Reconquered Jerusalem (1187); famed for chivalry toward Richard the Lionheart; died having given his fortune to the poor."]

