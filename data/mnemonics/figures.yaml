    facts: "Jules Verne was a French novelist often hailed as one of the founding fathers of science fiction, whose 'Extraordinary Voyages' thrilled readers with adventures powered by real and imagined technology. In Twenty Thousand Leagues Under the Sea he sent Captain Nemo prowling the ocean depths in the submarine Nautilus; in Around the World in Eighty Days the unflappable Phileas Fogg raced the globe against the clock; and in others he journeyed to the centre of the Earth and fired a crewed capsule to the Moon from Florida — presaging the real space age by a century.\n\nMeticulously researched and bursting with gadgets, geography and optimism about science, his books have been translated more than almost any other author's and adapted endlessly for stage and screen. He wrote steadily from his home in Amiens, where he also served on the town council, and died there in 1905, diabetic and nearly blind, having charted so many voyages he never took himself."
    notes: ["A founding father of science fiction; Twenty Thousand Leagues Under the Sea, Around the World in Eighty Days, Journey to the Centre of the Earth."]

