    facts: "Omar Khayyam was a Persian polymath of the medieval Islamic golden age — a mathematician, astronomer and poet whose work spanned worlds usually kept apart. In mathematics he made major advances in algebra, giving geometric solutions to cubic equations; as an astronomer he led the reform of the Persian calendar, producing a solar year of extraordinary accuracy, arguably better than the Gregorian one we use today.\n\nYet in the West he is remembered above all as a poet, through Edward FitzGerald's famous Victorian translation of the Rubaiyat — a string of wistful, sceptical, wine-soaked quatrains musing on the fleeting nature of life ('a jug of wine, a loaf of bread — and thou'). Whether Khayyam wrote all of them is debated, but their carpe-diem spirit made him one of the most quoted poets in English. He is said to have foretold that his grave would lie where blossoms would fall on it, and died around 1131."
    notes: ["Persian polymath: the Rubaiyat poems, cubic equations in algebra, and a solar calendar more accurate than the modern one."]

