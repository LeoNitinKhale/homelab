    facts: "Peter the Great stood nearly seven feet tall and ruled Russia like a force of nature, determined to haul his vast, backward country into the modern European age. He travelled incognito through Western Europe to learn shipbuilding with his own hands, then came home and remade everything — building a navy, reforming the army, taxing beards, and even personally shearing the long beards of his noblemen to make them look 'civilised'.\n\nOn marshland reclaimed from the Swedes he built a brand-new capital, St Petersburg, his 'window on the West', at enormous cost in lives. Restless, brilliant and brutal — he had his own rebellious son tortured to death — he turned Russia into a great power. Fittingly for a man obsessed with the sea, his end came after he plunged into the freezing Gulf of Finland to help rescue drowning sailors; the chill worsened an existing illness, and he died in 1725."
    notes: ["Modernised Russia and founded St Petersburg; nearly 7ft tall; died of illness after an icy rescue."]

