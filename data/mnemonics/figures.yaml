    death_peg_candidates: ["Mash", "Match", "Mesh", "Mush"]
    facts: "Ivan Pavlov was a Russian physiologist whose experiments on dogs gave psychology one of its most fundamental concepts: the conditioned reflex. He originally set out to study digestion — work for which he won the Nobel Prize in 1904 — but noticed that his laboratory dogs began to salivate not just when fed, but at the mere sight of the assistant who brought the food, or other signals that food was coming.\n\nInvestigating this, he showed that by repeatedly pairing a neutral stimulus (famously a bell or buzzer) with food, he could train the dogs to salivate at the signal alone — 'classical conditioning', now a cornerstone of the study of learning and behaviour. A rigorous, disciplined scientist who fell foul of, but was largely tolerated by, the Soviet regime, he reportedly kept dictating clinical observations of his own body as he lay dying of pneumonia in 1936."
    notes: ["Discovered classical (Pavlovian) conditioning while studying digestion in dogs; won the 1904 Nobel Prize."]

