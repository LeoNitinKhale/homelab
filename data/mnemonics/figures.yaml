    facts: "Johannes Vermeer worked quietly all his life in the Dutch city of Delft, painting slowly and in tiny numbers — only around thirty-five pictures securely survive. Most are silent interiors: a woman reading a letter, pouring milk, weighing pearls, lit by a soft daylight that seems almost to hum, achieved with luminous glazes and, some believe, the aid of a camera obscura.\n\nHe made little money from his art, working also as a picture dealer and innkeeper and fathering eleven surviving children. When a French invasion wrecked the Dutch art market he fell into debt, and died suddenly at forty-three, leaving his widow bankrupt. For nearly two hundred years he was all but forgotten, until nineteenth-century critics rediscovered him — and 'Girl with a Pearl Earring' became one of the most beloved paintings in the world."
    notes: ["Master of light (Girl with a Pearl Earring); died in debt at 43, largely forgotten for two centuries."]

