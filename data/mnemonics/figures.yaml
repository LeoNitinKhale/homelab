    facts: "George Frideric Handel was a German-born composer who made his career and his fortune in London, becoming so thoroughly British that he is buried in Westminster Abbey. A flamboyant, quick-tempered man of huge appetite, he dominated the London stage with Italian operas until public taste turned, then reinvented himself with grand English oratorios.\n\nThe greatest of these, Messiah, he reportedly composed in a white-hot burst of just three to four weeks; at its 'Hallelujah' chorus, by tradition, King George II rose to his feet, and audiences have stood ever since. Like Bach, he was blinded late in life by botched surgery from the same travelling quack. He kept performing to the end, and died in 1759, days after collapsing at a performance of Messiah itself."
    notes: ["German-born, naturalised British; wrote Messiah in ~24 days; blinded by the same quack who blinded Bach."]

