    facts: "John F. Kennedy was the youngest man ever elected US President and the first Catholic to hold the office, a charismatic figure whose glamorous administration was later mythologised as 'Camelot'. A decorated Second World War hero — he saved his surviving crew after his patrol boat PT-109 was cut in two by a Japanese destroyer — he brought youthful optimism to the presidency, urging Americans to 'ask not what your country can do for you'.\n\nHis thousand days in office spanned the terrifying Cuban Missile Crisis (which he defused, pulling the world back from nuclear war), the founding of the Peace Corps, the pledge to land a man on the Moon by the decade's end, and the rising tide of the civil-rights movement. On 22 November 1963, riding in an open-top motorcade through Dallas, he was assassinated — an act that traumatised the nation and spawned endless conspiracy theories that persist to this day."
    notes: ["35th US President; PT-109 war hero; the Cuban Missile Crisis and the Moon pledge; assassinated in Dallas in 1963."]

