    facts: "Michel de Nostredame, Latinised as Nostradamus, was a French astrologer, physician and apothecary who became the most famous prophet in history. Trained in medicine, he first won fame treating plague victims with unusually enlightened methods — fresh air, clean water, low-sugar diets — before turning to astrology and, in 1555, publishing Les Prophéties, a book of some hundreds of four-line rhyming verses (quatrains) written in a deliberately obscure blend of languages.\n\nTheir vagueness has allowed readers ever since to 'find' in them predictions of everything from the French Revolution to world wars and modern disasters, making Nostradamus a byword for prophecy, though sceptics note the verses are cryptic enough to fit almost anything after the fact. Suffering badly from gout and dropsy, he is said to have predicted his own death precisely, and was duly found dead beside his bed one morning in 1566."
    notes: ["Wrote the cryptic prophetic quatrains ('Les Prophéties'); a Renaissance plague doctor and astrologer; reputedly foretold his own death."]

