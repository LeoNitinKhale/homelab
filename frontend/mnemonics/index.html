<!DOCTYPE html>
<html lang="en-gb">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mnemonics — Homelab</title>
  <link rel="stylesheet" href="/static/shared/css/app.css" />
</head>
<body>
  <header class="topbar">
    <a class="backlink" href="/">&larr; Homelab</a>
    <h1>Mnemonics</h1>
    <span class="spacer"></span>
    <a class="navlink" href="/admin/mnemonics/peg/">Edit in admin</a>
  </header>

  <main class="page">
    <p class="lead">Memory pegs — fixed numbers mapped to memorable words, used as hooks to store and recall ordered information.</p>

    <div class="stats">
      <div class="stat"><div class="value" id="stat-count">—</div><div class="label">Pegs</div></div>
    </div>

    <table class="data">
      <thead>
        <tr><th>#</th><th>Word</th><th>Notes</th></tr>
      </thead>
      <tbody id="rows"><tr><td colspan="3" class="empty">Loading…</td></tr></tbody>
    </table>
  </main>

  <script src="/static/mnemonics/js/mnemonics.js"></script>
</body>
</html>
